<script>
const NLS=4;
const LETRAS=['A','B','C','D','E'];
let nombreEstudiante='';
let EJ=[],actual=0,resp=[],sel=null;

function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function hcss(h){
  if(h==='Resolver problemas')return 'hab-rp';
  if(h==='Modelar')return 'hab-m';
  if(h==='Representar')return 'hab-r';
  return 'hab-a';
}

function generarEjercicios(){
  const EJ=[];

  // P1 — Representar: orden de enteros (temperaturas de ciudades)
  const ciudades=[
    {nombre:'Moscú',t:-18},{nombre:'Oslo',t:-6},{nombre:'Reikiavik',t:-3},
    {nombre:'Buenos Aires',t:15},{nombre:'Lima',t:22},{nombre:'Tokio',t:8},
    {nombre:'Helsinki',t:-11},{nombre:'Bogotá',t:18}
  ];
  const sel5=shuffle(ciudades).slice(0,5);
  const ordenCorrecto=[...sel5].sort((a,b)=>a.t-b.t).map(c=>c.nombre).join(', ');
  const op1=[...sel5].sort((a,b)=>a.t-b.t).map(c=>c.nombre).join(', ');
  const op2=[...sel5].sort((a,b)=>b.t-a.t).map(c=>c.nombre).join(', ');
  const op3=[...sel5].sort((a,b)=>Math.abs(a.t)-Math.abs(b.t)).map(c=>c.nombre).join(', ');
  const op4=shuffle(sel5).map(c=>c.nombre).join(', ');
  const ops1=[];
  [op1,op2,op3,op4].forEach(o=>{if(!ops1.includes(o))ops1.push(o);});
  while(ops1.length<4)ops1.push(shuffle(sel5).map(c=>c.nombre).join(', '));
  const ops1f=ops1.slice(0,4);
  EJ.push({hab:'Representar',
    txt:`Cinco ciudades registraron estas temperaturas: ${sel5.map(c=>c.nombre+' '+c.t+'°C').join(', ')}. ¿Cuál es el orden correcto de menor a mayor temperatura?`,
    ops:ops1f, ok:ops1f.indexOf(op1),
    fb_ok:`Correcto. En la recta numérica: ${sel5.sort((a,b)=>a.t-b.t).map(c=>c.t).join(' < ')}. Los negativos de mayor valor absoluto son los más pequeños.`,
    fb_mal:`En los enteros negativos, mayor valor absoluto significa número más pequeño. El orden correcto es: ${op1}.`
  });

  // P2 — Modelar: cuenta bancaria con saldo negativo
  const saldo0=rnd([-3200,-4800,-2500,-6000,-1800]);
  const deposito=rnd([8000,9500,7200,11000,6500]);
  const retiro=rnd([2000,3800,2500,4200,1500]);
  const saldoF=saldo0+deposito-retiro;
  const w2=shuffle([saldoF+1000,saldoF-500,saldoF+2000,saldoF-1000]).slice(0,3);
  const ops2=shuffle([saldoF,...w2]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Modelar',
    txt:`Una persona tiene saldo de $${saldo0.toLocaleString('es-CL')} (deuda). Deposita $${deposito.toLocaleString('es-CL')} y luego retira $${retiro.toLocaleString('es-CL')}. ¿Cuál es su saldo final?`,
    ops:ops2, ok:ops2.indexOf('$'+saldoF.toLocaleString('es-CL')),
    fb_ok:`Correcto. ${saldo0} + ${deposito} = ${saldo0+deposito}. Luego ${saldo0+deposito} − ${retiro} = ${saldoF}. El saldo negativo representa deuda, el positivo representa dinero disponible.`,
    fb_mal:`Paso 1: ${saldo0} + ${deposito} = ${saldo0+deposito}. Paso 2: ${saldo0+deposito} − ${retiro} = ${saldoF}. Los negativos representan deudas, se operan igual que positivos.`
  });

  // P3 — Resolver problemas: variación temperatura
  const tIni=rnd([-8,-5,-3,-10,-6]);
  const tFin=rnd([2,5,8,12,4]);
  const variacion=tFin-tIni;
  const w3=shuffle([variacion+2,variacion-3,tFin+tIni,variacion+5]).slice(0,3);
  const ops3=shuffle([variacion,...w3]).map(x=>x+'°C');
  EJ.push({hab:'Resolver problemas',
    txt:`Una ciudad registró ${tIni}°C en la madrugada y ${tFin}°C al mediodía. ¿Cuántos grados aumentó la temperatura?`,
    ops:ops3, ok:ops3.indexOf(variacion+'°C'),
    fb_ok:`Correcto. Variación = temperatura final − temperatura inicial = ${tFin} − (${tIni}) = ${tFin} + ${Math.abs(tIni)} = ${variacion}°C. Restar un negativo equivale a sumar.`,
    fb_mal:`Variación = ${tFin} − (${tIni}) = ${tFin} + ${Math.abs(tIni)} = ${variacion}°C. Cuando se resta un número negativo, el resultado aumenta.`
  });

  // P4 — Argumentar: afirmación sobre producto de enteros con signos distintos
  EJ.push({hab:'Argumentar',
    txt:`Sofía afirma: "Multiplicar un entero positivo por uno negativo siempre da un resultado negativo, sin importar los valores." ¿Es correcta su afirmación para todos los enteros no nulos?`,
    ops:[
      'No, depende de cuál sea mayor en valor absoluto',
      'Sí, el producto de signos distintos es siempre negativo',
      'Solo es verdad si el número positivo es mayor',
      'No, a veces el resultado puede ser cero'
    ], ok:1,
    fb_ok:'Correcto. La regla de signos establece: positivo × negativo = negativo siempre, para cualquier par de enteros no nulos. Es una propiedad del sistema de los enteros.',
    fb_mal:'La regla de signos es absoluta para enteros no nulos: positivo × negativo = negativo siempre. No depende de los valores específicos, solo de los signos.'
  });

  // P5 — Modelar: submarino con movimientos
  const profIni=rnd([-180,-240,-300,-200,-150]);
  const sube1=rnd([60,80,50,90,70]);
  const baja=rnd([100,120,140,110,130]);
  const sube2=rnd([40,50,30,60,45]);
  const profF=profIni+sube1-baja+sube2;
  const w5=shuffle([profF+20,profF-15,profF+50,profF-30]).slice(0,3);
  const ops5=shuffle([profF,...w5]).map(x=>x+' m');
  EJ.push({hab:'Modelar',
    txt:`Un submarino está a ${profIni} m. Sube ${sube1} m, luego baja ${baja} m y finalmente sube ${sube2} m. ¿A qué profundidad queda?`,
    ops:ops5, ok:ops5.indexOf(profF+' m'),
    fb_ok:`Correcto. ${profIni} + ${sube1} = ${profIni+sube1}. Luego ${profIni+sube1} − ${baja} = ${profIni+sube1-baja}. Finalmente ${profIni+sube1-baja} + ${sube2} = ${profF} m. El negativo indica que sigue bajo el nivel del mar.`,
    fb_mal:`Operando paso a paso: ${profIni}+${sube1}=${profIni+sube1}; ${profIni+sube1}−${baja}=${profIni+sube1-baja}; ${profIni+sube1-baja}+${sube2}=${profF} m. Las subidas suman y las bajadas restan.`
  });

  // P6 — Resolver problemas: puntaje golf (enteros negativos como ventaja)
  const hoyos=[];let total=0;
  for(let i=0;i<5;i++){const v=rnd([-2,-1,0,1,-3]);hoyos.push(v);total+=v;}
  const w6=shuffle([total+1,total-1,total+2,total-2]).slice(0,3);
  const ops6=shuffle([total,...w6]).map(String);
  EJ.push({hab:'Resolver problemas',
    txt:`En golf, el par es 0. Un jugador registró en 5 hoyos: ${hoyos.join(', ')}. ¿Cuál es su puntaje acumulado?`,
    ops:ops6, ok:ops6.indexOf(String(total)),
    fb_ok:`Correcto. Suma: ${hoyos.join(' + ')} = ${total}. En golf un puntaje negativo es favorable: significa estar bajo el par.`,
    fb_mal:`Se suman los enteros directamente: ${hoyos.join(' + ')} = ${total}. Recuerda que sumar negativos disminuye el total.`
  });

  // P7 — Representar: valor absoluto y opuesto en contexto de deuda
  const deuda=rnd([85000,120000,64000,95000,108000]);
  const extra=rnd([15000,20000,25000,18000,30000]);
  const res7=2*deuda+extra;
  const w7=shuffle([res7-extra,2*deuda-extra,deuda+extra,res7+extra]).slice(0,3);
  const ops7=shuffle([res7,...w7]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Representar',
    txt:`La deuda de una empresa es −$${deuda.toLocaleString('es-CL')}. ¿Cuánto representa el doble del valor absoluto de esa deuda más el opuesto de −$${extra.toLocaleString('es-CL')}?`,
    ops:ops7, ok:ops7.indexOf('$'+res7.toLocaleString('es-CL')),
    fb_ok:`Correcto. |−${deuda.toLocaleString('es-CL')}| = ${deuda.toLocaleString('es-CL')}. Doble = ${(2*deuda).toLocaleString('es-CL')}. Opuesto de −${extra.toLocaleString('es-CL')} = +${extra.toLocaleString('es-CL')}. Total = $${res7.toLocaleString('es-CL')}.`,
    fb_mal:`El valor absoluto elimina el signo: |−${deuda.toLocaleString('es-CL')}|=${deuda.toLocaleString('es-CL')}. Doble=${(2*deuda).toLocaleString('es-CL')}. Opuesto de −${extra.toLocaleString('es-CL')}=+${extra.toLocaleString('es-CL')}. Total=$${res7.toLocaleString('es-CL')}.`
  });

  // P8 — Argumentar: error conceptual sobre orden de negativos
  const n1=rnd([12,15,20,8,18]);
  const n2=rnd([3,4,5,6,7]);
  EJ.push({hab:'Argumentar',
    txt:`Un estudiante dice: "Como −${n1} tiene mayor valor absoluto que −${n2}, entonces −${n1} es mayor que −${n2}". ¿Qué error cometió?`,
    ops:[
      `Confundió valor absoluto con posición en la recta numérica`,
      `No hay error: −${n1} sí es mayor que −${n2}`,
      `El error está en el cálculo del valor absoluto`,
      `Confundió los signos al comparar`
    ], ok:0,
    fb_ok:`Correcto. En la recta numérica, mayor valor absoluto en negativos significa estar más a la izquierda, es decir, ser MENOR. −${n1} < −${n2} porque −${n1} está más a la izquierda.`,
    fb_mal:`Los negativos se ordenan al revés del valor absoluto: mayor valor absoluto = más a la izquierda = más pequeño. −${n1} < −${n2}, no al revés.`
  });

  return EJ;
}

function validarCorreo(c){
  if(c.indexOf('@')===-1)return false;
  var p=c.split('@');if(p.length!==2)return false;
  if(p[0].length===0)return false;
  if(p[1].indexOf('.')===-1)return false;
  var d=p[1].split('.');
  if(d[0].length===0)return false;
  if(d[d.length-1].length<2)return false;
  return true;
}

function iniciar(){
  const nom=document.getElementById('inp-nombre').value.trim();
  const cor=document.getElementById('inp-correo').value.trim();
  if(!nom||!cor){document.getElementById('error-ident').style.display='block';return;}
  if(!validarCorreo(cor)){document.getElementById('error-ident').textContent='Por favor ingresa un correo válido.';document.getElementById('error-ident').style.display='block';return;}
  document.getElementById('error-ident').textContent='Por favor completa tu nombre y correo.';
  nombreEstudiante=nom;
  document.getElementById('zona-ident').style.display='none';
  document.getElementById('zona-q').style.display='block';
  EJ=generarEjercicios();resp=new Array(8).fill(null);actual=0;sel=null;render();
}

function render(){
  const e=EJ[actual];
  document.getElementById('qnum').textContent=`Pregunta ${actual+1} de 8`;
  document.getElementById('barra').style.width=((actual+1)/8*100)+'%';
  document.getElementById('htag').innerHTML=`<span class="hab-tag ${hcss(e.hab)}">${e.hab}</span>`;
  document.getElementById('qtxt').textContent=e.txt;
  sel=null;
  const od=document.getElementById('opts');od.innerHTML='';
  e.ops.forEach((o,i)=>{
    const d=document.createElement('div');d.className='opt';d.id='op'+i;
    d.innerHTML=`<div class="letra">${LETRAS[i]}</div><span class="otxt">${o}</span>`;
    d.onclick=()=>elegir(i);od.appendChild(d);
  });
  const nls=document.createElement('div');nls.className='opt nls';nls.id='op4';
  nls.innerHTML=`<div class="letra" style="border-style:dashed">E</div><span class="otxt">No lo sé</span>`;
  nls.onclick=()=>elegir(4);od.appendChild(nls);
  document.getElementById('fb').style.display='none';
  document.getElementById('btnc').style.display='inline-block';
  document.getElementById('btnc').disabled=true;
  document.getElementById('btns').style.display='none';
}

function elegir(i){
  if(document.getElementById('btnc').style.display==='none')return;
  document.querySelectorAll('.opt').forEach(d=>d.classList.remove('sel'));
  document.getElementById('op'+i).classList.add('sel');
  sel=i;document.getElementById('btnc').disabled=false;
}

function confirmar(){
  if(sel===null)return;
  const e=EJ[actual];resp[actual]=sel;
  const esNls=sel===NLS,esOk=!esNls&&sel===e.ok;
  document.querySelectorAll('.opt').forEach((d,i)=>{
    d.onclick=null;
    if(i===NLS){d.className='opt nls dis';return;}
    if(i===e.ok)d.className='opt '+(esOk?'ok':'show');
    else if(i===sel&&!esOk&&!esNls)d.className='opt mal';
    else d.className='opt dis';
  });
  const fb=document.getElementById('fb');
  if(esNls){fb.className='fb nls';fb.textContent=`La respuesta correcta es ${LETRAS[e.ok]}: ${e.ops[e.ok]}. ${e.fb_mal}`;}
  else{fb.className='fb '+(esOk?'ok':'mal');fb.textContent=esOk?e.fb_ok:e.fb_mal;}
  fb.style.display='block';
  document.getElementById('btnc').style.display='none';
  const bs=document.getElementById('btns');bs.style.display='inline-block';
  bs.textContent=actual<7?'Siguiente →':'Ver resultados →';
}

function siguiente(){if(actual<7){actual++;render();}else mostrarFinal();}

function mostrarFinal(){
  document.getElementById('zona-q').style.display='none';
  document.getElementById('zona-final').style.display='block';
  document.getElementById('zona-final').style.visibility='visible';
  document.getElementById('zona-final').style.opacity='1';
  document.getElementById('barra').style.width='100%';
  const corr=resp.filter((r,i)=>r===EJ[i].ok).length;
  const nlsC=resp.filter(r=>r===NLS).length;
  const incorrectas=8-corr-nlsC;
  const pct=Math.round(corr/8*100);
  document.getElementById('pje').textContent=corr+' / 8 correctas';
  registrar(corr,incorrectas,nlsC,pct);
  document.getElementById('pmsg').textContent=pct+'% de logro'+(nlsC>0?` · ${nlsC} sin responder`:'');
  const al=document.getElementById('alerta');
  const MSGS={alto:[{titulo:'🔥 ¡Dominaste esta guía!',txt:'Tu cerebro matemático está encendido. Puedes avanzar con confianza.'},{titulo:'⚡ ¡Excelente nivel!',txt:'Eso es exactamente el nivel PAES que necesitas. ¡Sigue así!'},{titulo:'🎯 ¡Puntazo!',txt:'Cada guía así te acerca más al puntaje que quieres.'},{titulo:'🚀 ¡Así se hace!',txt:'Estás construyendo una base sólida. Tu esfuerzo se nota.'},{titulo:'🌟 ¡Brillante!',txt:'Logro de '+pct+'%. Eso no es suerte, es práctica constante.'}],medio:[{titulo:'💪 ¡Vas bien!',txt:'Una repetición más y esta guía será tuya. ¡Tú puedes!'},{titulo:'📈 Buen avance',txt:'Estás construyendo algo sólido. Repite y confirma lo que aprendiste.'},{titulo:'✨ ¡Ya casi!',txt:'Con un intento más lo dominas. El progreso ya es visible.'},{titulo:'🎯 En camino',txt:'Cada intento te acerca más. Repite sin presión, con foco.'},{titulo:'⚡ Sigue sumando',txt:''+pct+'% de logro. Repite una vez más y lo tendrás dominado.'}],bajo:[{titulo:'💡 Esta guía te está enseñando algo importante',txt:'Cada error es información valiosa. Inténtalo de nuevo con calma.'},{titulo:'🧠 Así funciona el aprendizaje real',txt:'Los errores son parte del proceso. Repite antes de avanzar.'},{titulo:'🔄 No te rindas',txt:'Los conceptos nuevos necesitan más de un intento. ¡Vuelta a intentarlo!'},{titulo:'💪 El desafío es parte del camino',txt:'Repite esta guía. Con práctica constante lo lograrás.'},{titulo:'🌱 Aquí es donde más se aprende',txt:'Revisa las retroalimentaciones y vuelve a intentarlo. ¡Confía en el proceso!'}]};
  const nivel_msg=pct>=75?'alto':pct>=50?'medio':'bajo';
  const lista=MSGS[nivel_msg];
  const msg=lista[Math.floor(Math.random()*lista.length)];
  if(nivel_msg==='alto'){al.className='alerta bien';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir para afianzar';}
  else if(nivel_msg==='medio'){al.className='alerta bien';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir con valores nuevos';}
  else{al.className='alerta rep';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}.</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir con valores nuevos';}
  const dots=document.getElementById('dots');dots.innerHTML='';
  resp.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='dot '+(r===EJ[i].ok?'ok':r===NLS?'nls':'mal');
    dots.appendChild(d);
  });
  document.getElementById('reslista').innerHTML=resp.map((r,i)=>{
    const ok=r===EJ[i].ok,nls=r===NLS;
    const color=ok?'#085041':nls?'#5F5E5A':'#791F1F';
    const icono=ok?'✓':nls?'?':'✗';
    const txt=ok?'Correcta':nls?`No lo sé — correcta: ${LETRAS[EJ[i].ok]}`:`Incorrecta — correcta: ${LETRAS[EJ[i].ok]}`;
    return `<div style="color:${color}">${icono} P${i+1} (${EJ[i].hab}): ${txt}</div>`;
  }).join('');
}

function registrar(corr,incorr,nls,pct){
  var fecha=new Date().toLocaleDateString('es-CL',{timeZone:'America/Santiago'});
  var correo=document.getElementById('inp-correo').value.trim();
  var HAB_E=["Representar", "Modelar", "Resolver problemas", "Argumentar", "Modelar", "Resolver problemas", "Representar", "Argumentar"];
  var ejercicios=resp.map(function(r,i){return r===4?2:(r===EJ[i].ok?1:0);});
  var falladas=[];
  resp.forEach(function(r,i){if(r!==EJ[i].ok&&falladas.indexOf(EJ[i].hab)===-1)falladas.push(EJ[i].hab);});
  // ── CÁLCULO LOGRO POR HABILIDAD ──────────────────────
  var HAB_MAP={e1:HAB_E[0],e2:HAB_E[1],e3:HAB_E[2],e4:HAB_E[3],e5:HAB_E[4],e6:HAB_E[5],e7:HAB_E[6],e8:HAB_E[7]};
  var habCorr={'Resolver problemas':0,'Modelar':0,'Representar':0,'Argumentar':0};
  var habTot={'Resolver problemas':0,'Modelar':0,'Representar':0,'Argumentar':0};
  ['e1','e2','e3','e4','e5','e6','e7','e8'].forEach(function(k,i){
    var h=HAB_MAP[k];
    habTot[h]=(habTot[h]||0)+1;
    if(ejercicios[i]===1) habCorr[h]=(habCorr[h]||0)+1;
  });
  var logroResolver=habTot['Resolver problemas']>0?Math.round(habCorr['Resolver problemas']/habTot['Resolver problemas']*100)/100:null;
  var logroModelar=habTot['Modelar']>0?Math.round(habCorr['Modelar']/habTot['Modelar']*100)/100:null;
  var logroRepresentar=habTot['Representar']>0?Math.round(habCorr['Representar']/habTot['Representar']*100)/100:null;
  var logroArgumentar=habTot['Argumentar']>0?Math.round(habCorr['Argumentar']/habTot['Argumentar']*100)/100:null;
  var params=[
    'fecha='+encodeURIComponent(fecha),
    'nombre='+encodeURIComponent(nombreEstudiante),
    'correo='+encodeURIComponent(correo),
    'tipo=individual','grupo=NA',
    'guia=guia-U01.B.4a','eje=E1','unidad=U01','subunidad=B','nivel=a',
    'correctas='+corr,'incorrectas='+incorr,'nls='+nls,'logro='+(pct/100),
    'e1='+ejercicios[0],'e2='+ejercicios[1],'e3='+ejercicios[2],'e4='+ejercicios[3],
    'e5='+ejercicios[4],'e6='+ejercicios[5],'e7='+ejercicios[6],'e8='+ejercicios[7],
    'habilidades='+encodeURIComponent(falladas.join('|')),
    'logro_resolver='+(logroResolver!==null?logroResolver:''),'logro_modelar='+(logroModelar!==null?logroModelar:''),'logro_representar='+(logroRepresentar!==null?logroRepresentar:''),'logro_argumentar='+(logroArgumentar!==null?logroArgumentar:'')
  ].join('&');
  var img=new Image();
  img.src='https://script.google.com/macros/s/AKfycbzsGCpwyNNFC03rbCLUwnPLTHBAn5FZxEJrqq1JX0LrDAY7jmJRQ58bcdaQ8XtS6MM3/exec?'+params;
}


function volverPortal(){
  const params=new URLSearchParams(window.location.search);
  const nombre=params.get('nombre');
  const correo=params.get('correo');
  if(nombre&&correo){
    window.location.href='portal-estudiante.html?nombre='+encodeURIComponent(nombre)+'&correo='+encodeURIComponent(correo);
  } else {
    window.location.href='portal-estudiante.html';
  }
}
function reiniciar(){
  EJ=generarEjercicios();actual=0;resp=new Array(8).fill(null);sel=null;
  document.getElementById('zona-final').style.display='none';
  document.getElementById('zona-q').style.display='block';
  render();
}

// ── AUTO-IDENTIFICACIÓN DESDE PORTAL ──────────────────
// Si el estudiante llega desde el portal, nombre y correo
// vienen en la URL y se saltan el formulario
function autoIdentificar() {
  const params = new URLSearchParams(window.location.search);
  const nombre = params.get('nombre');
  const correo = params.get('correo');
  if (nombre && correo) {
    document.getElementById('inp-nombre').value = nombre;
    document.getElementById('inp-correo').value = correo;
    // Ocultar formulario y arrancar directo
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    nombreEstudiante = nombre;
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    render();
  }
}
// Ejecutar al cargar la página
window.addEventListener('load', autoIdentificar);
</script>
