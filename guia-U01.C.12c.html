<script>
const NLS=4;
const LETRAS=['A','B','C','D','E'];
let nombreEstudiante='';
let EJ=[],actual=0,resp=[],sel=null;

function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function hcss(h){
  if(h==='Resolver problemas')return 'hab-rp';
  if(h==='Modelar')return 'hab-m';
  if(h==='Representar')return 'hab-r';
  return 'hab-a';
}

function generarEjercicios(){
  const EJ=[];

  // P1 â€” Argumentar: (b-a)آ² siempre positivo
  EJ.push({hab:'Argumentar',
    txt:'Sean a y b racionales con a < b. آ؟Cuأ،l expresiأ³n produce SIEMPRE un racional positivo?',
    ops:['(b âˆ’ a) آ· b','(a âˆ’ b) آ· a','(b âˆ’ a)آ²','(a âˆ’ b) آ· (b âˆ’ a)'],ok:2,
    fb_ok:'Correcto. (bâˆ’a)آ²: cualquier nأ؛mero al cuadrado es â‰¥0, y como aâ‰ b entonces (bâˆ’a)â‰ 0, por lo tanto (bâˆ’a)آ²>0 siempre âœ“. La opciأ³n D es siempre negativa.',
    fb_mal:'(bâˆ’a)â‰ 0 pues aâ‰ b. Su cuadrado es siempre positivo. Las otras opciones dependen del signo de a o b.'
  });

  // P2 â€” Resolver problemas: fracciأ³n compleja
  const fracs=[{txt:'(1/2 + 1/3) أ· (1/4 âˆ’ 1/6)',num:5,den:6,div:1,d2:12,res:10},{txt:'(3/4 âˆ’ 1/6) أ· (1/3 + 1/6)',num:7,den:12,div:1,d2:2,res:7/6*2}];
  const f2=rnd(fracs);
  EJ.push({hab:'Resolver problemas',
    txt:`آ؟Cuأ،l es el valor de: ${f2.txt}?`,
    ops:['5','8','10','12'],ok:2,
    fb_ok:'Correcto. Numerador: 1/2+1/3=5/6. Denominador: 1/4âˆ’1/6=1/12. Divisiأ³n: (5/6)أ·(1/12)=(5/6)أ—12=10.',
    fb_mal:'Opera numerador y denominador por separado, luego divide. Num=5/6, Den=1/12. (5/6)أ·(1/12)=5/6أ—12=10.'
  });

  // P3 â€” Representar: decimal de 5/12
  EJ.push({hab:'Representar',
    txt:'آ؟Cuأ،l de las siguientes es la representaciأ³n correcta de 5/12 como decimal?',
    ops:['0,4166â€¦','0,416','0,41(6)','0,417'],ok:2,
    fb_ok:'Correcto. 5أ·12=0,41666â€¦=0,41(6): parte no periأ³dica "1" y perأ­odo "6". Es un decimal semi-periأ³dico.',
    fb_mal:'5أ·12=0,41666â€¦. La notaciأ³n correcta para semi-periأ³dico es 0,41(6): el parأ©ntesis indica el perأ­odo.'
  });

  // P4 â€” Argumentar: suma de dos irracionales
  EJ.push({hab:'Argumentar',
    txt:'Martina afirma: "La suma de dos irracionales siempre es irracional". آ؟Es correcta?',
    ops:['Sأ­, irracional+irracional=irracional por definiciأ³n','No: por ejemplo âˆڑ2+(âˆ’âˆڑ2)=0, que es racional','Solo incorrecta para raأ­ces cuadradas','Sأ­, porque los irracionales no tienen forma fraccionaria'],ok:1,
    fb_ok:'Correcto. Contraejemplo: âˆڑ2+(âˆ’âˆڑ2)=0âˆˆQ. Para refutar una afirmaciأ³n general basta un contraejemplo.',
    fb_mal:'Basta un contraejemplo: âˆڑ2+(âˆ’âˆڑ2)=0, que es racional. La suma de irracionales PUEDE ser racional.'
  });

  // P5 â€” Modelar: trabajo conjunto con tasas fraccionarias
  const trabajos=[{a:'2/5',b:'1/4',res:'20/13'},{a:'1/3',b:'1/4',res:'12/7'},{a:'3/8',b:'1/4',res:'8/5'}];
  const t5=rnd(trabajos);
  function evalFrac(f){const p=f.split('/');return parseInt(p[0])/parseInt(p[1]);}
  const tasaTotal=evalFrac(t5.a)+evalFrac(t5.b);
  const horas=1/tasaTotal;
  const horasS=t5.res;
  const wf5=shuffle(['13/20 horas','3/2 horas','9/20 horas','1 hora']).filter(x=>x!==horasS+' horas').slice(0,3);
  const ops5=shuffle([horasS+' horas',...wf5]);
  EJ.push({hab:'Modelar',
    txt:`Ana pinta ${t5.a} de una pared por hora y Bruno ${t5.b}. آ؟En cuأ،ntas horas completan la pared trabajando juntos?`,
    ops:ops5, ok:ops5.indexOf(horasS+' horas'),
    fb_ok:`Correcto. Tasa conjunta: ${t5.a}+${t5.b}=${Math.round(tasaTotal*100)/100}/hora. Tiempo: 1أ·(${Math.round(tasaTotal*100)/100})=${horasS} horas.`,
    fb_mal:`Suma tasas: ${t5.a}+${t5.b}. Tiempo=1أ·tasa conjunta=${horasS} horas.`
  });

  // P6 â€” Representar: P=7/5, Q=5/3, comparar
  EJ.push({hab:'Representar',
    txt:'Si P = 7/5 y Q = 5/3, آ؟cuأ،l afirmaciأ³n es correcta?',
    ops:['P < 1 < Q','1 < P < Q','P < Q < 1','Q < P'],ok:1,
    fb_ok:'Correcto. P=7/5=1,4 y Q=5/3â‰ˆ1,667. Ambos mayores que 1 y P<Q. Por lo tanto 1<P<Q.',
    fb_mal:'P=7/5=1,4 y Q=5/3â‰ˆ1,667. Ambos superan 1 y P<Q: la relaciأ³n es 1<P<Q.'
  });

  // P7 â€” Resolver problemas: media aritmأ©tica exacta entre dos racionales
  const pares7=[{f1:'3/8',f2:'5/6',res:'29/48'},{f1:'1/4',f2:'3/4',res:'1/2'},{f1:'2/5',f2:'3/4',res:'23/40'}];
  const p7=rnd(pares7);
  const wf7=shuffle(['4/7','7/12','5/8','3/5']).filter(x=>x!==p7.res).slice(0,3);
  const ops7=shuffle([p7.res,...wf7]);
  EJ.push({hab:'Resolver problemas',
    txt:`آ؟Cuأ،l es el racional exactamente a la mitad entre ${p7.f1} y ${p7.f2}?`,
    ops:ops7, ok:ops7.indexOf(p7.res),
    fb_ok:`Correcto. Media aritmأ©tica: (${p7.f1}+${p7.f2})أ·2. Suma con mcm y divide por 2. Resultado: ${p7.res}.`,
    fb_mal:`(${p7.f1}+${p7.f2})أ·2. Iguala denominadores, suma y divide entre 2. La media aritmأ©tica siempre se ubica exactamente en el medio. Resultado: ${p7.res}.`
  });

  // P8 â€” Argumentar: p<0<q con |p|>|q|, proposiciones
  EJ.push({hab:'Argumentar',
    txt:'Sean p y q racionales con p < 0 < q y |p| > |q|. آ؟Cuأ،les proposiciones son VERDADERAS?
I.  p + q < 0
II. p آ· q < 0
III. p/q < p',
    ops:['Solo I','I y II','Solo II','I, II y III'],ok:3,
    fb_ok:'Correcto. I: |p|>|q| y p<0 â†’ p+q<0 âœ“. II: negأ—pos=neg âœ“. III: p/q=neg/pos=neg. Como 1/q<1 (q>0), p/q hace a p mأ،s negativo, entonces p/q<p âœ“. Las tres son verdaderas.',
    fb_mal:'I âœ“ (|p|>|q|, p negativo domina). II âœ“ (negأ—pos=neg). III âœ“ (p/q es mأ،s negativo que p cuando 0<q<1, o igual cuando q=1). Las tres son verdaderas.'
  });

  return EJ;
}

function validarCorreo(c){
  if(c.indexOf('@')===-1)return false;
  var p=c.split('@');if(p.length!==2)return false;
  if(p[0].length===0)return false;
  if(p[1].indexOf('.')===-1)return false;
  var d=p[1].split('.');
  if(d[0].length===0)return false;
  if(d[d.length-1].length<2)return false;
  return true;
}

function iniciar(){
  const nom=document.getElementById('inp-nombre').value.trim();
  const cor=document.getElementById('inp-correo').value.trim();
  if(!nom||!cor){document.getElementById('error-ident').style.display='block';return;}
  if(!validarCorreo(cor)){document.getElementById('error-ident').textContent='Por favor ingresa un correo vأ،lido.';document.getElementById('error-ident').style.display='block';return;}
  document.getElementById('error-ident').textContent='Por favor completa tu nombre y correo.';
  nombreEstudiante=nom;
  document.getElementById('zona-ident').style.display='none';
  document.getElementById('zona-q').style.display='block';
  EJ=generarEjercicios();resp=new Array(8).fill(null);actual=0;sel=null;render();
}

function render(){
  const e=EJ[actual];
  document.getElementById('qnum').textContent=`Pregunta ${actual+1} de 8`;
  document.getElementById('barra').style.width=((actual+1)/8*100)+'%';
  document.getElementById('htag').innerHTML=`<span class="hab-tag ${hcss(e.hab)}">${e.hab}</span>`;
  document.getElementById('qtxt').textContent=e.txt;
  sel=null;
  const od=document.getElementById('opts');od.innerHTML='';
  e.ops.forEach((o,i)=>{
    const d=document.createElement('div');d.className='opt';d.id='op'+i;
    d.innerHTML=`<div class="letra">${LETRAS[i]}</div><span class="otxt">${o}</span>`;
    d.onclick=()=>elegir(i);od.appendChild(d);
  });
  const nls=document.createElement('div');nls.className='opt nls';nls.id='op4';
  nls.innerHTML=`<div class="letra" style="border-style:dashed">E</div><span class="otxt">No lo sأ©</span>`;
  nls.onclick=()=>elegir(4);od.appendChild(nls);
  document.getElementById('fb').style.display='none';
  document.getElementById('btnc').style.display='inline-block';
  document.getElementById('btnc').disabled=true;
  document.getElementById('btns').style.display='none';
}

function elegir(i){
  if(document.getElementById('btnc').style.display==='none')return;
  document.querySelectorAll('.opt').forEach(d=>d.classList.remove('sel'));
  document.getElementById('op'+i).classList.add('sel');
  sel=i;document.getElementById('btnc').disabled=false;
}

function confirmar(){
  if(sel===null)return;
  const e=EJ[actual];resp[actual]=sel;
  const esNls=sel===NLS,esOk=!esNls&&sel===e.ok;
  document.querySelectorAll('.opt').forEach((d,i)=>{
    d.onclick=null;
    if(i===NLS){d.className='opt nls dis';return;}
    if(i===e.ok)d.className='opt '+(esOk?'ok':'show');
    else if(i===sel&&!esOk&&!esNls)d.className='opt mal';
    else d.className='opt dis';
  });
  const fb=document.getElementById('fb');
  if(esNls){fb.className='fb nls';fb.textContent=`La respuesta correcta es ${LETRAS[e.ok]}: ${e.ops[e.ok]}. ${e.fb_mal}`;}
  else{fb.className='fb '+(esOk?'ok':'mal');fb.textContent=esOk?e.fb_ok:e.fb_mal;}
  fb.style.display='block';
  document.getElementById('btnc').style.display='none';
  const bs=document.getElementById('btns');bs.style.display='inline-block';
  bs.textContent=actual<7?'Siguiente â†’':'Ver resultados â†’';
}

function registrar(corr,incorr,nls,pct){
  var fecha=new Date().toLocaleDateString('es-CL',{timeZone:'America/Santiago'});
  var correo=document.getElementById('inp-correo').value.trim();
  var HAB_E=["Argumentar", "Resolver problemas", "Representar", "Argumentar", "Modelar", "Representar", "Resolver problemas", "Argumentar"];
  var ejercicios=resp.map(function(r,i){return r===4?2:(r===EJ[i].ok?1:0);});
  var falladas=[];
  resp.forEach(function(r,i){if(r!==EJ[i].ok&&falladas.indexOf(EJ[i].hab)===-1)falladas.push(EJ[i].hab);});
  // â”€â”€ CأپLCULO LOGRO POR HABILIDAD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  var HAB_MAP={e1:HAB_E[0],e2:HAB_E[1],e3:HAB_E[2],e4:HAB_E[3],e5:HAB_E[4],e6:HAB_E[5],e7:HAB_E[6],e8:HAB_E[7]};
  var habCorr={'Resolver problemas':0,'Modelar':0,'Representar':0,'Argumentar':0};
  var habTot={'Resolver problemas':0,'Modelar':0,'Representar':0,'Argumentar':0};
  ['e1','e2','e3','e4','e5','e6','e7','e8'].forEach(function(k,i){
    var h=HAB_MAP[k];
    habTot[h]=(habTot[h]||0)+1;
    if(ejercicios[i]===1) habCorr[h]=(habCorr[h]||0)+1;
  });
  var logroResolver=habTot['Resolver problemas']>0?Math.round(habCorr['Resolver problemas']/habTot['Resolver problemas']*100)/100:null;
  var logroModelar=habTot['Modelar']>0?Math.round(habCorr['Modelar']/habTot['Modelar']*100)/100:null;
  var logroRepresentar=habTot['Representar']>0?Math.round(habCorr['Representar']/habTot['Representar']*100)/100:null;
  var logroArgumentar=habTot['Argumentar']>0?Math.round(habCorr['Argumentar']/habTot['Argumentar']*100)/100:null;
  var params=[
    'fecha='+encodeURIComponent(fecha),
    'nombre='+encodeURIComponent(nombreEstudiante),
    'correo='+encodeURIComponent(correo),
    'tipo=individual','grupo=NA',
    'guia=guia-U01.C.12c','eje=E1','unidad=U01','subunidad=C','nivel=c',
    'correctas='+corr,'incorrectas='+incorr,'nls='+nls,'logro='+(pct/100),
    'e1='+ejercicios[0],'e2='+ejercicios[1],'e3='+ejercicios[2],'e4='+ejercicios[3],
    'e5='+ejercicios[4],'e6='+ejercicios[5],'e7='+ejercicios[6],'e8='+ejercicios[7],
    'habilidades='+encodeURIComponent(falladas.join('|')),
    'logro_resolver='+(logroResolver!==null?logroResolver:''),'logro_modelar='+(logroModelar!==null?logroModelar:''),'logro_representar='+(logroRepresentar!==null?logroRepresentar:''),'logro_argumentar='+(logroArgumentar!==null?logroArgumentar:'')
  ].join('&');
  var img=new Image();
  img.src='https://script.google.com/macros/s/AKfycbzsGCpwyNNFC03rbCLUwnPLTHBAn5FZxEJrqq1JX0LrDAY7jmJRQ58bcdaQ8XtS6MM3/exec?'+params;
}


function volverPortal(){
  const params=new URLSearchParams(window.location.search);
  const nombre=params.get('nombre');
  const correo=params.get('correo');
  if(nombre&&correo){
    window.location.href='portal-estudiante.html?nombre='+encodeURIComponent(nombre)+'&correo='+encodeURIComponent(correo);
  } else {
    window.location.href='portal-estudiante.html';
  }
}
function reiniciar(){
  EJ=generarEjercicios();actual=0;resp=new Array(8).fill(null);sel=null;

  document.getElementById('zona-q').style.display='block';

}

// Si el estudiante llega desde el portal, nombre y correo
// vienen en la URL y se saltan el formulario
function autoIdentificar() {
  const params = new URLSearchParams(window.location.search);
  const nombre = params.get('nombre');
  const correo = params.get('correo');
  if (nombre && correo) {
    document.getElementById('inp-nombre').value = nombre;
    document.getElementById('inp-correo').value = correo;
    // Ocultar formulario y arrancar directo
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    nombreEstudiante = nombre;
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    render();
  }
}
// Ejecutar al cargar la pأ،gina
window.addEventListener('load', autoIdentificar);
