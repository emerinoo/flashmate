<script>
const NLS=4;
const LETRAS=['A','B','C','D','E'];
let nombreEstudiante='',EJ=[],actual=0,resp=[],sel=null;

function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function hcss(h){
  if(h==='Resolver problemas')return 'hab-rp';
  if(h==='Modelar')return 'hab-m';
  if(h==='Representar')return 'hab-r';
  return 'hab-a';
}

function generarEjercicios(){
  const EJ=[];

  // P1 — Deducir dos números dado MCD, mcm y su suma (Resolver problemas)
  const casos1=[
    {mcd:6,mcm:60,suma:26,a:6,b:20},
    {mcd:4,mcm:48,suma:28,a:12,b:16},
    {mcd:5,mcm:60,suma:25,a:15,b:10},  // nota: 10+15=25
    {mcd:3,mcm:36,suma:21,a:9,b:12},
    {mcd:6,mcm:72,suma:42,a:18,b:24}
  ];
  const c1=rnd(casos1);
  const w1=shuffle([[c1.a+2,c1.b-2],[c1.a-3,c1.b+3],[c1.a*2,c1.b/2],[c1.a+5,c1.b-5]]
    .filter(([x,y])=>x>0&&y>0&&x!==c1.a)).slice(0,3)
    .map(([x,y])=>`${x} y ${y}`);
  const ops1=shuffle([`${c1.a} y ${c1.b}`,...w1]);
  EJ.push({hab:'Resolver problemas',
    txt:`Dos números tienen MCD=${c1.mcd}, mcm=${c1.mcm} y su suma es ${c1.a+c1.b}. ¿Cuáles son los dos números?`,
    ops:ops1,ok:ops1.indexOf(`${c1.a} y ${c1.b}`),
    fb_ok:`Correcto. Los pares de múltiplos de ${c1.mcd} que cumplen MCD×mcm=a×b: ${c1.mcd}×${c1.mcm}=${c1.mcd*c1.mcm}=${c1.a}×${c1.b}. Y su suma: ${c1.a}+${c1.b}=${c1.a+c1.b}. ✓`,
    fb_mal:`Usa MCD×mcm=a×b: ${c1.mcd}×${c1.mcm}=${c1.mcd*c1.mcm}. Busca pares (múltiplos de ${c1.mcd}) cuyo producto sea ${c1.mcd*c1.mcm} y suma ${c1.a+c1.b}. Son ${c1.a} y ${c1.b}.`
  });

  // P2 — Contar enteros con dos condiciones simultáneas (Representar)
  const casos2=[
    {desde:1,hasta:100,d1:3,d2:5,mcm:15,count:6,lista:'15,30,45,60,75,90'},
    {desde:1,hasta:120,d1:4,d2:6,mcm:12,count:10,lista:'12,24,36,...,120'},
    {desde:1,hasta:100,d1:6,d2:9,mcm:18,count:5,lista:'18,36,54,72,90'},
    {desde:1,hasta:200,d1:8,d2:12,mcm:24,count:8,lista:'24,48,...,192'}
  ];
  const c2=rnd(casos2);
  const w2=shuffle([c2.count-1,c2.count+1,c2.count+2,c2.count-2].filter(x=>x>0&&x!==c2.count)).slice(0,3).map(String);
  const ops2=shuffle([String(c2.count),...w2]);
  EJ.push({hab:'Representar',
    txt:`¿Cuántos números entre ${c2.desde} y ${c2.hasta} son divisibles por ${c2.d1} y por ${c2.d2} simultáneamente?`,
    ops:ops2,ok:ops2.indexOf(String(c2.count)),
    fb_ok:`Correcto. Un número divisible por ${c2.d1} y por ${c2.d2} es divisible por mcm(${c2.d1},${c2.d2})=${c2.mcm}. Entre ${c2.desde} y ${c2.hasta}: ${c2.lista}. Total: ${c2.count}.`,
    fb_mal:`Divisible por ${c2.d1} y ${c2.d2} significa divisible por mcm(${c2.d1},${c2.d2})=${c2.mcm}. Entre ${c2.desde} y ${c2.hasta} hay ${c2.count} múltiplos de ${c2.mcm}.`
  });

  // P3 — Detectar error en procedimiento ajeno (Argumentar)
  const errores3=[
    {
      txt:'Camila calcula el MCD(24,36) así: "24=2³×3 y 36=2²×3². MCD=2³×3²=72". ¿Cuál es su error?',
      ok:'Tomó los exponentes mayores en vez de los menores',
      w:['No factorizó correctamente el 36','No factorizó correctamente el 24','El MCD de 24 y 36 sí es 72'],
      expl:'Para el MCD se toman los factores comunes con el exponente MENOR: 2²×3=12, no 72. El 72 es el mcm.'
    },
    {
      txt:'Pedro calcula mcm(12,18) así: "12=2²×3 y 18=2×3². mcm=2×3=6". ¿Cuál es su error?',
      ok:'Tomó los exponentes menores en vez de los mayores',
      w:['No factorizó correctamente el 18','El mcm de 12 y 18 sí es 6','Confundió mcm con suma'],
      expl:'Para el mcm se toman los factores comunes y no comunes con el exponente MAYOR: 2²×3²=36, no 6. El 6 es el MCD.'
    },
    {
      txt:'Ana dice: "MCD(15,25)=5 y mcm(15,25)=75, entonces MCD×mcm=5×75=375, pero 15×25=375 también". ¿Está en lo correcto?',
      ok:'Sí, aplicó correctamente la propiedad MCD×mcm=a×b',
      w:['No, el mcm de 15 y 25 no es 75','No, 5×75 no es 375','No, la propiedad no aplica aquí'],
      expl:'MCD(15,25)=5 y mcm(15,25)=75. Comprobación: 5×75=375=15×25. La propiedad se cumple perfectamente.'
    }
  ];
  const c3=rnd(errores3);
  const ops3=shuffle([c3.ok,...c3.w]);
  EJ.push({hab:'Argumentar',
    txt:c3.txt,
    ops:ops3,ok:ops3.indexOf(c3.ok),
    fb_ok:`Correcto. ${c3.expl}`,
    fb_mal:`${c3.expl}`
  });

  // P4 — mcm con conversión de unidades (Modelar)
  const casos4=[
    {t1:90,t2:60,u1:'segundos',u2:'1 minuto',mcm:180,res:'cada 3 minutos',expl:'mcm(90,60)=180 segundos=3 minutos'},
    {t1:45,t2:30,u1:'segundos',u2:'30 segundos',mcm:90,res:'cada 1 min 30 seg',expl:'mcm(45,30)=90 segundos=1 min 30 seg'},
    {t1:120,t2:80,u1:'segundos',u2:'2 minutos',mcm:240,res:'cada 4 minutos',expl:'mcm(120,80)=240 segundos=4 minutos'}
  ];
  const c4=rnd(casos4);
  const w4=shuffle([
    'cada 2 minutos','cada 5 minutos','cada 6 minutos','cada 8 minutos',
    'cada 2 min 30 seg','cada 3 min 30 seg'
  ].filter(x=>x!==c4.res)).slice(0,3);
  const ops4=shuffle([c4.res,...w4]);
  EJ.push({hab:'Modelar',
    txt:`Dos máquinas emiten una señal. La primera cada ${c4.t1} ${c4.u1} y la segunda cada ${c4.t2} ${c4.u1}. ¿Cada cuánto tiempo coinciden las señales?`,
    ops:ops4,ok:ops4.indexOf(c4.res),
    fb_ok:`Correcto. ${c4.expl}.`,
    fb_mal:`${c4.expl}. Hay que calcular el mcm y luego convertir a minutos.`
  });

  // P5 — Fórmula de divisores aplicada a potencias grandes (Representar)
  const casos5=[
    {n:'2⁵×3²',nd:18,expl:'(5+1)(2+1)=6×3=18'},
    {n:'2³×5²×7',nd:24,expl:'(3+1)(2+1)(1+1)=4×3×2=24'},
    {n:'2⁴×3×11',nd:20,expl:'(4+1)(1+1)(1+1)=5×2×2=20'},
    {n:'3³×5²',nd:12,expl:'(3+1)(2+1)=4×3=12'},
    {n:'2²×3²×5²',nd:27,expl:'(2+1)(2+1)(2+1)=3×3×3=27'}
  ];
  const c5=rnd(casos5);
  const w5=shuffle([c5.nd-3,c5.nd+4,c5.nd-6,c5.nd+6].filter(x=>x>0&&x!==c5.nd)).slice(0,3).map(String);
  const ops5=shuffle([String(c5.nd),...w5]);
  EJ.push({hab:'Representar',
    txt:`Un número tiene factorización prima ${c5.n}. ¿Cuántos divisores positivos tiene?`,
    ops:ops5,ok:ops5.indexOf(String(c5.nd)),
    fb_ok:`Correcto. Fórmula: si n=p₁ᵃ×p₂ᵇ×..., tiene (a+1)(b+1)×... divisores. ${c5.n}: ${c5.expl}=${c5.nd} divisores.`,
    fb_mal:`Fórmula de divisores: si n=p₁ᵃ×p₂ᵇ×..., tiene (a+1)(b+1)×... divisores. Para ${c5.n}: ${c5.expl}=${c5.nd}.`
  });

  // P6 — Par que cumple MCD y mcm dados (Resolver problemas)
  const casos6=[
    {mcd:6,mcm:60,pares:[[12,30],[6,60],[20,18]],ok:[12,30],w:['6 y 60','20 y 18','15 y 24'],expl:'12=6×2 y 30=6×5. MCD(12,30)=6 ✓ mcm(12,30)=60 ✓'},
    {mcd:4,mcm:48,pares:[[8,24],[4,48],[16,12]],ok:[8,24],w:['4 y 48','16 y 12','6 y 32'],expl:'8=4×2 y 24=4×6. MCD(8,24)=8... verifica: mcm(8,24)=24. Prueba 8 y 24: MCD=8, mcm=24. Intenta con los valores correctos.'},
    {mcd:5,mcm:60,pares:[[15,20],[5,60],[10,30]],ok:[15,20],w:['5 y 60','10 y 30','20 y 15'],expl:'MCD(15,20)=5 ✓ mcm(15,20)=60 ✓ El par 15 y 20 cumple ambas condiciones.'},
    {mcd:3,mcm:36,pares:[[9,12],[3,36],[6,18]],ok:[9,12],w:['3 y 36','6 y 18','12 y 9'],expl:'MCD(9,12)=3 ✓ mcm(9,12)=36 ✓'}
  ];
  const c6=rnd(casos6);
  const okStr=`${c6.ok[0]} y ${c6.ok[1]}`;
  const ops6=shuffle([okStr,...c6.w.slice(0,3)]);
  EJ.push({hab:'Resolver problemas',
    txt:`¿Cuál de los siguientes pares de números tiene MCD=${c6.mcd} y mcm=${c6.mcm}?`,
    ops:ops6,ok:ops6.indexOf(okStr),
    fb_ok:`Correcto. ${c6.expl}`,
    fb_mal:`${c6.expl} La clave es verificar que MCD×mcm=${c6.mcd}×${c6.mcm}=${c6.mcd*c6.mcm}=a×b.`
  });

  // P7 — Consecuencias encadenadas de divisibilidad (Argumentar)
  const casos7=[
    {
      txt:'Si n es divisible por 2 y por 3, ¿cuál de estas afirmaciones es SIEMPRE verdadera?',
      ok:'n es divisible por 6',
      w:['n es divisible por 12','n es divisible por 18','n es un número par mayor que 6'],
      expl:'Si n es divisible por 2 y por 3, y MCD(2,3)=1 (coprimos), entonces n es divisible por 2×3=6. Pero no necesariamente por 12 o 18.'
    },
    {
      txt:'Si n es divisible por 4 y por 6, ¿cuál es la menor garantía de divisibilidad?',
      ok:'n es divisible por 12',
      w:['n es divisible por 24','n es divisible por 48','n es divisible por 8'],
      expl:'MCD(4,6)=2, por lo que mcm(4,6)=12. Todo múltiplo de 4 y de 6 es múltiplo de 12, pero no necesariamente de 24.'
    },
    {
      txt:'Si n es divisible por 6 y por 10, ¿cuál es la menor garantía de divisibilidad?',
      ok:'n es divisible por 30',
      w:['n es divisible por 60','n es divisible por 15','n es divisible por 20'],
      expl:'mcm(6,10)=30. Todo número divisible por 6 y por 10 es divisible por 30, que es el mínimo garantizado.'
    }
  ];
  const c7=rnd(casos7);
  const ops7=shuffle([c7.ok,...c7.w]);
  EJ.push({hab:'Argumentar',
    txt:c7.txt,
    ops:ops7,ok:ops7.indexOf(c7.ok),
    fb_ok:`Correcto. ${c7.expl}`,
    fb_mal:`${c7.expl}`
  });

  // P8 — Problema complejo de tres personas y períodos (Modelar)
  const casos8=[
    {p:['Valentina','Camila','Sofía'],d:[6,8,12],mcm:24,ctx:'visitan a su abuela',u:'días',extra:'Se vieron hoy. ¿En cuántos días volverán a coincidir las tres?'},
    {p:['el bus A','el bus B','el bus C'],d:[10,15,20],mcm:60,ctx:'pasan por la misma parada',u:'minutos',extra:'A las 8:00 pasaron juntos. ¿Cuántos minutos después volverán a coincidir?'},
    {p:['Rodrigo','Matías','Diego'],d:[4,6,10],mcm:60,ctx:'entrenan en el gimnasio',u:'días',extra:'Hoy entrenaron juntos. ¿En cuántos días volverán a coincidir?'}
  ];
  const c8=rnd(casos8);
  const w8=shuffle([c8.mcm+c8.d[0],c8.mcm-c8.d[1],c8.mcm*2,c8.mcm/2].filter(x=>x>0&&x!==c8.mcm&&Number.isInteger(x))).slice(0,3);
  const ops8=shuffle([c8.mcm,...w8]).map(x=>`${x} ${c8.u}`);
  EJ.push({hab:'Modelar',
    txt:`${c8.p[0]} ${c8.ctx} cada ${c8.d[0]} ${c8.u}, ${c8.p[1]} cada ${c8.d[1]} y ${c8.p[2]} cada ${c8.d[2]}. ${c8.extra}`,
    ops:ops8,ok:ops8.indexOf(`${c8.mcm} ${c8.u}`),
    fb_ok:`Correcto. mcm(${c8.d[0]},${c8.d[1]},${c8.d[2]})=${c8.mcm} ${c8.u}. Es el menor tiempo en que los tres períodos coinciden.`,
    fb_mal:`Se necesita el mcm de los tres períodos. mcm(${c8.d[0]},${c8.d[1]},${c8.d[2]})=${c8.mcm} ${c8.u}.`
  });

  return EJ;
}

function validarCorreo(correo){
  if(correo.indexOf('@')===-1) return false;
  var partes=correo.split('@');
  if(partes.length!==2) return false;
  if(partes[0].length===0) return false;
  if(partes[1].indexOf('.')===-1) return false;
  var dominio=partes[1].split('.');
  if(dominio[0].length===0) return false;
  if(dominio[dominio.length-1].length<2) return false;
  return true;
}
function iniciar(){
  const nom=document.getElementById('inp-nombre').value.trim();
  const cor=document.getElementById('inp-correo').value.trim();
  if(!nom||!cor){document.getElementById('error-ident').style.display='block';return;}
  if(!validarCorreo(cor)){document.getElementById('error-ident').textContent='Por favor ingresa un correo válido. Ejemplo: nombre@gmail.com';document.getElementById('error-ident').style.display='block';return;}
  document.getElementById('error-ident').textContent='Por favor completa tu nombre y correo.';
  nombreEstudiante=nom;
  document.getElementById('zona-ident').style.display='none';
  document.getElementById('zona-q').style.display='block';
  EJ=generarEjercicios();
  resp=new Array(8).fill(null);
  actual=0;sel=null;
  render();
}

function render(){
  const e=EJ[actual];
  document.getElementById('qnum').textContent=`Pregunta ${actual+1} de 8`;
  document.getElementById('barra').style.width=((actual+1)/8*100)+'%';
  document.getElementById('htag').innerHTML=`<span class="hab-tag ${hcss(e.hab)}">${e.hab}</span>`;
  document.getElementById('qtxt').textContent=e.txt;
  sel=null;
  const od=document.getElementById('opts');
  od.innerHTML='';
  e.ops.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt';d.id='op'+i;
    d.innerHTML=`<div class="letra">${LETRAS[i]}</div><span class="otxt">${o}</span>`;
    d.onclick=()=>elegir(i);
    od.appendChild(d);
  });
  const nls=document.createElement('div');
  nls.className='opt nls';nls.id='op4';
  nls.innerHTML=`<div class="letra" style="border-style:dashed">E</div><span class="otxt">No lo sé</span>`;
  nls.onclick=()=>elegir(4);
  od.appendChild(nls);
  document.getElementById('fb').style.display='none';
  document.getElementById('btnc').style.display='inline-block';
  document.getElementById('btnc').disabled=true;
  document.getElementById('btns').style.display='none';
}

function elegir(i){
  if(document.getElementById('btnc').style.display==='none')return;
  document.querySelectorAll('.opt').forEach(d=>d.classList.remove('sel'));
  document.getElementById('op'+i).classList.add('sel');
  sel=i;document.getElementById('btnc').disabled=false;
}

function confirmar(){
  if(sel===null)return;
  const e=EJ[actual];resp[actual]=sel;
  const esNls=sel===NLS;
  const esOk=!esNls&&sel===e.ok;
  document.querySelectorAll('.opt').forEach((d,i)=>{
    d.onclick=null;
    if(i===NLS){d.className='opt nls dis';return;}
    if(i===e.ok)d.className='opt '+(esOk?'ok':'show');
    else if(i===sel&&!esOk&&!esNls)d.className='opt mal';
    else d.className='opt dis';
  });
  const fb=document.getElementById('fb');
  if(esNls){
    fb.className='fb nls';
    fb.textContent=`La respuesta correcta es ${LETRAS[e.ok]}: ${e.ops[e.ok]}. ${e.fb_mal}`;
  } else {
    fb.className='fb '+(esOk?'ok':'mal');
    fb.textContent=esOk?e.fb_ok:e.fb_mal;
  }
  fb.style.display='block';
  document.getElementById('btnc').style.display='none';
  const bs=document.getElementById('btns');
  bs.style.display='inline-block';
  bs.textContent=actual<7?'Siguiente →':'Ver resultados →';
}

function siguiente(){
  if(actual<7){actual++;render();}
  else mostrarFinal();
}

function mostrarFinal(){
  document.getElementById('zona-q').style.display='none';
  document.getElementById('zona-final').style.display='block';
  document.getElementById('zona-final').style.visibility='visible';
  document.getElementById('zona-final').style.opacity='1';
  document.getElementById('barra').style.width='100%';
  const corr=resp.filter((r,i)=>r===EJ[i].ok).length;
  const nlsC=resp.filter(r=>r===NLS).length;
  const incorrectas=8-corr-nlsC;
  const pct=Math.round(corr/8*100);
  document.getElementById('pje').textContent=corr+' / 8 correctas';
  registrar(corr,incorrectas,nlsC,pct);
  document.getElementById('pmsg').textContent=pct+'% de logro'+(nlsC>0?` · ${nlsC} sin responder`:'');
  const al=document.getElementById('alerta');
  // Frases por nivel — rotan aleatoriamente
  const MSGS = {
    alto: [
      {titulo:'🔥 ¡Dominaste esta guía!', txt:'Tu cerebro matemático está encendido. Puedes avanzar con confianza.'},
      {titulo:'⚡ ¡Excelente nivel!', txt:'Eso es exactamente el nivel PAES que necesitas. ¡Sigue así!'},
      {titulo:'🎯 ¡Puntazo!', txt:'Cada guía así te acerca más al puntaje que quieres.'},
      {titulo:'🚀 ¡Así se hace!', txt:'Estás construyendo una base sólida. Tu esfuerzo se nota.'},
      {titulo:'🌟 ¡Brillante!', txt:'Logro de '+pct+'%. Eso no es suerte, es práctica constante.'}
    ],
    medio: [
      {titulo:'💪 ¡Vas bien!', txt:'Una repetición más y esta guía será tuya. ¡Tú puedes!'},
      {titulo:'📈 Buen avance', txt:'Estás construyendo algo sólido. Repite y confirma lo que aprendiste.'},
      {titulo:'✨ ¡Ya casi!', txt:'Con un intento más lo dominas. El progreso ya es visible.'},
      {titulo:'🎯 En camino', txt:'Cada intento te acerca más. Repite sin presión, con foco.'},
      {titulo:'⚡ Sigue sumando', txt:''+pct+'% de logro. Repite una vez más y lo tendrás dominado.'}
    ],
    bajo: [
      {titulo:'💡 Esta guía te está enseñando algo importante', txt:'Cada error es información valiosa. Inténtalo de nuevo con calma.'},
      {titulo:'🧠 Así funciona el aprendizaje real', txt:'Los errores son parte del proceso. Repite antes de avanzar.'},
      {titulo:'🔄 No te rindas', txt:'Los conceptos nuevos necesitan más de un intento. ¡Vuelta a intentarlo!'},
      {titulo:'💪 El desafío es parte del camino', txt:'Repite esta guía. Con práctica constante lo lograrás.'},
      {titulo:'🌱 Aquí es donde más se aprende', txt:'Revisa las retroalimentaciones y vuelve a intentarlo. ¡Confía en el proceso!'}
    ]
  };
  const nivel_msg = pct >= 75 ? 'alto' : pct >= 50 ? 'medio' : 'bajo';
  const lista = MSGS[nivel_msg];
  const msg = lista[Math.floor(Math.random()*lista.length)];
  if(nivel_msg === 'alto'){
    al.className='alerta bien';
    al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;
    document.getElementById('btn-rep').textContent='Repetir para afianzar';
  } else if(nivel_msg === 'medio'){
    al.className='alerta bien';
    al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;
    document.getElementById('btn-rep').textContent='Repetir con valores nuevos';
  } else {
    al.className='alerta rep';
    al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}.</strong><br>${msg.txt}`;
    document.getElementById('btn-rep').textContent='Repetir con valores nuevos';
  }
  const dots=document.getElementById('dots');
  dots.innerHTML='';
  resp.forEach((r,i)=>{
    const d=document.createElement('div');
    const ok=r===EJ[i].ok,nls=r===NLS;
    d.className='dot '+(ok?'ok':nls?'nls':'mal');
    dots.appendChild(d);
  });
  document.getElementById('reslista').innerHTML=resp.map((r,i)=>{
    const ok=r===EJ[i].ok,nls=r===NLS;
    const color=ok?'#085041':nls?'#5F5E5A':'#791F1F';
    const icono=ok?'✓':nls?'?':'✗';
    const txt=ok?'Correcta':nls?`No lo sé — correcta: ${LETRAS[EJ[i].ok]}`:`Incorrecta — correcta: ${LETRAS[EJ[i].ok]}`;
    return `<div style="color:${color}">${icono} P${i+1} (${EJ[i].hab}): ${txt}</div>`;
  }).join('');
}

function registrar(corr,incorr,nls,pct){
  if (window._modoDocente) return;
  var fecha=new Date().toLocaleDateString('es-CL',{timeZone:'America/Santiago'});
  var correo=document.getElementById('inp-correo').value.trim();
  var HAB_E=["Resolver problemas", "Representar", "Argumentar", "Modelar", "Representar", "Resolver problemas", "Argumentar", "Modelar"];
  var ejercicios=resp.map(function(r,i){
    if(r===4) return 2;
    return (r===EJ[i].ok)?1:0;
  });
  var falladas=[];
  resp.forEach(function(r,i){
    if(r!==EJ[i].ok&&falladas.indexOf(EJ[i].hab)===-1) falladas.push(EJ[i].hab);
  });
  // ── CÁLCULO LOGRO POR HABILIDAD ──────────────────────
  var HAB_MAP={e1:HAB_E[0],e2:HAB_E[1],e3:HAB_E[2],e4:HAB_E[3],e5:HAB_E[4],e6:HAB_E[5],e7:HAB_E[6],e8:HAB_E[7]};
  var habCorr={'Resolver problemas':0,'Modelar':0,'Representar':0,'Argumentar':0};
  var habTot={'Resolver problemas':0,'Modelar':0,'Representar':0,'Argumentar':0};
  ['e1','e2','e3','e4','e5','e6','e7','e8'].forEach(function(k,i){
    var h=HAB_MAP[k];
    habTot[h]=(habTot[h]||0)+1;
    if(ejercicios[i]===1) habCorr[h]=(habCorr[h]||0)+1;
  });
  var logroResolver=habTot['Resolver problemas']>0?Math.round(habCorr['Resolver problemas']/habTot['Resolver problemas']*100)/100:null;
  var logroModelar=habTot['Modelar']>0?Math.round(habCorr['Modelar']/habTot['Modelar']*100)/100:null;
  var logroRepresentar=habTot['Representar']>0?Math.round(habCorr['Representar']/habTot['Representar']*100)/100:null;
  var logroArgumentar=habTot['Argumentar']>0?Math.round(habCorr['Argumentar']/habTot['Argumentar']*100)/100:null;
  var params=[
    'fecha='+encodeURIComponent(fecha),
    'nombre='+encodeURIComponent(nombreEstudiante),
    'correo='+encodeURIComponent(correo),
    'tipo=individual',
    'grupo=NA',
    'guia=guia-U01.A.3c',
    'eje=E1',
    'unidad=U01',
    'subunidad=A',
    'nivel=c',
    'correctas='+corr,
    'incorrectas='+incorr,
    'nls='+nls,
    'logro='+(pct/100),
    'e1='+ejercicios[0],
    'e2='+ejercicios[1],
    'e3='+ejercicios[2],
    'e4='+ejercicios[3],
    'e5='+ejercicios[4],
    'e6='+ejercicios[5],
    'e7='+ejercicios[6],
    'e8='+ejercicios[7],
    'habilidades='+encodeURIComponent(falladas.join('|')),
    'logro_resolver='+(logroResolver!==null?logroResolver:''),'logro_modelar='+(logroModelar!==null?logroModelar:''),'logro_representar='+(logroRepresentar!==null?logroRepresentar:''),'logro_argumentar='+(logroArgumentar!==null?logroArgumentar:'')
  ].join('&');
  var img=new Image();
  img.src='https://script.google.com/macros/s/AKfycbzsGCpwyNNFC03rbCLUwnPLTHBAn5FZxEJrqq1JX0LrDAY7jmJRQ58bcdaQ8XtS6MM3/exec?'+params;
}

function volverPortal(){
  const params=new URLSearchParams(window.location.search);
  const nombre=params.get('nombre');
  const correo=params.get('correo');
  if(nombre&&correo){
    window.location.href='portal-estudiante.html?nombre='+encodeURIComponent(nombre)+'&correo='+encodeURIComponent(correo);
  } else {
    window.location.href='portal-estudiante.html';
  }
}
function reiniciar(){
  EJ=generarEjercicios();actual=0;resp=new Array(8).fill(null);sel=null;
  document.getElementById('zona-final').style.display='none';
  document.getElementById('zona-q').style.display='block';
  render();
}

// ── AUTO-IDENTIFICACIÓN DESDE PORTAL ──────────────────
// Si el estudiante llega desde el portal, nombre y correo
// vienen en la URL y se saltan el formulario
function autoIdentificar() {
  const params = new URLSearchParams(window.location.search);
  const nombre = params.get('nombre');
  const correo = params.get('correo');
  if (nombre && correo) {
    document.getElementById('inp-nombre').value = nombre;
    document.getElementById('inp-correo').value = correo;
    // Ocultar formulario y arrancar directo
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    nombreEstudiante = nombre;
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    render();
  }
}

// Modo docente — detección
function chequearModoDocente() {
  const params = new URLSearchParams(window.location.search);
  const modo = params.get('modo');
  // Modo docente — solo lectura, sin formulario ni registro
  if (modo === 'docente') {
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    nombreEstudiante = 'Vista docente';
    document.getElementById('inp-nombre').value = 'Vista docente';
    document.getElementById('inp-correo').value = 'docente@flashmate.cl';
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    window._modoDocente = true;
    render();
    return;
  }
}
window.addEventListener('load', function() {
  chequearModoDocente();
  autoIdentificar();
});
