<script>
const NLS=4;
const LETRAS=['A','B','C','D','E'];
let nombreEstudiante='';
let EJ=[],actual=0,resp=[],sel=null;

function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}

function generarEjercicios(){
  const EJ=[];
  const PRIMOS=[41,43,47,53,59,61,67,71,73,79,83,89,97];
  const NO_PRIMOS=[[51,'3×17'],[57,'3×19'],[91,'7×13'],[77,'7×11'],[87,'3×29'],[93,'3×31'],[111,'3×37']];

  // P1 — ¿Cuál es primo? (Resolver problemas)
  const primo=rnd(PRIMOS);
  const np=shuffle(NO_PRIMOS).slice(0,3);
  const ops1=shuffle([String(primo),...np.map(x=>String(x[0]))]);
  const ok1=ops1.indexOf(String(primo));
  EJ.push({hab:'Resolver problemas',hcss:'hab-rp',
    txt:'¿Cuál de los siguientes números es primo?',
    ops:ops1,ok:ok1,
    fb_ok:`Correcto. ${primo} es primo: sus únicos divisores son 1 y ${primo}. Los demás: ${np.map(x=>x[0]+' = '+x[1]).join(', ')}.`,
    fb_mal:`Un número primo tiene exactamente dos divisores. Los demás: ${np.map(x=>x[0]+' = '+x[1]).join(', ')}. Solo ${primo} es primo.`
  });

  // P2 — Divisores pares (Representar)
  const bases2=[24,36,48,60,72];
  const n2=rnd(bases2);
  const divs2=[];for(let i=1;i<=n2;i++)if(n2%i===0)divs2.push(i);
  const pares2=divs2.filter(x=>x%2===0);
  const ok2v=pares2.length;
  const w2=shuffle([ok2v-1,ok2v+1,ok2v+2,ok2v-2].filter(x=>x>0&&x!==ok2v)).slice(0,3);
  const ops2=shuffle([ok2v,...w2]).map(String);
  EJ.push({hab:'Representar',hcss:'hab-r',
    txt:`El conjunto de divisores de ${n2} es {${divs2.join(', ')}}. ¿Cuántos de esos divisores son números pares?`,
    ops:ops2,ok:ops2.indexOf(String(ok2v)),
    fb_ok:`Correcto. Los divisores pares de ${n2} son: ${pares2.join(', ')}. Total: ${ok2v}.`,
    fb_mal:`Los pares en {${divs2.join(',')}} son: ${pares2.join(', ')}. Total: ${ok2v}.`
  });

  // P3 — MCD (Resolver problemas)
  const pares3=[[36,48,12],[24,36,12],[60,84,12],[48,72,24],[30,45,15],[42,63,21]];
  const [a3,b3,mcd3]=rnd(pares3);
  const w3=shuffle([mcd3/2,mcd3*2,mcd3+3,mcd3-3].filter(x=>x>0&&x!==mcd3&&Number.isInteger(x))).slice(0,3);
  const ops3=shuffle([mcd3,...w3]).map(String);
  EJ.push({hab:'Resolver problemas',hcss:'hab-rp',
    txt:`¿Cuál es el Máximo Común Divisor (MCD) de ${a3} y ${b3}?`,
    ops:ops3,ok:ops3.indexOf(String(mcd3)),
    fb_ok:`Correcto. El MCD de ${a3} y ${b3} es ${mcd3}. Verifica: ${a3}÷${mcd3}=${a3/mcd3} y ${b3}÷${mcd3}=${b3/mcd3}, ambos enteros.`,
    fb_mal:`Para el MCD de ${a3} y ${b3}, busca el mayor divisor común. El resultado es ${mcd3}: ${a3}=${mcd3}×${a3/mcd3} y ${b3}=${mcd3}×${b3/mcd3}.`
  });

  // P4 — mcm en contexto (Modelar)
  const ctx4=[
    {t1:15,t2:20,mcm:60,cosa:'buses'},
    {t1:12,t2:18,mcm:36,cosa:'semáforos'},
    {t1:10,t2:15,mcm:30,cosa:'máquinas'},
    {t1:8,t2:12,mcm:24,cosa:'turnos'}
  ];
  const c4=rnd(ctx4);
  const w4=shuffle([c4.mcm/2,c4.mcm+c4.t1,c4.mcm-c4.t1,c4.mcm*2].filter(x=>x>0&&x!==c4.mcm&&Number.isInteger(x))).slice(0,3);
  const ops4=shuffle([c4.mcm,...w4]).map(x=>x+' minutos');
  EJ.push({hab:'Modelar',hcss:'hab-m',
    txt:`Dos ${c4.cosa} se activan al mismo tiempo. El primero se repite cada ${c4.t1} minutos y el segundo cada ${c4.t2} minutos. ¿Cada cuántos minutos coinciden nuevamente?`,
    ops:ops4,ok:ops4.indexOf(c4.mcm+' minutos'),
    fb_ok:`Correcto. Se calcula el mcm(${c4.t1},${c4.t2})=${c4.mcm} minutos.`,
    fb_mal:`Cuando dos eventos se repiten, el momento en que coinciden es el mcm. mcm(${c4.t1},${c4.t2})=${c4.mcm} minutos.`
  });

  // P5 — Argumentar: divisibilidad
  const dd5=rnd([[6,'2 y 3'],[4,'2 y 2'],[9,'3 y 3'],[12,'3 y 4']]);
  const [d5,fact5]=dd5;
  const [f5a,f5b]=fact5.split(' y ');
  EJ.push({hab:'Argumentar',hcss:'hab-a',
    txt:`Un estudiante afirma: "Todo número divisible por ${d5} también es divisible por ${f5a} y por ${f5b}". ¿Es correcta esta afirmación?`,
    ops:[
      `No, porque ${d5} no siempre es par`,
      `Sí, porque ${d5} = ${fact5.replace(' y ','×')} y ambos dividen a cualquier múltiplo de ${d5}`,
      `No, porque hay múltiplos de ${d5} que no son divisibles por ${f5b}`,
      `Sí, pero solo para números menores que 50`
    ],ok:1,
    fb_ok:`Correcto. Si n es múltiplo de ${d5}, entonces n=(${fact5.replace(' y ','×')})k, lo que garantiza divisibilidad por ambos factores.`,
    fb_mal:`Si n=${d5}k=(${fact5.replace(' y ','×')})k, entonces ${f5a} y ${f5b} dividen a n. La afirmación es correcta para todo número.`
  });

  // P6 — mcm directo (Resolver problemas)
  const pares6=[[8,12,24],[6,9,18],[10,15,30],[4,6,12],[9,15,45]];
  const [a6,b6,mcm6]=rnd(pares6);
  const w6=shuffle([mcm6/2,mcm6+a6,mcm6+b6,mcm6*2].filter(x=>x>0&&x!==mcm6&&Number.isInteger(x))).slice(0,3);
  const ops6=shuffle([mcm6,...w6]).map(String);
  EJ.push({hab:'Resolver problemas',hcss:'hab-rp',
    txt:`¿Cuál es el mínimo común múltiplo (mcm) de ${a6} y ${b6}?`,
    ops:ops6,ok:ops6.indexOf(String(mcm6)),
    fb_ok:`Correcto. mcm(${a6},${b6})=${mcm6}. Verifica: ${mcm6}÷${a6}=${mcm6/a6} y ${mcm6}÷${b6}=${mcm6/b6}, ambos enteros.`,
    fb_mal:`El mcm es el menor número divisible por ambos. mcm(${a6},${b6})=${mcm6}.`
  });

  // P7 — Par/Impar falsa (Representar)
  const falsas7=[
    {txt:'La suma de un número par y uno impar siempre es par',ej:'4+3=7 (impar)',expl:'par + impar = impar siempre.'},
    {txt:'El producto de un número par y uno impar siempre es impar',ej:'4×3=12 (par)',expl:'par × cualquier número = par siempre.'},
    {txt:'La suma de tres números impares siempre es par',ej:'1+3+5=9 (impar)',expl:'impar+impar+impar = impar.'},
  ];
  const f7=rnd(falsas7);
  const ver7=shuffle([
    'La suma de dos números impares siempre es par',
    'El cuadrado de un número impar siempre es impar',
    'El producto de dos números impares siempre es impar',
    'La suma de dos números pares siempre es par'
  ]).slice(0,3);
  const ops7=shuffle([f7.txt,...ver7]);
  EJ.push({hab:'Representar',hcss:'hab-r',
    txt:'¿Cuál de las siguientes afirmaciones sobre números pares e impares es FALSA?',
    ops:ops7,ok:ops7.indexOf(f7.txt),
    fb_ok:`Correcto. Es falsa porque: ${f7.expl} Ejemplo: ${f7.ej}.`,
    fb_mal:`La afirmación falsa es: "${f7.txt}". Contraejemplo: ${f7.ej}. ${f7.expl}`
  });

  // P8 — mcm contexto lotes (Modelar)
  const lotes8=[
    {l1:18,l2:24,mcm:72,cosa:'cajas'},
    {l1:15,l2:25,mcm:75,cosa:'unidades'},
    {l1:12,l2:20,mcm:60,cosa:'piezas'},
    {l1:16,l2:24,mcm:48,cosa:'paquetes'}
  ];
  const c8=rnd(lotes8);
  const w8=shuffle([c8.mcm-c8.l1,c8.mcm+c8.l2,c8.mcm/2,c8.mcm+c8.l1].filter(x=>x>0&&x!==c8.mcm&&Number.isInteger(x))).slice(0,3);
  const ops8=shuffle([c8.mcm,...w8]).map(String);
  EJ.push({hab:'Modelar',hcss:'hab-m',
    txt:`Una fábrica empaca ${c8.cosa} en cajas de ${c8.l1} o de ${c8.l2} unidades. ¿Cuál es la menor cantidad de ${c8.cosa} que permite llenar exactamente cualquiera de los dos tipos de caja sin que sobre ninguna?`,
    ops:ops8,ok:ops8.indexOf(String(c8.mcm)),
    fb_ok:`Correcto. Se necesita el mcm(${c8.l1},${c8.l2})=${c8.mcm} ${c8.cosa}. Con esa cantidad: ${c8.mcm/c8.l1} cajas de ${c8.l1} o ${c8.mcm/c8.l2} cajas de ${c8.l2}.`,
    fb_mal:`La menor cantidad múltiplo de ${c8.l1} y de ${c8.l2} es el mcm(${c8.l1},${c8.l2})=${c8.mcm}.`
  });

  return EJ;
}

function hcss(h){
  if(h==='Resolver problemas')return 'hab-rp';
  if(h==='Modelar')return 'hab-m';
  if(h==='Representar')return 'hab-r';
  return 'hab-a';
}

function validarCorreo(correo){
  if(correo.indexOf('@')===-1) return false;
  var partes=correo.split('@');
  if(partes.length!==2) return false;
  if(partes[0].length===0) return false;
  if(partes[1].indexOf('.')===-1) return false;
  var dominio=partes[1].split('.');
  if(dominio[0].length===0) return false;
  if(dominio[dominio.length-1].length<2) return false;
  return true;
}
function iniciar(){
  const nom=document.getElementById('inp-nombre').value.trim();
  const cor=document.getElementById('inp-correo').value.trim();
  if(!nom||!cor){document.getElementById('error-ident').style.display='block';return;}
  if(!validarCorreo(cor)){document.getElementById('error-ident').textContent='Por favor ingresa un correo válido. Ejemplo: nombre@gmail.com';document.getElementById('error-ident').style.display='block';return;}
  document.getElementById('error-ident').textContent='Por favor completa tu nombre y correo.';
  nombreEstudiante=nom;
  document.getElementById('zona-ident').style.display='none';
  document.getElementById('zona-q').style.display='block';
  EJ=generarEjercicios();
  resp=new Array(8).fill(null);
  actual=0;sel=null;
  render();
}

function render(){
  const e=EJ[actual];
  document.getElementById('qnum').textContent=`Pregunta ${actual+1} de 8`;
  document.getElementById('barra').style.width=((actual+1)/8*100)+'%';
  document.getElementById('htag').innerHTML=`<span class="hab-tag ${hcss(e.hab)}">${e.hab}</span>`;
  document.getElementById('qtxt').textContent=e.txt;
  sel=null;
  const od=document.getElementById('opts');
  od.innerHTML='';
  e.ops.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt';d.id='op'+i;
    d.innerHTML=`<div class="letra">${LETRAS[i]}</div><span class="otxt">${o}</span>`;
    d.onclick=()=>elegir(i);
    od.appendChild(d);
  });
  const nls=document.createElement('div');
  nls.className='opt nls';nls.id='op4';
  nls.innerHTML=`<div class="letra" style="border-style:dashed">E</div><span class="otxt">No lo sé</span>`;
  nls.onclick=()=>elegir(4);
  od.appendChild(nls);
  document.getElementById('fb').style.display='none';
  document.getElementById('btnc').style.display='inline-block';
  document.getElementById('btnc').disabled=true;
  document.getElementById('btns').style.display='none';
}

function elegir(i){
  if(document.getElementById('btnc').style.display==='none')return;
  document.querySelectorAll('.opt').forEach(d=>d.classList.remove('sel'));
  document.getElementById('op'+i).classList.add('sel');
  sel=i;document.getElementById('btnc').disabled=false;
}

function confirmar(){
  if(sel===null)return;
  const e=EJ[actual];resp[actual]=sel;
  const esNls=sel===NLS;
  const esOk=!esNls&&sel===e.ok;
  document.querySelectorAll('.opt').forEach((d,i)=>{
    d.onclick=null;
    if(i===NLS){d.className='opt nls dis';return;}
    if(i===e.ok)d.className='opt '+(esOk?'ok':'show');
    else if(i===sel&&!esOk&&!esNls)d.className='opt mal';
    else d.className='opt dis';
  });
  const fb=document.getElementById('fb');
  if(esNls){
    fb.className='fb nls';
    fb.textContent=`La respuesta correcta es ${LETRAS[e.ok]}: ${e.ops[e.ok]}. ${e.fb_mal}`;
  } else {
    fb.className='fb '+(esOk?'ok':'mal');
    fb.textContent=esOk?e.fb_ok:e.fb_mal;
  }
  fb.style.display='block';
  document.getElementById('btnc').style.display='none';
  const bs=document.getElementById('btns');
  bs.style.display='inline-block';
  bs.textContent=actual<7?'Siguiente →':'Ver resultados →';
}

function siguiente(){
  if(actual<7){actual++;render();}
  else mostrarFinal();
}

function mostrarFinal(){
  document.getElementById('zona-q').style.display='none';
  document.getElementById('zona-final').style.display='block';
  document.getElementById('barra').style.width='100%';
  const corr=resp.filter((r,i)=>r===EJ[i].ok).length;
  const nlsC=resp.filter(r=>r===NLS).length;
  const incorrectas=8-corr-nlsC;
  const pct=Math.round(corr/8*100);
  document.getElementById('pje').textContent=corr+' / 8 correctas';
  registrar(corr,incorrectas,nlsC,pct);
  document.getElementById('pmsg').textContent=pct+'% de logro'+(nlsC>0?` · ${nlsC} sin responder`:'');
  const al=document.getElementById('alerta');
  // Frases por nivel — rotan aleatoriamente
  const MSGS = {
    alto: [
      {titulo:'🔥 ¡Dominaste esta guía!', txt:'Tu cerebro matemático está encendido. Puedes avanzar con confianza.'},
      {titulo:'⚡ ¡Excelente nivel!', txt:'Eso es exactamente el nivel PAES que necesitas. ¡Sigue así!'},
      {titulo:'🎯 ¡Puntazo!', txt:'Cada guía así te acerca más al puntaje que quieres.'},
      {titulo:'🚀 ¡Así se hace!', txt:'Estás construyendo una base sólida. Tu esfuerzo se nota.'},
      {titulo:'🌟 ¡Brillante!', txt:'Logro de '+pct+'%. Eso no es suerte, es práctica constante.'}
    ],
    medio: [
      {titulo:'💪 ¡Vas bien!', txt:'Una repetición más y esta guía será tuya. ¡Tú puedes!'},
      {titulo:'📈 Buen avance', txt:'Estás construyendo algo sólido. Repite y confirma lo que aprendiste.'},
      {titulo:'✨ ¡Ya casi!', txt:'Con un intento más lo dominas. El progreso ya es visible.'},
      {titulo:'🎯 En camino', txt:'Cada intento te acerca más. Repite sin presión, con foco.'},
      {titulo:'⚡ Sigue sumando', txt:''+pct+'% de logro. Repite una vez más y lo tendrás dominado.'}
    ],
    bajo: [
      {titulo:'💡 Esta guía te está enseñando algo importante', txt:'Cada error es información valiosa. Inténtalo de nuevo con calma.'},
      {titulo:'🧠 Así funciona el aprendizaje real', txt:'Los errores son parte del proceso. Repite antes de avanzar.'},
      {titulo:'🔄 No te rindas', txt:'Los conceptos nuevos necesitan más de un intento. ¡Vuelta a intentarlo!'},
      {titulo:'💪 El desafío es parte del camino', txt:'Repite esta guía. Con práctica constante lo lograrás.'},
      {titulo:'🌱 Aquí es donde más se aprende', txt:'Revisa las retroalimentaciones y vuelve a intentarlo. ¡Confía en el proceso!'}
    ]
  };
  const nivel_msg = pct >= 75 ? 'alto' : pct >= 50 ? 'medio' : 'bajo';
  const lista = MSGS[nivel_msg];
  const msg = lista[Math.floor(Math.random()*lista.length)];
  if(nivel_msg === 'alto'){
    al.className='alerta bien';
    al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;
    document.getElementById('btn-rep').textContent='Repetir para afianzar';
  } else if(nivel_msg === 'medio'){
    al.className='alerta bien';
    al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;
    document.getElementById('btn-rep').textContent='Repetir con valores nuevos';
  } else {
    al.className='alerta rep';
    al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}.</strong><br>${msg.txt}`;
    document.getElementById('btn-rep').textContent='Repetir con valores nuevos';
  }
  const dots=document.getElementById('dots');
  dots.innerHTML='';
  resp.forEach((r,i)=>{
    const d=document.createElement('div');
    const ok=r===EJ[i].ok,nls=r===NLS;
    d.className='dot '+(ok?'ok':nls?'nls':'mal');
    dots.appendChild(d);
  });
  document.getElementById('reslista').innerHTML=resp.map((r,i)=>{
    const ok=r===EJ[i].ok,nls=r===NLS;
    const color=ok?'#085041':nls?'#5F5E5A':'#791F1F';
    const icono=ok?'✓':nls?'?':'✗';
    const txt=ok?'Correcta':nls?`No lo sé — correcta: ${LETRAS[EJ[i].ok]}`:`Incorrecta — correcta: ${LETRAS[EJ[i].ok]}`;
    return `<div style="color:${color}">${icono} P${i+1} (${EJ[i].hab}): ${txt}</div>`;
  }).join('');
}

function registrar(corr,incorr,nls,pct){
  var fecha=new Date().toLocaleDateString('es-CL',{timeZone:'America/Santiago'});
  var correo=document.getElementById('inp-correo').value.trim();
  var ejercicios=resp.map(function(r,i){
    if(r===4) return 2;
    return (r===EJ[i].ok)?1:0;
  });
  var falladas=[];
  resp.forEach(function(r,i){
    if(r!==EJ[i].ok&&falladas.indexOf(EJ[i].hab)===-1) falladas.push(EJ[i].hab);
  });
  var params=[
    'fecha='+encodeURIComponent(fecha),
    'nombre='+encodeURIComponent(nombreEstudiante),
    'correo='+encodeURIComponent(correo),
    'tipo=individual',
    'grupo=NA',
    'guia=guia-U01.A.1a',
    'eje=E1',
    'unidad=U01',
    'subunidad=A',
    'nivel=a',
    'correctas='+corr,
    'incorrectas='+incorr,
    'nls='+nls,
    'logro='+(pct/100),
    'e1='+ejercicios[0],
    'e2='+ejercicios[1],
    'e3='+ejercicios[2],
    'e4='+ejercicios[3],
    'e5='+ejercicios[4],
    'e6='+ejercicios[5],
    'e7='+ejercicios[6],
    'e8='+ejercicios[7],
    'habilidades='+encodeURIComponent(falladas.join('|'))
  ].join('&');
  var img=new Image();
  img.src='https://script.google.com/macros/s/AKfycbzsGCpwyNNFC03rbCLUwnPLTHBAn5FZxEJrqq1JX0LrDAY7jmJRQ58bcdaQ8XtS6MM3/exec?'+params;
}
function reiniciar(){
  EJ=generarEjercicios();actual=0;resp=new Array(8).fill(null);sel=null;
  document.getElementById('zona-final').style.display='none';
  document.getElementById('zona-q').style.display='block';
  render();
}

// ── AUTO-IDENTIFICACIÓN DESDE PORTAL ──────────────────
// Si el estudiante llega desde el portal, nombre y correo
// vienen en la URL y se saltan el formulario
function autoIdentificar() {
  const params = new URLSearchParams(window.location.search);
  const nombre = params.get('nombre');
  const correo = params.get('correo');
  if (nombre && correo) {
    document.getElementById('inp-nombre').value = nombre;
    document.getElementById('inp-correo').value = correo;
    // Ocultar formulario y arrancar directo
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    nombreEstudiante = nombre;
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    render();
  }
}
// Ejecutar al cargar la página
window.addEventListener('load', autoIdentificar);
</script>
