  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

<script>
const NLS=4,LETRAS=['A','B','C','D','E'];
let nombreEstudiante='',EJ=[],actual=0,resp=[],sel=null;
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function hcss(h){if(h==='Resolver problemas')return 'hab-rp';if(h==='Modelar')return 'hab-m';if(h==='Representar')return 'hab-r';return 'hab-a';}

function generarEjercicios(){
  const EJ=[];

  // P1 — Resolver problemas: sueldo base + comisión, despejar ventas
  const base1=rnd([215000,180000,200000,250000]);
  const pctCom=rnd([5,6,8,10]);
  const metaSueldo=rnd([317000,290000,340000,380000]);
  const comisionNec=metaSueldo-base1;
  const ventasNec=Math.round(comisionNec/(pctCom/100));
  const w1=shuffle([ventasNec+100000,ventasNec-50000,ventasNec*2,Math.round(metaSueldo/(pctCom/100))]).filter(x=>x!==ventasNec).slice(0,3);
  const ops1=shuffle([ventasNec,...w1]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Resolver problemas',
    txt:`Una vendedora tiene sueldo base de $${base1.toLocaleString('es-CL')} más ${pctCom}% de comisión. ¿Cuánto debe vender para ganar $${metaSueldo.toLocaleString('es-CL')}?`,
    ops:ops1, ok:ops1.indexOf('$'+ventasNec.toLocaleString('es-CL')),
    fb_ok:`Correcto. Comisión necesaria = ${metaSueldo.toLocaleString('es-CL')}−${base1.toLocaleString('es-CL')} = $${comisionNec.toLocaleString('es-CL')}. Ventas = ${comisionNec.toLocaleString('es-CL')} ÷ 0,0${pctCom} = $${ventasNec.toLocaleString('es-CL')}.`,
    fb_mal:`Comisión necesaria: ${metaSueldo.toLocaleString('es-CL')}−${base1.toLocaleString('es-CL')}=$${comisionNec.toLocaleString('es-CL')}. Ventas = ${comisionNec.toLocaleString('es-CL')} ÷ ${pctCom/100} = $${ventasNec.toLocaleString('es-CL')}.`
  });

  // P2 — Modelar: nota ponderada con porcentajes
  const pctParc=rnd([60,70,75,80]);
  const pctExam=100-pctParc;
  const notaParc=rnd([4.5,5.0,5.5,6.0]);
  const notaExam=rnd([2.0,2.5,3.0,3.5]);
  const notaFinal=Math.round((pctParc/100*notaParc + pctExam/100*notaExam)*100)/100;
  const exprCorr=`0,${pctParc<10?'0'+pctParc:pctParc}·${notaParc} + 0,${pctExam<10?'0'+pctExam:pctExam}·${notaExam}`;
  const exprMal=`0,${pctExam<10?'0'+pctExam:pctExam}·${notaParc} + 0,${pctParc<10?'0'+pctParc:pctParc}·${notaExam}`;
  EJ.push({hab:'Modelar',
    txt:`La nota final es: ${pctParc}% del promedio de parciales + ${pctExam}% del examen. Un estudiante sacó ${notaParc} en parciales y ${notaExam} en el examen. ¿Cuál expresión calcula su nota final?`,
    ops:[exprCorr, exprMal, `${pctParc}·${notaParc} + ${pctExam}·${notaExam}`, `0,${pctParc<10?'0'+pctParc:pctParc}·${notaExam} + 0,${pctExam<10?'0'+pctExam:pctExam}·${notaParc}`], ok:0,
    fb_ok:`Correcto. ${pctParc}% de parciales + ${pctExam}% de examen = 0,${pctParc<10?'0'+pctParc:pctParc}×${notaParc} + 0,${pctExam<10?'0'+pctExam:pctExam}×${notaExam} = ${notaFinal}.`,
    fb_mal:`El ${pctParc}% corresponde a parciales (${notaParc}) y el ${pctExam}% al examen (${notaExam}). Expresión correcta: ${exprCorr} = ${notaFinal}.`
  });

  // P3 — Argumentar: reducción y recuperación no son simétricas
  const cauceN=rnd([800,600,1000,750]);
  const pctRed=rnd([37.5,20,25,40]);
  const cauceRed=cauceN*(1-pctRed/100);
  const pctRecupera=Math.round((cauceN-cauceRed)/cauceRed*100*10)/10;
  const w3=shuffle([pctRed,pctRed+10,pctRecupera+5,100-pctRed]).filter(x=>x!==pctRecupera).slice(0,3);
  const ops3=shuffle([pctRecupera,...w3]).map(x=>x+'%');
  EJ.push({hab:'Argumentar',
    txt:`Un canal lleva ${cauceN} L/s. En días no hábiles se reduce un ${pctRed}%. ¿En qué % debe aumentar desde ese nivel reducido para volver al nivel normal?`,
    ops:ops3, ok:ops3.indexOf(pctRecupera+'%'),
    fb_ok:`Correcto. Nivel reducido = ${cauceN}×${1-pctRed/100} = ${cauceRed} L/s. Para volver: (${cauceN}−${cauceRed})/${cauceRed}×100 = ${pctRecupera}%. Reducir X% y recuperar X% no es simétrico.`,
    fb_mal:`Nivel reducido = ${cauceRed} L/s. Recuperación = (${cauceN-cauceRed}/${cauceRed})×100 = ${pctRecupera}%. El % de recuperación se calcula sobre la BASE REDUCIDA, no la original.`
  });

  // P4 — Resolver problemas: interés simple — tasa a partir de datos
  const capital4=rnd([500000,750000,600000,1000000]);
  const dias4=rnd([24,30,36,60]);
  const interes4=rnd([2000,3000,2500,4000]);
  const tasaAnual=Math.round(interes4/(capital4*dias4/360)*100);
  const w4=shuffle([tasaAnual+1,tasaAnual-1,tasaAnual+2,tasaAnual-2]).filter(x=>x>0&&x!==tasaAnual).slice(0,3);
  const ops4=shuffle([tasaAnual,...w4]).map(x=>x+'%');
  EJ.push({hab:'Resolver problemas',
    txt:`Se invirtieron $${capital4.toLocaleString('es-CL')} y en ${dias4} días produjeron $${interes4.toLocaleString('es-CL')} de interés. ¿A qué tasa anual más cercana corresponde? (año = 360 días)`,
    ops:ops4, ok:ops4.indexOf(tasaAnual+'%'),
    fb_ok:`Correcto. Interés anual proporcional = ${interes4.toLocaleString('es-CL')} × (360/${dias4}) = $${(interes4*360/dias4).toLocaleString('es-CL')}. Tasa = ${(interes4*360/dias4).toLocaleString('es-CL')}/${capital4.toLocaleString('es-CL')} × 100 = ${tasaAnual}%.`,
    fb_mal:`Escala el interés a anual: ${interes4.toLocaleString('es-CL')} × 360/${dias4} = $${(interes4*360/dias4).toLocaleString('es-CL')}. Tasa = ${tasaAnual}%.`
  });

  // P5 — Modelar: interés simple — calcular interés
  const capital5=rnd([20000,30000,40000,50000]);
  const tasa5=rnd([4,5,6,8]);
  const dias5=rnd([60,90,120,180]);
  const interes5=Math.round(capital5*tasa5/100*dias5/360);
  const w5=shuffle([interes5*4,interes5*2,capital5*(1+tasa5/100),interes5+500]).filter(x=>x!==interes5).slice(0,3);
  const ops5=shuffle([interes5,...w5]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Modelar',
    txt:`Calcula el interés simple de $${capital5.toLocaleString('es-CL')} durante ${dias5} días a una tasa anual del ${tasa5}%. (Año = 360 días.)`,
    ops:ops5, ok:ops5.indexOf('$'+interes5.toLocaleString('es-CL')),
    fb_ok:`Correcto. I = C×i×t = ${capital5.toLocaleString('es-CL')} × 0,0${tasa5} × (${dias5}/360) = $${interes5.toLocaleString('es-CL')}. El tiempo se expresa en años: ${dias5}/360 = ${Math.round(dias5/360*100)/100}.`,
    fb_mal:`I = C × i × t = ${capital5.toLocaleString('es-CL')} × ${tasa5/100} × ${dias5/360} = $${interes5.toLocaleString('es-CL')}.`
  });

  // P6 — Modelar: interés compuesto — monto final
  const capital6=rnd([200000,300000,400000,500000]);
  const tasa6=rnd([5,6,8,10]);
  const años6=rnd([3,4,5]);
  const factor6=Math.round(Math.pow(1+tasa6/100,años6)*100)/100;
  const monto6=Math.round(capital6*factor6);
  const w6=shuffle([monto6+10000,capital6*(1+tasa6/100*años6),monto6-15000,monto6+25000]).map(Math.round).filter(x=>x!==monto6).slice(0,3);
  const ops6=shuffle([monto6,...w6]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Modelar',
    txt:`Se invierten $${capital6.toLocaleString('es-CL')} a interés compuesto del ${tasa6}% anual durante ${años6} años. ¿Cuál es el monto total? Considera (1,0${tasa6})^${años6} = ${factor6}.`,
    ops:ops6, ok:ops6.indexOf('$'+monto6.toLocaleString('es-CL')),
    fb_ok:`Correcto. M = ${capital6.toLocaleString('es-CL')} × ${factor6} = $${monto6.toLocaleString('es-CL')}. En interés compuesto los intereses se capitalizan: genera interés sobre los intereses acumulados.`,
    fb_mal:`M = Capital × (1+i)^n = ${capital6.toLocaleString('es-CL')} × ${factor6} = $${monto6.toLocaleString('es-CL')}.`
  });

  // P7 — Argumentar: relaciones algebraicas con % encadenados
  EJ.push({hab:'Argumentar',
    txt:'Si el a% del 5% de b es c, y el b% del 10% de c es a, ¿cuál es la relación entre a y c?',
    ops:['a = c','a = 2c','c = 2a','a · c = 200'], ok:0,
    fb_ok:'Correcto. Ec.1: (a/100)(5/100)b=c → 5ab=10.000c. Ec.2: (b/100)(10/100)c=a → 10bc=10.000a. Multiplicando y simplificando: a=c.',
    fb_mal:'Plantea las ecuaciones: 5ab/10.000=c y 10bc/10.000=a. De la segunda: b=10.000a/(10c)=1000a/c. Sustituyendo en la primera se llega a a=c.'
  });

  // P8 — Resolver problemas: despejar capital dado interés y tasa
  const interes8=rnd([60000,80000,97000,120000]);
  const tasa8=rnd([2,3,4,5]);
  const capital8=Math.round(interes8/(tasa8/100));
  const w8=shuffle([capital8*2,capital8/2,interes8*tasa8,capital8+500000]).map(Math.round).filter(x=>x!==capital8).slice(0,3);
  const ops8=shuffle([capital8,...w8]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Resolver problemas',
    txt:`Un banco ingresó $${interes8.toLocaleString('es-CL')} como interés anual en una cuenta al ${tasa8}% anual. ¿Cuál es el capital de esa cuenta?`,
    ops:ops8, ok:ops8.indexOf('$'+capital8.toLocaleString('es-CL')),
    fb_ok:`Correcto. I = C×i → C = I/i = ${interes8.toLocaleString('es-CL')} ÷ 0,0${tasa8} = $${capital8.toLocaleString('es-CL')}. Se despeja C de la fórmula de interés simple.`,
    fb_mal:`C = I ÷ i = ${interes8.toLocaleString('es-CL')} ÷ ${tasa8/100} = $${capital8.toLocaleString('es-CL')}.`
  });

  return EJ;
}

function validarCorreo(c){if(c.indexOf('@')===-1)return false;var p=c.split('@');if(p.length!==2||!p[0].length)return false;if(p[1].indexOf('.')===-1)return false;var d=p[1].split('.');return d[0].length>0&&d[d.length-1].length>=2;}
function iniciar(){
  const nom=document.getElementById('inp-nombre').value.trim(),cor=document.getElementById('inp-correo').value.trim();
  if(!nom||!cor){document.getElementById('error-ident').style.display='block';return;}
  if(!validarCorreo(cor)){document.getElementById('error-ident').textContent='Correo inválido.';document.getElementById('error-ident').style.display='block';return;}
  nombreEstudiante=nom;document.getElementById('zona-ident').style.display='none';document.getElementById('zona-q').style.display='block';
  EJ=generarEjercicios();resp=new Array(8).fill(null);actual=0;sel=null;render();
}
function render(){
  const e=EJ[actual];
  document.getElementById('qnum').textContent=`Pregunta ${actual+1} de 8`;
  document.getElementById('barra').style.width=((actual+1)/8*100)+'%';
  document.getElementById('htag').innerHTML=`<span class="hab-tag ${hcss(e.hab)}">${e.hab}</span>`;
  document.getElementById('qtxt').textContent=e.txt;sel=null;
  const od=document.getElementById('opts');od.innerHTML='';
  e.ops.forEach((o,i)=>{const d=document.createElement('div');d.className='opt';d.id='op'+i;d.innerHTML=`<div class="letra">${LETRAS[i]}</div><span class="otxt">${o}</span>`;d.onclick=()=>elegir(i);od.appendChild(d);});
  const nls=document.createElement('div');nls.className='opt nls';nls.id='op4';nls.innerHTML=`<div class="letra" style="border-style:dashed">E</div><span class="otxt">No lo sé</span>`;nls.onclick=()=>elegir(4);od.appendChild(nls);
  document.getElementById('fb').style.display='none';document.getElementById('btnc').style.display='inline-block';document.getElementById('btnc').disabled=true;document.getElementById('btns').style.display='none';
}
function elegir(i){if(document.getElementById('btnc').style.display==='none')return;document.querySelectorAll('.opt').forEach(d=>d.classList.remove('sel'));document.getElementById('op'+i).classList.add('sel');sel=i;document.getElementById('btnc').disabled=false;}
function confirmar(){
  if(sel===null)return;const e=EJ[actual];resp[actual]=sel;const esNls=sel===NLS,esOk=!esNls&&sel===e.ok;
  document.querySelectorAll('.opt').forEach((d,i)=>{d.onclick=null;if(i===NLS){d.className='opt nls dis';return;}if(i===e.ok)d.className='opt '+(esOk?'ok':'show');else if(i===sel&&!esOk&&!esNls)d.className='opt mal';else d.className='opt dis';});
  const fb=document.getElementById('fb');
  if(esNls){fb.className='fb nls';fb.textContent=`La respuesta correcta es ${LETRAS[e.ok]}: ${e.ops[e.ok]}. ${e.fb_mal}`;}
  else{fb.className='fb '+(esOk?'ok':'mal');fb.textContent=esOk?e.fb_ok:e.fb_mal;}
  fb.style.display='block';document.getElementById('btnc').style.display='none';
  const bs=document.getElementById('btns');bs.style.display='inline-block';bs.textContent=actual<7?'Siguiente →':'Ver resultados →';
}
function siguiente(){if(actual<7){actual++;render();}else mostrarFinal();}
function mostrarFinal(){
  document.getElementById('zona-q').style.display='none';document.getElementById('zona-final').style.display='block';document.getElementById('barra').style.width='100%';
  const corr=resp.filter((r,i)=>r===EJ[i].ok).length,nlsC=resp.filter(r=>r===NLS).length,incorrectas=8-corr-nlsC,pct=Math.round(corr/8*100);
  document.getElementById('pje').textContent=corr+' / 8 correctas';registrar(corr,incorrectas,nlsC,pct);
  document.getElementById('pmsg').textContent=pct+'% de logro'+(nlsC>0?` · ${nlsC} sin responder`:'');
  const al=document.getElementById('alerta');
  if(incorrectas>3){al.className='alerta rep';al.innerHTML=`<strong>Se sugiere repetir esta guía.</strong><br>Tuviste ${incorrectas} respuestas incorrectas. Repasa y vuelve a intentarlo.`;document.getElementById('btn-rep').textContent='Repetir con valores nuevos';}
  else{al.className='alerta bien';al.innerHTML=`<strong>¡Muy bien, ${nombreEstudiante}!</strong> Obtuviste ${corr}/8 (${pct}%). Puedes avanzar a la siguiente guía.`;document.getElementById('btn-rep').textContent='Te invito a repetir de todas formas';}
  const dots=document.getElementById('dots');dots.innerHTML='';
  resp.forEach((r,i)=>{const d=document.createElement('div');d.className='dot '+(r===EJ[i].ok?'ok':r===NLS?'nls':'mal');dots.appendChild(d);});
  document.getElementById('reslista').innerHTML=resp.map((r,i)=>{const ok=r===EJ[i].ok,nls=r===NLS;const color=ok?'#085041':nls?'#5F5E5A':'#791F1F';const icono=ok?'✓':nls?'?':'✗';const txt=ok?'Correcta':nls?`No lo sé — correcta: ${LETRAS[EJ[i].ok]}`:`Incorrecta — correcta: ${LETRAS[EJ[i].ok]}`;return `<div style="color:${color}">${icono} P${i+1} (${EJ[i].hab}): ${txt}</div>`;}).join('');
}
function registrar(corr,incorr,nls,pct){
  var fecha=new Date().toLocaleDateString('es-CL',{timeZone:'America/Santiago'});
  var correo=document.getElementById('inp-correo').value.trim();
  var ejercicios=resp.map(function(r,i){return r===4?2:(r===EJ[i].ok?1:0);});
  var falladas=[];resp.forEach(function(r,i){if(r!==EJ[i].ok&&falladas.indexOf(EJ[i].hab)===-1)falladas.push(EJ[i].hab);});
  var params=['fecha='+encodeURIComponent(fecha),'nombre='+encodeURIComponent(nombreEstudiante),'correo='+encodeURIComponent(correo),'tipo=individual','grupo=NA','guia=guia-U02.A.5c','eje=E1','unidad=U02','subunidad=A','nivel=c','correctas='+corr,'incorrectas='+incorr,'nls='+nls,'logro='+(pct/100),'e1='+ejercicios[0],'e2='+ejercicios[1],'e3='+ejercicios[2],'e4='+ejercicios[3],'e5='+ejercicios[4],'e6='+ejercicios[5],'e7='+ejercicios[6],'e8='+ejercicios[7],'habilidades='+encodeURIComponent(falladas.join('|'))].join('&');
  var img=new Image();img.src='https://script.google.com/macros/s/AKfycbzsGCpwyNNFC03rbCLUwnPLTHBAn5FZxEJrqq1JX0LrDAY7jmJRQ58bcdaQ8XtS6MM3/exec?'+params;
}
function reiniciar(){EJ=generarEjercicios();actual=0;resp=new Array(8).fill(null);sel=null;document.getElementById('zona-final').style.display='none';document.getElementById('zona-q').style.display='block';render();}
</script>
</body></html>
