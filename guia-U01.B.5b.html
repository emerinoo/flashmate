<script>
const NLS=4,LETRAS=['A','B','C','D','E'];
let nombreEstudiante='',EJ=[],actual=0,resp=[],sel=null;
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function hcss(h){if(h==='Resolver problemas')return 'hab-rp';if(h==='Modelar')return 'hab-m';if(h==='Representar')return 'hab-r';return 'hab-a';}

function generarEjercicios(){
  const EJ=[];

  // P1 — Modelar: elevador con subterráneos
  const pIni=rnd([-3,-2,-1]);
  const mov=[rnd([7,8,9,10]),rnd([-3,-4,-5]),rnd([2,3,4])];
  const pFin=pIni+mov[0]+mov[1]+mov[2];
  const w1=shuffle([pFin+1,pFin-1,pFin+2,pFin-2]).slice(0,3);
  const ops1=shuffle([pFin,...w1]).map(x=>'Piso '+x);
  EJ.push({hab:'Modelar',
    txt:`Un edificio tiene subterráneos (−1, −2, −3) y pisos sobre el suelo. Un elevador parte del piso ${pIni}, sube ${mov[0]} pisos, baja ${Math.abs(mov[1])} y sube ${mov[2]}. ¿En qué piso queda?`,
    ops:ops1,ok:ops1.indexOf('Piso '+pFin),
    fb_ok:`Correcto. ${pIni} + ${mov[0]} = ${pIni+mov[0]}. Luego ${pIni+mov[0]} ${mov[1]} = ${pIni+mov[0]+mov[1]}. Finalmente + ${mov[2]} = ${pFin}.`,
    fb_mal:`Paso a paso: ${pIni}+${mov[0]}=${pIni+mov[0]}; ${pIni+mov[0]}${mov[1]}=${pIni+mov[0]+mov[1]}; +${mov[2]}=${pFin}. Los subterráneos son enteros negativos.`
  });

  // P2 — Argumentar: tres proposiciones verdaderas/falsas
  EJ.push({hab:'Argumentar',
    txt:'¿Cuál o cuáles de las siguientes afirmaciones sobre enteros son SIEMPRE verdaderas?\nI. El producto de tres enteros negativos es negativo.\nII. La suma de un entero con su opuesto es cero.\nIII. El cuadrado de cualquier entero negativo es positivo.',
    ops:['Solo I','Solo II','I y III','I, II y III'],ok:3,
    fb_ok:'Correcto. I: (−)×(−)×(−)=(+)×(−)=negativo ✓. II: n+(−n)=0 siempre ✓. III: (−n)²=n²>0 para n≠0 ✓. Las tres son verdaderas.',
    fb_mal:'I: neg×neg×neg=pos×neg=negativo ✓. II: n+(−n)=0 es la propiedad del inverso aditivo ✓. III: (−n)²=n²>0 siempre ✓. Las tres son correctas.'
  });

  // P3 — Resolver problemas: empresa con balances trimestrales
  const q=[rnd([-4000,-3200,-5000]),rnd([1500,1800,2200]),rnd([-800,-1200,-900])];
  const saldoQ3=q[0]+q[1]+q[2];
  const meta=rnd([400,500,600]);
  const necesita=meta-saldoQ3;
  const w3=shuffle([necesita+300,necesita-200,necesita+500,necesita-400]).slice(0,3);
  const ops3=shuffle([necesita,...w3]).map(x=>'$'+Math.abs(x).toLocaleString('es-CL'));
  EJ.push({hab:'Resolver problemas',
    txt:`Una empresa registró: Q1: $${q[0].toLocaleString('es-CL')}, Q2: $${q[1].toLocaleString('es-CL')}, Q3: $${q[2].toLocaleString('es-CL')}. ¿Cuánto debe ganar en Q4 para cerrar el año con al menos $${meta.toLocaleString('es-CL')} de ganancia?`,
    ops:ops3,ok:ops3.indexOf('$'+Math.abs(necesita).toLocaleString('es-CL')),
    fb_ok:`Correcto. Saldo Q3: ${q[0]}+${q[1]}+${q[2]}=${saldoQ3}. Para llegar a ${meta}: ${meta}−(${saldoQ3})=${necesita}. Restar un negativo equivale a sumar.`,
    fb_mal:`Saldo acumulado: ${q.join('+')}=${saldoQ3}. Necesita: ${meta}−(${saldoQ3})=${meta}+${Math.abs(saldoQ3)}=${necesita}.`
  });

  // P4 — Representar: cámara frigorífica con variaciones
  const base=rnd([-18,-20,-15,-22]);
  const vars=[rnd([3,4,5]),rnd([-2,-3,-1]),rnd([6,7,8]),rnd([-4,-5,-6]),rnd([1,2,3]),rnd([-1,-2,-3])];
  const tFinal=base+vars.reduce((a,b)=>a+b,0);
  const w4=shuffle([tFinal+2,tFinal-1,tFinal+3,tFinal-2]).slice(0,3);
  const ops4=shuffle([tFinal,...w4]).map(x=>x+'°C');
  EJ.push({hab:'Representar',
    txt:`Una cámara frigorífica parte en ${base}°C (temperatura objetivo). Registra estas variaciones: ${vars.join(', ')}. ¿Cuál es la temperatura final?`,
    ops:ops4,ok:ops4.indexOf(tFinal+'°C'),
    fb_ok:`Correcto. ${base} + (${vars.join('+'+'')}) = ${base} + ${vars.reduce((a,b)=>a+b,0)} = ${tFinal}°C. Suma algebraica de todas las variaciones.`,
    fb_mal:`Temperatura final = ${base} + suma de variaciones = ${base} + ${vars.reduce((a,b)=>a+b,0)} = ${tFinal}°C.`
  });

  // P5 — Argumentar: expresión siempre negativa dado p<0, q>0
  const n5=rnd([3,4,5,6,7]),m5=rnd([2,3,4,5]);
  EJ.push({hab:'Argumentar',
    txt:`Se sabe que p < 0 y q > 0. ¿Cuál de las siguientes expresiones es SIEMPRE negativa?`,
    ops:['p + q','p · q','p − q','q · p²'],ok:2,
    fb_ok:'Correcto. p − q: negativo menos positivo = siempre negativo ✓. p+q depende de magnitudes. p·q=negativo también, pero p−q es aún más directo.',
    fb_mal:'p−q: p<0 y q>0, entonces p−q = negativo − positivo = siempre negativo. p·q también es negativo, pero la opción más directamente negativa es p−q.'
  });

  // P6 — Modelar: programa de puntos fidelización
  const puntos=[rnd([400,500,600]),rnd([1000,1200,1500]),rnd([-600,-800,-700]),rnd([800,900,1100]),rnd([-200,-300,-250])];
  const totalP=puntos.reduce((a,b)=>a+b,0);
  const w6=shuffle([totalP+150,totalP-100,totalP+300,totalP-200]).slice(0,3);
  const ops6=shuffle([totalP,...w6]).map(String);
  EJ.push({hab:'Modelar',
    txt:`Un programa de puntos registra: inscripción +${puntos[0]}, primera compra +${puntos[1]}, canje −${Math.abs(puntos[2])}, segunda compra +${puntos[3]}, penalización −${Math.abs(puntos[4])}. ¿Cuál es el saldo?`,
    ops:ops6,ok:ops6.indexOf(String(totalP)),
    fb_ok:`Correcto. Suma: ${puntos.join('+')}=${totalP} puntos. Se agrupan positivos: ${puntos.filter(x=>x>0).join('+')}=${puntos.filter(x=>x>0).reduce((a,b)=>a+b,0)}, negativos: ${puntos.filter(x=>x<0).reduce((a,b)=>a+b,0)}.`,
    fb_mal:`Suma algebraica: ${puntos.join('+')}=${totalP}. Positivos: ${puntos.filter(x=>x>0).reduce((a,b)=>a+b,0)}, negativos: ${puntos.filter(x=>x<0).reduce((a,b)=>a+b,0)}.`
  });

  // P7 — Representar: expresión equivalente con paréntesis
  const a7=rnd([3,4,5]),b7=rnd([6,7,8]),c7=rnd([2,3,4]);
  const inner=b7-c7; // b7-c7 puede ser negativo si c7>b7, ajustar
  const step1=`(${b7}−${c7})=${b7-c7}`;
  const step2=`${a7}−(${b7-c7})=${a7-(b7-c7)}`;
  const res7=-(a7-(b7-c7));
  EJ.push({hab:'Representar',
    txt:`¿Cuál de las siguientes expresiones es equivalente a −[${a7} − (${b7} − ${c7})]?`,
    ops:[
      `−[${a7} + ${b7-c7}]`,
      `−${a7} + ${b7} − ${c7}`,
      `−[${a7} − ${b7-c7}]`,
      `${res7}`
    ],ok:2,
    fb_ok:`Correcto. Paso 1: (${b7}−${c7})=${b7-c7}. Paso 2: −[${a7}−(${b7-c7})] = −[${a7}−${b7-c7}]. Esa es la forma equivalente antes de simplificar.`,
    fb_mal:`Resolviendo: (${b7}−${c7})=${b7-c7}. Entonces −[${a7}−(${b7-c7})]=−[${a7}−${b7-c7}]. La opción equivalente es −[${a7}−${b7-c7}].`
  });

  // P8 — Resolver problemas: videojuego con tres tipos de puntaje
  const niv=rnd([4,5,6]),vidas=rnd([2,3,4]),bonus=rnd([1,2,3]);
  const pts=rnd([300,350,400]),rest=rnd([100,120,150]),bon=rnd([150,200,250]);
  const total8=niv*pts - vidas*rest + bonus*bon;
  const w8=shuffle([total8+50,total8-100,total8+150,total8-50]).slice(0,3);
  const ops8=shuffle([total8,...w8]).map(String);
  EJ.push({hab:'Resolver problemas',
    txt:`En un videojuego: nivel completado +${pts} pts, vida perdida −${rest} pts, bonus +${bon} pts. Un jugador completó ${niv} niveles, perdió ${vidas} vidas y obtuvo ${bonus} bonus. ¿Cuál es su puntaje?`,
    ops:ops8,ok:ops8.indexOf(String(total8)),
    fb_ok:`Correcto. ${niv}×${pts}=${niv*pts}. ${vidas}×(−${rest})=−${vidas*rest}. ${bonus}×${bon}=${bonus*bon}. Total: ${niv*pts}−${vidas*rest}+${bonus*bon}=${total8}.`,
    fb_mal:`Niveles: ${niv}×${pts}=${niv*pts}. Vidas: −${vidas*rest}. Bonus: +${bonus*bon}. Total: ${total8}.`
  });

  return EJ;
}

function validarCorreo(c){if(c.indexOf('@')===-1)return false;var p=c.split('@');if(p.length!==2||!p[0].length)return false;if(p[1].indexOf('.')===-1)return false;var d=p[1].split('.');return d[0].length>0&&d[d.length-1].length>=2;}
function iniciar(){
  const nom=document.getElementById('inp-nombre').value.trim(),cor=document.getElementById('inp-correo').value.trim();
  if(!nom||!cor){document.getElementById('error-ident').style.display='block';return;}
  if(!validarCorreo(cor)){document.getElementById('error-ident').textContent='Correo inválido.';document.getElementById('error-ident').style.display='block';return;}
  nombreEstudiante=nom;document.getElementById('zona-ident').style.display='none';document.getElementById('zona-q').style.display='block';
  EJ=generarEjercicios();resp=new Array(8).fill(null);actual=0;sel=null;render();
}
function render(){
  const e=EJ[actual];
  document.getElementById('qnum').textContent=`Pregunta ${actual+1} de 8`;
  document.getElementById('barra').style.width=((actual+1)/8*100)+'%';
  document.getElementById('htag').innerHTML=`<span class="hab-tag ${hcss(e.hab)}">${e.hab}</span>`;
  document.getElementById('qtxt').textContent=e.txt;sel=null;
  const od=document.getElementById('opts');od.innerHTML='';
  e.ops.forEach((o,i)=>{const d=document.createElement('div');d.className='opt';d.id='op'+i;d.innerHTML=`<div class="letra">${LETRAS[i]}</div><span class="otxt">${o}</span>`;d.onclick=()=>elegir(i);od.appendChild(d);});
  const nls=document.createElement('div');nls.className='opt nls';nls.id='op4';nls.innerHTML=`<div class="letra" style="border-style:dashed">E</div><span class="otxt">No lo sé</span>`;nls.onclick=()=>elegir(4);od.appendChild(nls);
  document.getElementById('fb').style.display='none';document.getElementById('btnc').style.display='inline-block';document.getElementById('btnc').disabled=true;document.getElementById('btns').style.display='none';
}
function elegir(i){if(document.getElementById('btnc').style.display==='none')return;document.querySelectorAll('.opt').forEach(d=>d.classList.remove('sel'));document.getElementById('op'+i).classList.add('sel');sel=i;document.getElementById('btnc').disabled=false;}
function confirmar(){
  if(sel===null)return;const e=EJ[actual];resp[actual]=sel;const esNls=sel===NLS,esOk=!esNls&&sel===e.ok;
  document.querySelectorAll('.opt').forEach((d,i)=>{d.onclick=null;if(i===NLS){d.className='opt nls dis';return;}if(i===e.ok)d.className='opt '+(esOk?'ok':'show');else if(i===sel&&!esOk&&!esNls)d.className='opt mal';else d.className='opt dis';});
  const fb=document.getElementById('fb');
  if(esNls){fb.className='fb nls';fb.textContent=`La respuesta correcta es ${LETRAS[e.ok]}: ${e.ops[e.ok]}. ${e.fb_mal}`;}
  else{fb.className='fb '+(esOk?'ok':'mal');fb.textContent=esOk?e.fb_ok:e.fb_mal;}
  fb.style.display='block';document.getElementById('btnc').style.display='none';
  const bs=document.getElementById('btns');bs.style.display='inline-block';bs.textContent=actual<7?'Siguiente →':'Ver resultados →';
}
function siguiente(){if(actual<7){actual++;render();}else mostrarFinal();}
function mostrarFinal(){
  document.getElementById('zona-q').style.display='none';document.getElementById('zona-final').style.display='block';document.getElementById('barra').style.width='100%';
  const corr=resp.filter((r,i)=>r===EJ[i].ok).length,nlsC=resp.filter(r=>r===NLS).length,incorrectas=8-corr-nlsC,pct=Math.round(corr/8*100);
  document.getElementById('pje').textContent=corr+' / 8 correctas';registrar(corr,incorrectas,nlsC,pct);
  document.getElementById('pmsg').textContent=pct+'% de logro'+(nlsC>0?` · ${nlsC} sin responder`:'');
  const al=document.getElementById('alerta');
  const MSGS={alto:[{titulo:'🔥 ¡Dominaste esta guía!',txt:'Tu cerebro matemático está encendido. Puedes avanzar con confianza.'},{titulo:'⚡ ¡Excelente nivel!',txt:'Eso es exactamente el nivel PAES que necesitas. ¡Sigue así!'},{titulo:'🎯 ¡Puntazo!',txt:'Cada guía así te acerca más al puntaje que quieres.'},{titulo:'🚀 ¡Así se hace!',txt:'Estás construyendo una base sólida. Tu esfuerzo se nota.'},{titulo:'🌟 ¡Brillante!',txt:'Logro de '+pct+'%. Eso no es suerte, es práctica constante.'}],medio:[{titulo:'💪 ¡Vas bien!',txt:'Una repetición más y esta guía será tuya. ¡Tú puedes!'},{titulo:'📈 Buen avance',txt:'Estás construyendo algo sólido. Repite y confirma lo que aprendiste.'},{titulo:'✨ ¡Ya casi!',txt:'Con un intento más lo dominas. El progreso ya es visible.'},{titulo:'🎯 En camino',txt:'Cada intento te acerca más. Repite sin presión, con foco.'},{titulo:'⚡ Sigue sumando',txt:''+pct+'% de logro. Repite una vez más y lo tendrás dominado.'}],bajo:[{titulo:'💡 Esta guía te está enseñando algo importante',txt:'Cada error es información valiosa. Inténtalo de nuevo con calma.'},{titulo:'🧠 Así funciona el aprendizaje real',txt:'Los errores son parte del proceso. Repite antes de avanzar.'},{titulo:'🔄 No te rindas',txt:'Los conceptos nuevos necesitan más de un intento. ¡Vuelta a intentarlo!'},{titulo:'💪 El desafío es parte del camino',txt:'Repite esta guía. Con práctica constante lo lograrás.'},{titulo:'🌱 Aquí es donde más se aprende',txt:'Revisa las retroalimentaciones y vuelve a intentarlo. ¡Confía en el proceso!'}]};
  const nivel_msg=pct>=75?'alto':pct>=50?'medio':'bajo';
  const lista=MSGS[nivel_msg];
  const msg=lista[Math.floor(Math.random()*lista.length)];
  if(nivel_msg==='alto'){al.className='alerta bien';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir para afianzar';}
  else if(nivel_msg==='medio'){al.className='alerta bien';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir con valores nuevos';}
  else{al.className='alerta rep';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}.</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir con valores nuevos';}
  const dots=document.getElementById('dots');dots.innerHTML='';
  resp.forEach((r,i)=>{const d=document.createElement('div');d.className='dot '+(r===EJ[i].ok?'ok':r===NLS?'nls':'mal');dots.appendChild(d);});
  document.getElementById('reslista').innerHTML=resp.map((r,i)=>{const ok=r===EJ[i].ok,nls=r===NLS;const color=ok?'#085041':nls?'#5F5E5A':'#791F1F';const icono=ok?'✓':nls?'?':'✗';const txt=ok?'Correcta':nls?`No lo sé — correcta: ${LETRAS[EJ[i].ok]}`:`Incorrecta — correcta: ${LETRAS[EJ[i].ok]}`;return `<div style="color:${color}">${icono} P${i+1} (${EJ[i].hab}): ${txt}</div>`;}).join('');
}
function registrar(corr,incorr,nls,pct){
  var fecha=new Date().toLocaleDateString('es-CL',{timeZone:'America/Santiago'});
  var correo=document.getElementById('inp-correo').value.trim();
  var ejercicios=resp.map(function(r,i){return r===4?2:(r===EJ[i].ok?1:0);});
  var falladas=[];resp.forEach(function(r,i){if(r!==EJ[i].ok&&falladas.indexOf(EJ[i].hab)===-1)falladas.push(EJ[i].hab);});
  var params=['fecha='+encodeURIComponent(fecha),'nombre='+encodeURIComponent(nombreEstudiante),'correo='+encodeURIComponent(correo),'tipo=individual','grupo=NA','guia=guia-U01.B.5b','eje=E1','unidad=U01','subunidad=B','nivel=b','correctas='+corr,'incorrectas='+incorr,'nls='+nls,'logro='+(pct/100),'e1='+ejercicios[0],'e2='+ejercicios[1],'e3='+ejercicios[2],'e4='+ejercicios[3],'e5='+ejercicios[4],'e6='+ejercicios[5],'e7='+ejercicios[6],'e8='+ejercicios[7],'habilidades='+encodeURIComponent(falladas.join('|'))].join('&');
  var img=new Image();img.src='https://script.google.com/macros/s/AKfycbzsGCpwyNNFC03rbCLUwnPLTHBAn5FZxEJrqq1JX0LrDAY7jmJRQ58bcdaQ8XtS6MM3/exec?'+params;
}
function reiniciar(){EJ=generarEjercicios();actual=0;resp=new Array(8).fill(null);sel=null;document.getElementById('zona-final').style.display='none';document.getElementById('zona-q').style.display='block';render();}

// ── AUTO-IDENTIFICACIÓN DESDE PORTAL ──────────────────
// Si el estudiante llega desde el portal, nombre y correo
// vienen en la URL y se saltan el formulario
function autoIdentificar() {
  const params = new URLSearchParams(window.location.search);
  const nombre = params.get('nombre');
  const correo = params.get('correo');
  if (nombre && correo) {
    document.getElementById('inp-nombre').value = nombre;
    document.getElementById('inp-correo').value = correo;
    // Ocultar formulario y arrancar directo
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    nombreEstudiante = nombre;
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    render();
  }
}
// Ejecutar al cargar la página
window.addEventListener('load', autoIdentificar);
</script>
