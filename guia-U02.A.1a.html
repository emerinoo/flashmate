*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',system-ui,sans-serif;background:#f5f5f7;min-height:100vh;padding:16px 12px 80px}
.fm-wrap{position:relative;max-width:540px;margin:0 auto}

.alerta.rep{background:#FAEEDA;border:0.5px solid #EF9F27;color:#412402}

.fm-wa{position:fixed;bottom:24px;right:24px;width:48px;height:48px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.25);cursor:pointer;z-index:100;text-decoration:none}

<a href="https://wa.me/56997439227?text=Hola%20Erika%2C%20tengo%20una%20consulta%20sobre%20la%20Gu%C3%ADa%20U02.A.1a%20(Porcentajes%2C%20Nivel%20a)" class="fm-wa" target="_blank">
  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

<script>
const NLS=4,LETRAS=['A','B','C','D','E'];
let nombreEstudiante='',EJ=[],actual=0,resp=[],sel=null;
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function hcss(h){if(h==='Resolver problemas')return 'hab-rp';if(h==='Modelar')return 'hab-m';if(h==='Representar')return 'hab-r';return 'hab-a';}

function generarEjercicios(){
  const EJ=[];

  // P1 — Representar: conversión % a decimal
  const pcts=[{p:35,d:'0,35'},{p:60,d:'0,60'},{p:8,d:'0,08'},{p:125,d:'1,25'},{p:7,d:'0,07'}];
  const p1=rnd(pcts);
  const w1=shuffle([String(p1.p), String(p1.p/10), String(p1.p/1000)]).slice(0,3);
  const ops1=shuffle([p1.d,...w1]);
  EJ.push({hab:'Representar',
    txt:`¿Cuál de las siguientes expresiones es equivalente al ${p1.p}%?`,
    ops:ops1, ok:ops1.indexOf(p1.d),
    fb_ok:`Correcto. ${p1.p}% = ${p1.p}/100 = ${p1.d}. Dividir por 100 es la conversión fundamental de porcentaje a decimal.`,
    fb_mal:`${p1.p}% = ${p1.p}/100 = ${p1.d}. Para convertir porcentaje a decimal siempre se divide por 100.`
  });

  // P2 — Resolver problemas: calcular % de una cantidad (estudiantes)
  const total2=rnd([400,500,600,800,1000]);
  const pct2=rnd([20,25,30,40,15]);
  const res2=total2*pct2/100;
  const w2=shuffle([res2+10,res2-5,res2+20,res2-15]).slice(0,3);
  const ops2=shuffle([res2,...w2]).map(String);
  EJ.push({hab:'Resolver problemas',
    txt:`En un colegio hay ${total2} estudiantes. Si el ${pct2}% participa en actividades deportivas, ¿cuántos practican deporte?`,
    ops:ops2, ok:ops2.indexOf(String(res2)),
    fb_ok:`Correcto. ${pct2}% de ${total2} = 0,${pct2<10?'0'+pct2:pct2} × ${total2} = ${res2}. Convierte el porcentaje a decimal y multiplica.`,
    fb_mal:`${pct2}% de ${total2} = ${pct2}/100 × ${total2} = ${res2}. Siempre convierte el % a decimal antes de multiplicar.`
  });

  // P3 — Modelar: IVA incluido
  const precioSinIva=rnd([20000,30000,40000,50000,60000]);
  const precioConIva=Math.round(precioSinIva*1.19);
  const iva=precioConIva-precioSinIva;
  const w3=shuffle([iva+1000,iva-500,Math.round(precioConIva*0.19),iva+2000]).slice(0,3);
  const ops3=shuffle([iva,...w3]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Modelar',
    txt:`Un producto cuesta $${precioConIva.toLocaleString('es-CL')} con IVA incluido (19%). ¿Cuánto corresponde al IVA pagado?`,
    ops:ops3, ok:ops3.indexOf('$'+iva.toLocaleString('es-CL')),
    fb_ok:`Correcto. Precio sin IVA = ${precioConIva.toLocaleString('es-CL')} ÷ 1,19 = $${precioSinIva.toLocaleString('es-CL')}. IVA = $${iva.toLocaleString('es-CL')}. No calcules el 19% sobre el precio final.`,
    fb_mal:`El precio con IVA representa el 119%. Sin IVA = ${precioConIva.toLocaleString('es-CL')} ÷ 1,19 = $${precioSinIva.toLocaleString('es-CL')}. IVA = $${iva.toLocaleString('es-CL')}.`
  });

  // P4 — Resolver problemas: alumnos con notas deficientes
  const totalAlumnos=rnd([40,50,60,80]);
  const pctBuenas=rnd([50,55,60]);
  const pctRegulares=rnd([25,30,35]);
  const pctDef=100-pctBuenas-pctRegulares;
  const deficientes=Math.round(totalAlumnos*pctDef/100);
  const w4=shuffle([deficientes+2,deficientes-1,deficientes+3,deficientes-2]).filter(x=>x>0).slice(0,3);
  const ops4=shuffle([deficientes,...w4]).map(String);
  EJ.push({hab:'Resolver problemas',
    txt:`En un curso de ${totalAlumnos} alumnos, el ${pctBuenas}% tiene buenas notas y el ${pctRegulares}% tiene notas regulares. ¿Cuántos tienen notas deficientes?`,
    ops:ops4, ok:ops4.indexOf(String(deficientes)),
    fb_ok:`Correcto. Deficientes = 100% − ${pctBuenas}% − ${pctRegulares}% = ${pctDef}%. ${pctDef}% de ${totalAlumnos} = ${deficientes} alumnos.`,
    fb_mal:`Primero calcula el % restante: 100 − ${pctBuenas} − ${pctRegulares} = ${pctDef}%. Luego: ${pctDef}% de ${totalAlumnos} = ${deficientes} alumnos.`
  });

  // P5 — Representar: ordenar fracciones, decimales y porcentajes
  EJ.push({hab:'Representar',
    txt:'¿Cuál es el orden correcto de MAYOR a MENOR entre 3/4, 0,68, 71% y 7/10?',
    ops:['3/4 · 71% · 7/10 · 0,68','71% · 3/4 · 7/10 · 0,68','3/4 · 71% · 0,68 · 7/10','71% · 7/10 · 3/4 · 0,68'],ok:0,
    fb_ok:'Correcto. Convirtiendo a decimal: 3/4=0,75; 71%=0,71; 7/10=0,70; 0,68. Orden: 0,75 > 0,71 > 0,70 > 0,68.',
    fb_mal:'Convierte todo a decimal: 3/4=0,75; 71%=0,71; 7/10=0,70; 0,68. Orden mayor a menor: 3/4, 71%, 7/10, 0,68.'
  });

  // P6 — Argumentar: 100% de n
  const varN=rnd(['n','m','k','p']);
  EJ.push({hab:'Argumentar',
    txt:`Un jardinero planta ${varN} rosales. Si se seca el 100% de ellos, ¿cuántos rosales perdió?`,
    ops:['100'+varN, varN+'/100', '100/'+varN, varN], ok:3,
    fb_ok:`Correcto. El 100% de ${varN} = 1 × ${varN} = ${varN}. Perder el 100% significa perder la totalidad.`,
    fb_mal:`El 100% de cualquier cantidad es esa cantidad completa. 100% de ${varN} = ${varN}.`
  });

  // P7 — Modelar: sueldo con descuentos AFP y salud
  const bruto=rnd([850000,900000,1000000,750000,1200000]);
  const pctSalud=7, pctAfp=13;
  const descTotal=(pctSalud+pctAfp)/100;
  const liquido=Math.round(bruto*(1-descTotal));
  const w7=shuffle([liquido+20000,liquido-15000,liquido+50000,bruto-bruto*pctSalud/100]).map(Math.round).slice(0,3);
  const ops7=shuffle([liquido,...w7]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Modelar',
    txt:`Una trabajadora tiene sueldo bruto de $${bruto.toLocaleString('es-CL')}. Le descuentan ${pctSalud}% para salud y ${pctAfp}% para AFP. ¿Cuánto recibe líquido?`,
    ops:ops7, ok:ops7.indexOf('$'+liquido.toLocaleString('es-CL')),
    fb_ok:`Correcto. Descuento total: ${pctSalud}+${pctAfp}=${pctSalud+pctAfp}%. ${bruto.toLocaleString('es-CL')} × ${descTotal} = $${(bruto*descTotal).toLocaleString('es-CL')} de descuento. Líquido: $${liquido.toLocaleString('es-CL')}.`,
    fb_mal:`Suma los porcentajes: ${pctSalud}+${pctAfp}=${pctSalud+pctAfp}%. Descuento = ${bruto.toLocaleString('es-CL')} × 0,${pctSalud+pctAfp} = $${(bruto*descTotal).toLocaleString('es-CL')}. Líquido: $${liquido.toLocaleString('es-CL')}.`
  });

  // P8 — Resolver problemas: calcular % de votos obtenidos
  const votos=[[300,130,70],[250,120,80],[400,150,100],[200,90,60]];
  const v=rnd(votos);
  const total8=v.reduce((a,b)=>a+b,0);
  const pct8=Math.round(v[0]/total8*100);
  const w8=shuffle([pct8+5,pct8-3,pct8+8,pct8-7]).slice(0,3);
  const ops8=shuffle([pct8,...w8]).map(x=>x+'%');
  EJ.push({hab:'Resolver problemas',
    txt:`En una elección estudiantil con ${total8} votos en total: Javiera obtuvo ${v[0]}, Matías ${v[1]} y Camila ${v[2]}. ¿Qué porcentaje obtuvo Javiera?`,
    ops:ops8, ok:ops8.indexOf(pct8+'%'),
    fb_ok:`Correcto. (${v[0]}/${total8}) × 100 = ${pct8}%. Fórmula: porcentaje = (parte/total) × 100.`,
    fb_mal:`Porcentaje = (parte/total) × 100 = (${v[0]}/${total8}) × 100 = ${pct8}%.`
  });

  return EJ;
}

function validarCorreo(c){if(c.indexOf('@')===-1)return false;var p=c.split('@');if(p.length!==2||!p[0].length)return false;if(p[1].indexOf('.')===-1)return false;var d=p[1].split('.');return d[0].length>0&&d[d.length-1].length>=2;}
function iniciar(){
  const nom=document.getElementById('inp-nombre').value.trim(),cor=document.getElementById('inp-correo').value.trim();
  if(!nom||!cor){document.getElementById('error-ident').style.display='block';return;}
  if(!validarCorreo(cor)){document.getElementById('error-ident').textContent='Correo inválido.';document.getElementById('error-ident').style.display='block';return;}
  nombreEstudiante=nom;document.getElementById('zona-ident').style.display='none';document.getElementById('zona-q').style.display='block';
  EJ=generarEjercicios();resp=new Array(8).fill(null);actual=0;sel=null;render();
}
function render(){
  const e=EJ[actual];
  document.getElementById('qnum').textContent=`Pregunta ${actual+1} de 8`;
  document.getElementById('barra').style.width=((actual+1)/8*100)+'%';
  document.getElementById('htag').innerHTML=`<span class="hab-tag ${hcss(e.hab)}">${e.hab}</span>`;
  document.getElementById('qtxt').textContent=e.txt;sel=null;
  const od=document.getElementById('opts');od.innerHTML='';
  e.ops.forEach((o,i)=>{const d=document.createElement('div');d.className='opt';d.id='op'+i;d.innerHTML=`<div class="letra">${LETRAS[i]}</div><span class="otxt">${o}</span>`;d.onclick=()=>elegir(i);od.appendChild(d);});
  const nls=document.createElement('div');nls.className='opt nls';nls.id='op4';nls.innerHTML=`<div class="letra" style="border-style:dashed">E</div><span class="otxt">No lo sé</span>`;nls.onclick=()=>elegir(4);od.appendChild(nls);
  document.getElementById('fb').style.display='none';document.getElementById('btnc').style.display='inline-block';document.getElementById('btnc').disabled=true;document.getElementById('btns').style.display='none';
}
function elegir(i){if(document.getElementById('btnc').style.display==='none')return;document.querySelectorAll('.opt').forEach(d=>d.classList.remove('sel'));document.getElementById('op'+i).classList.add('sel');sel=i;document.getElementById('btnc').disabled=false;}
function confirmar(){
  if(sel===null)return;const e=EJ[actual];resp[actual]=sel;const esNls=sel===NLS,esOk=!esNls&&sel===e.ok;
  document.querySelectorAll('.opt').forEach((d,i)=>{d.onclick=null;if(i===NLS){d.className='opt nls dis';return;}if(i===e.ok)d.className='opt '+(esOk?'ok':'show');else if(i===sel&&!esOk&&!esNls)d.className='opt mal';else d.className='opt dis';});
  const fb=document.getElementById('fb');
  if(esNls){fb.className='fb nls';fb.textContent=`La respuesta correcta es ${LETRAS[e.ok]}: ${e.ops[e.ok]}. ${e.fb_mal}`;}
  else{fb.className='fb '+(esOk?'ok':'mal');fb.textContent=esOk?e.fb_ok:e.fb_mal;}
  fb.style.display='block';document.getElementById('btnc').style.display='none';
  const bs=document.getElementById('btns');bs.style.display='inline-block';bs.textContent=actual<7?'Siguiente →':'Ver resultados →';
}
function siguiente(){if(actual<7){actual++;render();}else mostrarFinal();}
function mostrarFinal(){
  document.getElementById('zona-q').style.display='none';document.getElementById('zona-final').style.display='block';document.getElementById('barra').style.width='100%';
  const corr=resp.filter((r,i)=>r===EJ[i].ok).length,nlsC=resp.filter(r=>r===NLS).length,incorrectas=8-corr-nlsC,pct=Math.round(corr/8*100);
  document.getElementById('pje').textContent=corr+' / 8 correctas';registrar(corr,incorrectas,nlsC,pct);
  document.getElementById('pmsg').textContent=pct+'% de logro'+(nlsC>0?` · ${nlsC} sin responder`:'');
  const al=document.getElementById('alerta');
  const MSGS={alto:[{titulo:'🔥 ¡Dominaste esta guía!',txt:'Tu cerebro matemático está encendido. Puedes avanzar con confianza.'},{titulo:'⚡ ¡Excelente nivel!',txt:'Eso es exactamente el nivel PAES que necesitas. ¡Sigue así!'},{titulo:'🎯 ¡Puntazo!',txt:'Cada guía así te acerca más al puntaje que quieres.'},{titulo:'🚀 ¡Así se hace!',txt:'Estás construyendo una base sólida. Tu esfuerzo se nota.'},{titulo:'🌟 ¡Brillante!',txt:'Logro de '+pct+'%. Eso no es suerte, es práctica constante.'}],medio:[{titulo:'💪 ¡Vas bien!',txt:'Una repetición más y esta guía será tuya. ¡Tú puedes!'},{titulo:'📈 Buen avance',txt:'Estás construyendo algo sólido. Repite y confirma lo que aprendiste.'},{titulo:'✨ ¡Ya casi!',txt:'Con un intento más lo dominas. El progreso ya es visible.'},{titulo:'🎯 En camino',txt:'Cada intento te acerca más. Repite sin presión, con foco.'},{titulo:'⚡ Sigue sumando',txt:''+pct+'% de logro. Repite una vez más y lo tendrás dominado.'}],bajo:[{titulo:'💡 Esta guía te está enseñando algo importante',txt:'Cada error es información valiosa. Inténtalo de nuevo con calma.'},{titulo:'🧠 Así funciona el aprendizaje real',txt:'Los errores son parte del proceso. Repite antes de avanzar.'},{titulo:'🔄 No te rindas',txt:'Los conceptos nuevos necesitan más de un intento. ¡Vuelta a intentarlo!'},{titulo:'💪 El desafío es parte del camino',txt:'Repite esta guía. Con práctica constante lo lograrás.'},{titulo:'🌱 Aquí es donde más se aprende',txt:'Revisa las retroalimentaciones y vuelve a intentarlo. ¡Confía en el proceso!'}]};
  const nivel_msg=pct>=75?'alto':pct>=50?'medio':'bajo';
  const lista=MSGS[nivel_msg];
  const msg=lista[Math.floor(Math.random()*lista.length)];
  if(nivel_msg==='alto'){al.className='alerta bien';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir para afianzar';}
  else if(nivel_msg==='medio'){al.className='alerta bien';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir con valores nuevos';}
  else{al.className='alerta rep';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}.</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir con valores nuevos';}
  const dots=document.getElementById('dots');dots.innerHTML='';
  resp.forEach((r,i)=>{const d=document.createElement('div');d.className='dot '+(r===EJ[i].ok?'ok':r===NLS?'nls':'mal');dots.appendChild(d);});
  document.getElementById('reslista').innerHTML=resp.map((r,i)=>{const ok=r===EJ[i].ok,nls=r===NLS;const color=ok?'#085041':nls?'#5F5E5A':'#791F1F';const icono=ok?'✓':nls?'?':'✗';const txt=ok?'Correcta':nls?`No lo sé — correcta: ${LETRAS[EJ[i].ok]}`:`Incorrecta — correcta: ${LETRAS[EJ[i].ok]}`;return `<div style="color:${color}">${icono} P${i+1} (${EJ[i].hab}): ${txt}</div>`;}).join('');
}
function registrar(corr,incorr,nls,pct){
  if (window._modoDocente) return;
  var fecha=new Date().toLocaleDateString('es-CL',{timeZone:'America/Santiago'});
  var correo=document.getElementById('inp-correo').value.trim();
  var HAB_E=["Representar", "Resolver problemas", "Modelar", "Resolver problemas", "Representar", "Argumentar", "Modelar", "Resolver problemas"];
  var ejercicios=resp.map(function(r,i){return r===4?2:(r===EJ[i].ok?1:0);});
  var falladas=[];resp.forEach(function(r,i){if(r!==EJ[i].ok&&falladas.indexOf(EJ[i].hab)===-1)falladas.push(EJ[i].hab);});
  // ── CÁLCULO LOGRO POR HABILIDAD ──────────────────────
  var HAB_MAP={e1:HAB_E[0],e2:HAB_E[1],e3:HAB_E[2],e4:HAB_E[3],e5:HAB_E[4],e6:HAB_E[5],e7:HAB_E[6],e8:HAB_E[7]};
  var habCorr={'Resolver problemas':0,'Modelar':0,'Representar':0,'Argumentar':0};
  var habTot={'Resolver problemas':0,'Modelar':0,'Representar':0,'Argumentar':0};
  ['e1','e2','e3','e4','e5','e6','e7','e8'].forEach(function(k,i){
    var h=HAB_MAP[k];
    habTot[h]=(habTot[h]||0)+1;
    if(ejercicios[i]===1) habCorr[h]=(habCorr[h]||0)+1;
  });
  var logroResolver=habTot['Resolver problemas']>0?Math.round(habCorr['Resolver problemas']/habTot['Resolver problemas']*100)/100:null;
  var logroModelar=habTot['Modelar']>0?Math.round(habCorr['Modelar']/habTot['Modelar']*100)/100:null;
  var logroRepresentar=habTot['Representar']>0?Math.round(habCorr['Representar']/habTot['Representar']*100)/100:null;
  var logroArgumentar=habTot['Argumentar']>0?Math.round(habCorr['Argumentar']/habTot['Argumentar']*100)/100:null;
  var params=['fecha='+encodeURIComponent(fecha),'nombre='+encodeURIComponent(nombreEstudiante),'correo='+encodeURIComponent(correo),'tipo=individual','grupo=NA','guia=guia-U02.A.1a','eje=E1','unidad=U02','subunidad=A','nivel=a','correctas='+corr,'incorrectas='+incorr,'nls='+nls,'logro='+(pct/100),'e1='+ejercicios[0],'e2='+ejercicios[1],'e3='+ejercicios[2],'e4='+ejercicios[3],'e5='+ejercicios[4],'e6='+ejercicios[5],'e7='+ejercicios[6],'e8='+ejercicios[7],'habilidades='+encodeURIComponent(falladas.join('|'))].join('&');
  var img=new Image();img.src='https://script.google.com/macros/s/AKfycbzsGCpwyNNFC03rbCLUwnPLTHBAn5FZxEJrqq1JX0LrDAY7jmJRQ58bcdaQ8XtS6MM3/exec?'+params;
}

function volverPortal(){
  const params=new URLSearchParams(window.location.search);
  const nombre=params.get('nombre');
  const correo=params.get('correo');
  if(nombre&&correo){
    window.location.href='portal-estudiante.html?nombre='+encodeURIComponent(nombre)+'&correo='+encodeURIComponent(correo);
  } else {
    window.location.href='portal-estudiante.html';
  }
}
function reiniciar(){EJ=generarEjercicios();actual=0;resp=new Array(8).fill(null);sel=null;document.getElementById('zona-final').style.display='none';document.getElementById('zona-q').style.display='block';render();}

// ── AUTO-IDENTIFICACIÓN DESDE PORTAL ──────────────────
// Si el estudiante llega desde el portal, nombre y correo
// vienen en la URL y se saltan el formulario
function autoIdentificar() {
  const params = new URLSearchParams(window.location.search);
  const nombre = params.get('nombre');
  const correo = params.get('correo');
  if (nombre && correo) {
    document.getElementById('inp-nombre').value = nombre;
    document.getElementById('inp-correo').value = correo;
    // Ocultar formulario y arrancar directo
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    nombreEstudiante = nombre;
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    render();
  }
}

// ── AUTO-LOGIN Y MODO DOCENTE ──────────────────────────
window.addEventListener('load', function() {
  const params = new URLSearchParams(window.location.search);
  const modo   = params.get('modo');
  const nombre = params.get('nombre');
  const correo = params.get('correo');

  if (modo === 'docente') {
    // Modo docente: saltar formulario, no registrar
    window._modoDocente = true;
    nombreEstudiante = 'Vista docente';
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    render();
    return; // no continuar con autoIdentificar
  }

  if (nombre && correo) {
    // Auto-login desde portal: saltar formulario con datos reales
    document.getElementById('inp-nombre').value = nombre;
    document.getElementById('inp-correo').value = correo;
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    nombreEstudiante = nombre;
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    render();
  }
});

</script>
