<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashMate · Panel Docente</title>
<link rel="icon" href="https://emerinoo.github.io/flashmate/logo-erika.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#38388E;
  --rojo:#ED3B62;
  --celeste:#0187F3;
  --verde:#10B981;
  --amarillo:#F59E0B;
  --bg:#F0F2F8;
  --card:#fff;
  --texto:#1a1a2e;
  --suave:#6B7280;
  --borde:#E5E7EB;
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;}

/* ── HEADER ── */
.hdr{
  background:var(--azul);padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(56,56,142,0.25);
}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-logo{height:44px;border-radius:8px;}
.hdr-title{font-size:18px;font-weight:700;color:#fff;line-height:1.2;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,0.65);margin-top:2px;}
.hdr-badge{background:var(--rojo);color:#fff;font-size:11px;font-weight:600;padding:4px 14px;border-radius:20px;}

/* ── TABS ── */
.tabs-wrap{background:var(--azul);padding:0 24px;}
.tabs{display:flex;gap:0;max-width:900px;margin:0 auto;}
.tab{
  padding:10px 20px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;
  color:rgba(255,255,255,0.55);background:transparent;border:none;cursor:pointer;
  border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;
}
.tab:hover{color:rgba(255,255,255,0.85);}
.tab.activo{color:#fff;border-bottom-color:var(--rojo);}

/* ── CONTENIDO ── */
.contenido{max-width:900px;margin:0 auto;padding:24px 16px 60px;}
.vista{display:none;}
.vista.activa{display:block;}

/* ── PLANIFICACIÓN ── */

/* Navegación semana */
.semana-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.semana-nav-centro{text-align:center;}
.semana-titulo{font-size:15px;font-weight:700;color:var(--azul);}
.semana-rango{font-size:11px;color:var(--suave);margin-top:2px;}
.nav-btn{
  background:var(--card);border:1.5px solid var(--borde);
  color:var(--suave);font-family:'Poppins',sans-serif;
  font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;
  transition:all .15s;
}
.nav-btn:hover{border-color:var(--azul);color:var(--azul);}

.btn-guardar{
  background:var(--azul);color:#fff;border:none;
  font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;
  padding:9px 22px;border-radius:10px;cursor:pointer;
  transition:opacity .15s;
}
.btn-guardar:hover{opacity:.88;}
.btn-guardar:disabled{opacity:.5;cursor:not-allowed;}

/* Bloque estudiante */
.estudiante-bloque{
  background:var(--card);border:1.5px solid var(--borde);
  border-radius:14px;margin-bottom:12px;overflow:hidden;
}
.estudiante-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--borde);
}
.estudiante-info{display:flex;align-items:center;gap:10px;}
.avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.av-0{background:#EEEDFE;color:#38388E;}
.av-1{background:#fde8ed;color:#c0204a;}
.av-2{background:#E1F5EE;color:#085041;}
.av-3{background:#e0f0fe;color:#0162b8;}
.av-4{background:#FAEEDA;color:#633806;}
.est-nombre{font-size:13px;font-weight:700;color:var(--texto);}
.est-meta{font-size:11px;color:var(--suave);}
.est-stats{display:flex;gap:20px;}
.est-stat{text-align:right;}
.est-stat-num{font-size:16px;font-weight:700;color:var(--azul);}
.est-stat-lbl{font-size:10px;color:var(--suave);}

/* Grid días */
.dias-grid{
  display:grid;grid-template-columns:repeat(5,minmax(0,1fr));
  gap:8px;padding:12px 16px;
}
.dia-col{display:flex;flex-direction:column;gap:4px;}
.dia-label{font-size:10px;color:var(--suave);text-align:center;padding-bottom:2px;}
.dia-label.hoy{color:var(--rojo);font-weight:700;}

/* Celda de guía */
.dia-celda{
  border-radius:8px;padding:6px 8px;min-height:54px;
  display:flex;flex-direction:column;justify-content:space-between;
  border:1.5px solid var(--borde);background:#F9FAFB;
  cursor:pointer;transition:border-color .15s;position:relative;
}
.dia-celda:hover{border-color:var(--azul);}
.dia-celda.completada{background:#F0FDF4;border-color:#86EFAC;}
.dia-celda.asignada{background:#EFF6FF;border-color:#93C5FD;}
.dia-celda.hoy-asignada{background:#FEF2F2;border-color:var(--rojo);}
.dia-celda.vacia{border-style:dashed;}

.celda-cod{font-size:10px;font-weight:700;}
.dia-celda.completada .celda-cod{color:#15803D;}
.dia-celda.asignada .celda-cod{color:#1D4ED8;}
.dia-celda.hoy-asignada .celda-cod{color:var(--rojo);}
.dia-celda.vacia .celda-cod{color:var(--suave);}

.celda-nombre{font-size:9px;line-height:1.3;margin-top:2px;}
.dia-celda.completada .celda-nombre{color:#15803D;opacity:.8;}
.dia-celda.asignada .celda-nombre{color:#1D4ED8;opacity:.8;}
.dia-celda.hoy-asignada .celda-nombre{color:var(--rojo);opacity:.8;}
.dia-celda.vacia .celda-nombre{color:var(--suave);}

.celda-badge{
  font-size:9px;padding:1px 5px;border-radius:4px;
  align-self:flex-start;margin-top:3px;font-weight:600;
}
.badge-completada{background:#D1FAE5;color:#065F46;}
.badge-hoy{background:#FEF2F2;color:var(--rojo);}

.celda-mas{font-size:11px;color:var(--suave);text-align:center;width:100%;}

/* ── LEYENDA ── */
.leyenda{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.ley-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--suave);}
.ley-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* ── MODAL SELECTOR ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.45);z-index:200;
  align-items:center;justify-content:center;
}
.modal-overlay.abierto{display:flex;}
.modal{
  background:var(--card);border-radius:16px;
  padding:24px;width:90%;max-width:480px;
  max-height:80vh;display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.modal-titulo{font-size:15px;font-weight:700;color:var(--azul);margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--suave);margin-bottom:14px;}
.modal-buscador{
  width:100%;padding:9px 14px;border:1.5px solid var(--borde);
  border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;
  outline:none;margin-bottom:12px;
}
.modal-buscador:focus{border-color:var(--azul);}
.modal-lista{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:4px;}
.modal-item{
  padding:8px 12px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  border:1.5px solid transparent;transition:all .15s;
}
.modal-item:hover{background:#F0F2F8;border-color:var(--borde);}
.modal-item.seleccionado{background:#EFF6FF;border-color:#93C5FD;}
.modal-cod{font-size:12px;font-weight:700;color:var(--azul);}
.modal-nombre{font-size:11px;color:var(--suave);}
.modal-nivel{font-size:10px;padding:2px 7px;border-radius:8px;}
.modal-acciones{display:flex;gap:8px;margin-top:14px;}
.modal-btn-cancel{
  flex:1;padding:9px;border:1.5px solid var(--borde);
  border-radius:8px;background:transparent;
  font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer;
  color:var(--suave);
}
.modal-btn-ok{
  flex:2;padding:9px;border:none;border-radius:8px;
  background:var(--azul);color:#fff;
  font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;
}
.modal-btn-limpiar{
  padding:9px 14px;border:1.5px solid #FECACA;border-radius:8px;
  background:transparent;color:#991B1B;
  font-family:'Poppins',sans-serif;font-size:12px;cursor:pointer;
}

/* ── CATÁLOGO (existente, sin cambios) ── */
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.btn-filtro{
  background:#fff;border:1.5px solid var(--borde);color:var(--suave);
  font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;
  padding:6px 16px;border-radius:20px;cursor:pointer;transition:all .15s;
}
.btn-filtro:hover{border-color:var(--azul);color:var(--azul);}
.btn-filtro.activo{background:var(--azul);border-color:var(--azul);color:#fff;}

.seccion{margin-bottom:32px;}
.seccion-titulo{
  font-size:13px;font-weight:700;color:var(--azul);
  letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:2px solid var(--azul);
  display:flex;align-items:center;gap:10px;
}
.seccion-count{
  background:var(--azul);color:#fff;font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:10px;letter-spacing:0;text-transform:none;
}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}

.guia-card{
  background:var(--card);border:1.5px solid var(--borde);
  border-radius:12px;padding:14px 16px;
  transition:all .2s;position:relative;overflow:hidden;
}
.guia-card:hover{border-color:var(--azul);box-shadow:0 4px 16px rgba(56,56,142,0.12);transform:translateY(-1px);}
.guia-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.nivel-a::before{background:var(--celeste);}
.nivel-b::before{background:var(--verde);}
.nivel-c::before{background:var(--rojo);}

.guia-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.guia-codigo{font-size:13px;font-weight:700;color:var(--azul);}
.nivel-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.tag-a{background:#EFF6FF;color:#1D4ED8;}
.tag-b{background:#ECFDF5;color:#065F46;}
.tag-c{background:#FEF2F2;color:#991B1B;}
.guia-nombre{font-size:12px;color:var(--suave);margin-bottom:10px;line-height:1.4;}
.guia-acciones{display:flex;gap:8px;}
.btn-copiar{
  flex:1;background:var(--azul);color:#fff;border:none;border-radius:7px;
  padding:7px 10px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-copiar:hover{opacity:.88;}
.btn-copiar.copiado{background:var(--verde);}
.btn-abrir{
  background:transparent;border:1.5px solid var(--borde);border-radius:7px;
  padding:7px 10px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;
  color:var(--suave);cursor:pointer;transition:all .15s;text-decoration:none;
  display:flex;align-items:center;gap:5px;
}
.btn-abrir:hover{border-color:var(--azul);color:var(--azul);}

.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
.stat{
  background:var(--card);border:1.5px solid var(--borde);
  border-radius:10px;padding:12px 18px;
  display:flex;align-items:center;gap:10px;
}
.stat-num{font-size:22px;font-weight:700;color:var(--azul);}
.stat-label{font-size:11px;color:var(--suave);line-height:1.3;}

.buscador-wrap{position:relative;margin-bottom:16px;}
.buscador{
  width:100%;padding:10px 16px 10px 40px;
  border:1.5px solid var(--borde);border-radius:10px;
  font-family:'Poppins',sans-serif;font-size:13px;
  background:#fff;color:var(--texto);outline:none;transition:border .15s;
}
.buscador:focus{border-color:var(--azul);}
.buscador-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--suave);font-size:15px;}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--texto);color:#fff;font-size:13px;font-weight:500;
  padding:10px 20px;border-radius:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
  transition:transform .3s;z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* SPINNER */
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <img class="hdr-logo" src="https://emerinoo.github.io/flashmate/logo-erika.png" alt="Logo" onerror="this.style.display='none'">
    <div>
      <div class="hdr-title">FlashMate</div>
      <div class="hdr-sub">Panel Docente · Erika la Profe de Mate</div>
    </div>
  </div>
  <div class="hdr-badge">Panel privado</div>
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab activo" onclick="cambiarTab('planificacion',this)">Planificación semanal</button>
    <button class="tab" onclick="cambiarTab('catalogo',this)">Catálogo de guías</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     VISTA: PLANIFICACIÓN
══════════════════════════════════════ -->
<div class="contenido">
<div class="vista activa" id="vista-planificacion">

  <!-- Nav semana + guardar -->
  <div class="semana-nav">
    <button class="nav-btn" onclick="cambiarSemana(-1)">← anterior</button>
    <div class="semana-nav-centro">
      <div class="semana-titulo" id="semana-titulo">Cargando...</div>
      <div class="semana-rango" id="semana-rango"></div>
    </div>
    <button class="nav-btn" onclick="cambiarSemana(1)">siguiente →</button>
  </div>

  <!-- Leyenda -->
  <div class="leyenda">
    <div class="ley-item"><div class="ley-dot" style="background:#D1FAE5;border:1.5px solid #86EFAC;"></div>completada</div>
    <div class="ley-item"><div class="ley-dot" style="background:#FEF2F2;border:1.5px solid var(--rojo);"></div>hoy</div>
    <div class="ley-item"><div class="ley-dot" style="background:#EFF6FF;border:1.5px solid #93C5FD;"></div>asignada</div>
    <div class="ley-item"><div class="ley-dot" style="background:#F9FAFB;border:1.5px dashed var(--borde);"></div>sin asignar</div>
  </div>

  <!-- Bloques de estudiantes -->
  <div id="bloques-estudiantes"></div>

  <!-- Botón guardar -->
  <div style="display:flex;justify-content:flex-end;margin-top:16px;">
    <button class="btn-guardar" id="btn-guardar" onclick="guardarPlanificacion()">Guardar semana</button>
  </div>

</div>

<!-- ══════════════════════════════════════
     VISTA: CATÁLOGO
══════════════════════════════════════ -->
<div class="vista" id="vista-catalogo">

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="total-disp">0</div>
      <div class="stat-label">Guías<br>disponibles</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="total-pronto">0</div>
      <div class="stat-label">Próximas<br>guías</div>
    </div>
    <div class="stat">
      <div class="stat-num">25</div>
      <div class="stat-label">Guías en<br>GitHub</div>
    </div>
  </div>

  <div class="buscador-wrap">
    <span class="buscador-icon">🔍</span>
    <input class="buscador" id="buscador" type="text" placeholder="Buscar guía por código, unidad o tema...">
  </div>

  <div class="filtros">
    <button class="btn-filtro activo" onclick="filtrar('todos',this)">Todas</button>
    <button class="btn-filtro" onclick="filtrar('U01',this)">U01 · Números Reales</button>
    <button class="btn-filtro" onclick="filtrar('U02',this)">U02 · Porcentajes</button>
    <button class="btn-filtro" onclick="filtrar('U03',this)">U03 · Potencias y Raíces</button>
    <button class="btn-filtro" onclick="filtrar('nivel-a',this)">Nivel a</button>
    <button class="btn-filtro" onclick="filtrar('nivel-b',this)">Nivel b</button>
    <button class="btn-filtro" onclick="filtrar('nivel-c',this)">Nivel c</button>
  </div>

  <div id="contenedor-guias"></div>

</div>
</div>

<!-- ══════════════════════════════════════
     MODAL SELECTOR DE GUÍA
══════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-titulo" id="modal-titulo">Asignar guía</div>
    <div class="modal-sub" id="modal-sub">Selecciona una guía para este día</div>
    <input class="modal-buscador" id="modal-buscador" type="text" placeholder="Buscar por código o nombre..." oninput="filtrarModal()">
    <div class="modal-lista" id="modal-lista"></div>
    <div class="modal-acciones">
      <button class="modal-btn-limpiar" onclick="limpiarCelda()">✕ Quitar</button>
      <button class="modal-btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="modal-btn-ok" onclick="confirmarModal()">Asignar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

  {cod:'U02.A.1a',nombre:'Porcentajes',sub:'Concepto · Cálculo directo · Contextos',nivel:'a',unidad:'U02',subunidad:'A',disp:true},
  {cod:'U02.A.2b',nombre:'Porcentajes',sub:'Aumentos · Descuentos · % del resto',nivel:'b',unidad:'U02',subunidad:'A',disp:true},
  {cod:'U02.A.3b',nombre:'Porcentajes',sub:'% de % · Variaciones encadenadas',nivel:'b',unidad:'U02',subunidad:'A',disp:true},
  {cod:'U02.A.4c',nombre:'Porcentajes',sub:'Algebraico · Problemas multi-paso',nivel:'c',unidad:'U02',subunidad:'A',disp:true},
  {cod:'U02.A.5c',nombre:'Porcentajes + IS',sub:'Comisión · Interés simple · IS compuesto',nivel:'c',unidad:'U02',subunidad:'A',disp:true},
  {cod:'U02.A.6c',nombre:'Porcentajes + IC',sub:'IS e IC · Comparaciones · Contextos financieros',nivel:'c',unidad:'U02',subunidad:'A',disp:true},
  {cod:'U03.A.1a',nombre:'Potencias',sub:'Exponente 0 · Negativos · Propiedades básicas',nivel:'a',unidad:'U03',subunidad:'A',disp:true},
  {cod:'U03.A.2b',nombre:'Potencias',sub:'Suma de potencias · Propiedades combinadas',nivel:'b',unidad:'U03',subunidad:'A',disp:true},
  {cod:'U03.A.3c',nombre:'Potencias',sub:'Simplificación algebraica · Notación científica',nivel:'c',unidad:'U03',subunidad:'A',disp:true},
  {cod:'U03.B.4a',nombre:'Raíces Enésimas',sub:'Simplificación básica · Raíces semejantes',nivel:'a',unidad:'U03',subunidad:'B',disp:true},
  {cod:'U03.B.5b',nombre:'Raíces Enésimas',sub:'Raíces de fracciones · Dominio real',nivel:'b',unidad:'U03',subunidad:'B',disp:true},
  {cod:'U03.B.6c',nombre:'Raíces Enésimas',sub:'Racionalización · Conjugados',nivel:'c',unidad:'U03',subunidad:'B',disp:true},
  {cod:'U03.B.7c',nombre:'Raíces Enésimas',sub:'Racionalización algebraica · Argumentación',nivel:'c',unidad:'U03',subunidad:'B',disp:true},
];

const CATALOGO = {};
GUIAS.forEach(g => CATALOGO[g.cod] = g);

// ── ESTUDIANTES — se cargan dinámicamente desde Sheets ──
let ESTUDIANTES = [];

// ── ESTADO PLANIFICACIÓN ──
// planSemana[correo][fechaStr] = { guia, estado }
let planSemana   = {};
let semanaOffset = 0; // 0 = semana actual, -1 = anterior, +1 = siguiente
let modalCtx     = null; // { correo, fecha }
let modalSel     = null; // cod seleccionado en modal
let modalBusq    = '';

// ── FECHAS ──
function getLunes(offset) {
  const hoy = new Date();
  const dia  = hoy.getDay() === 0 ? 6 : hoy.getDay() - 1;
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() - dia + offset * 7);
  lunes.setHours(0,0,0,0);
  return lunes;
}

function fechaStr(d) {
  return d.toISOString().split('T')[0];
}

function diasSemana(offset) {
  const lunes = getLunes(offset);
  return Array.from({length:5}, (_,i) => {
    const d = new Date(lunes);
    d.setDate(lunes.getDate() + i);
    return d;
  });
}

function formatDia(d) {
  const nombres = ['lun','mar','mié','jue','vie'];
  return nombres[d.getDay() === 0 ? 6 : d.getDay()-1] + ' ' + d.getDate();
}

function formatRango(dias) {
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const ini = dias[0], fin = dias[4];
  return ini.getDate() + ' al ' + fin.getDate() + ' de ' + meses[fin.getMonth()] + ' ' + fin.getFullYear();
}

function esHoy(d) {
  return fechaStr(d) === fechaStr(new Date());
}

// ── TABS ──
function cambiarTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
  document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
  btn.classList.add('activo');
  document.getElementById('vista-' + id).classList.add('activa');
}

// ── PLANIFICACIÓN ──
function cambiarSemana(dir) {
  semanaOffset += dir;
  renderPlanificacion();
}

function renderPlanificacion() {
  const dias = diasSemana(semanaOffset);
  const hoyStr = fechaStr(new Date());

  // Título
  const semNum = getSemanaNumero(dias[0]);
  document.getElementById('semana-titulo').textContent = 'Semana ' + semNum;
  document.getElementById('semana-rango').textContent  = formatRango(dias);

  const contenedor = document.getElementById('bloques-estudiantes');
  contenedor.innerHTML = '';

  ESTUDIANTES.forEach((est, idx) => {
    if (!planSemana[est.correo]) planSemana[est.correo] = {};

    // Contar ejercicios totales del estudiante
    const totalCompletadas = Object.values(planSemana[est.correo])
      .filter(c => c.estado === 'completada').length;
    const semanaCompletadas = dias.filter(d => {
      const fs = fechaStr(d);
      return planSemana[est.correo][fs] && planSemana[est.correo][fs].estado === 'completada';
    }).length;

    const bloque = document.createElement('div');
    bloque.className = 'estudiante-bloque';
    bloque.innerHTML = `
      <div class="estudiante-hdr">
        <div class="estudiante-info">
          <div class="avatar av-${est.avIdx % 5}">${est.iniciales}</div>
          <div>
            <div class="est-nombre">${est.nombre}</div>
            <div class="est-meta">${est.correo}</div>
          </div>
        </div>
        <div class="est-stats">
          <div class="est-stat">
            <div class="est-stat-num">${semanaCompletadas * 8}</div>
            <div class="est-stat-lbl">ejercicios<br>semana</div>
          </div>
          <div class="est-stat">
            <div class="est-stat-num">${totalCompletadas * 8}</div>
            <div class="est-stat-lbl">total<br>acumulado</div>
          </div>
        </div>
      </div>
      <div class="dias-grid" id="dias-${idx}"></div>`;
    contenedor.appendChild(bloque);

    const diasGrid = bloque.querySelector('.dias-grid');
    dias.forEach(dia => {
      const fs   = fechaStr(dia);
      const dato = planSemana[est.correo][fs];
      const hoyDia = fs === hoyStr;

      const col = document.createElement('div');
      col.className = 'dia-col';

      const label = document.createElement('div');
      label.className = 'dia-label' + (hoyDia ? ' hoy' : '');
      label.textContent = formatDia(dia);
      col.appendChild(label);

      const celda = document.createElement('div');
      if (!dato) {
        celda.className = 'dia-celda vacia';
        celda.innerHTML = '<span class="celda-mas">+ asignar</span>';
      } else if (dato.estado === 'completada') {
        celda.className = 'dia-celda completada';
        const info = CATALOGO[dato.guia] || {nombre: dato.guia};
        celda.innerHTML = `
          <div class="celda-cod">${dato.guia}</div>
          <div class="celda-nombre">${info.nombre}</div>
          <span class="celda-badge badge-completada">✓</span>`;
      } else if (hoyDia) {
        celda.className = 'dia-celda hoy-asignada';
        const info = CATALOGO[dato.guia] || {nombre: dato.guia};
        celda.innerHTML = `
          <div class="celda-cod">${dato.guia}</div>
          <div class="celda-nombre">${info.nombre}</div>
          <span class="celda-badge badge-hoy">hoy</span>`;
      } else {
        celda.className = 'dia-celda asignada';
        const info = CATALOGO[dato.guia] || {nombre: dato.guia};
        celda.innerHTML = `
          <div class="celda-cod">${dato.guia}</div>
          <div class="celda-nombre">${info.nombre}</div>`;
      }

      // Solo celdas no completadas son editables
      if (!dato || dato.estado !== 'completada') {
        celda.onclick = () => abrirModal(est.correo, fs, est.nombre, formatDia(dia));
      }

      col.appendChild(celda);
      diasGrid.appendChild(col);
    });
  });
}

function getSemanaNumero(lunes) {
  const ini = new Date(lunes.getFullYear(), 0, 1);
  const diff = lunes - ini;
  return Math.ceil((diff / 86400000 + ini.getDay() + 1) / 7);
}

// ── MODAL ──
function abrirModal(correo, fecha, nombreEst, labelDia) {
  modalCtx = { correo, fecha };
  const dato = planSemana[correo] && planSemana[correo][fecha];
  modalSel  = dato ? dato.guia : null;
  modalBusq = '';

  document.getElementById('modal-titulo').textContent = nombreEst;
  document.getElementById('modal-sub').textContent    = 'Asignar guía para el ' + labelDia;
  document.getElementById('modal-buscador').value     = '';
  document.getElementById('modal-overlay').classList.add('abierto');

  renderModalLista();
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('abierto');
  modalCtx = null;
  modalSel = null;
}

function filtrarModal() {
  modalBusq = document.getElementById('modal-buscador').value.toLowerCase();
  renderModalLista();
}

function renderModalLista() {
  const lista = document.getElementById('modal-lista');
  lista.innerHTML = '';

  const filtradas = GUIAS.filter(g =>
    !modalBusq ||
    g.cod.toLowerCase().includes(modalBusq) ||
    g.nombre.toLowerCase().includes(modalBusq) ||
    g.sub.toLowerCase().includes(modalBusq)
  );

  filtradas.forEach(g => {
    const item = document.createElement('div');
    item.className = 'modal-item' + (modalSel === g.cod ? ' seleccionado' : '');
    item.innerHTML = `
      <div>
        <div class="modal-cod">${g.cod}</div>
        <div class="modal-nombre">${g.nombre} · ${g.sub}</div>
      </div>
      <span class="modal-nivel nivel-tag tag-${g.nivel}">Nivel ${g.nivel.toUpperCase()}</span>`;
    item.onclick = () => {
      modalSel = g.cod;
      renderModalLista();
    };
    lista.appendChild(item);
  });
}

function confirmarModal() {
  if (!modalSel || !modalCtx) { cerrarModal(); return; }
  if (!planSemana[modalCtx.correo]) planSemana[modalCtx.correo] = {};
  planSemana[modalCtx.correo][modalCtx.fecha] = { guia: modalSel, estado: 'asignada' };
  cerrarModal();
  renderPlanificacion();
}

function limpiarCelda() {
  if (!modalCtx) { cerrarModal(); return; }
  if (planSemana[modalCtx.correo]) {
    delete planSemana[modalCtx.correo][modalCtx.fecha];
  }
  cerrarModal();
  renderPlanificacion();
}

// ── GUARDAR ──
async function guardarPlanificacion() {
  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Guardando...';

  const asignaciones = [];
  Object.entries(planSemana).forEach(([correo, dias]) => {
    Object.entries(dias).forEach(([fecha, dato]) => {
      if (dato.estado !== 'completada') {
        asignaciones.push({ correo, fecha, guia: dato.guia });
      }
    });
  });

  try {
    const url = SCRIPT_URL +
      '?accion=guardar_plan&datos=' +
      encodeURIComponent(JSON.stringify(asignaciones));
    const resp = await fetch(url);
    const data = await resp.json();

    if (data.ok) {
      mostrarToast('Planificación guardada correctamente');
    } else {
      mostrarToast('Error al guardar. Intenta de nuevo.');
    }
  } catch(e) {
    mostrarToast('Error de conexión.');
  }

  btn.disabled = false;
  btn.textContent = 'Guardar semana';
}

// ── CARGAR ESTUDIANTES DESDE SHEETS ──
async function cargarEstudiantes() {
  const contenedor = document.getElementById('bloques-estudiantes');
  contenedor.innerHTML = '<div style="padding:24px;text-align:center;color:var(--suave);font-size:13px;">Cargando estudiantes...</div>';

  try {
    const url  = SCRIPT_URL + '?accion=estudiantes';
    const resp = await fetch(url);
    const data = await resp.json();

    if (data.estudiantes && data.estudiantes.length > 0) {
      ESTUDIANTES = data.estudiantes.map(function(est, idx) {
        return {
          correo:    est.correo,
          nombre:    est.nombre,
          plan:      est.plan,
          iniciales: est.iniciales,
          avIdx:     idx % 5
        };
      });
    } else {
      ESTUDIANTES = [];
      contenedor.innerHTML = '<div style="padding:24px;text-align:center;color:var(--suave);font-size:13px;">No hay estudiantes activos registrados en Sheets.</div>';
      return;
    }
  } catch(e) {
    contenedor.innerHTML = '<div style="padding:24px;text-align:center;color:#991B1B;font-size:13px;">Error al cargar estudiantes. Verifica la conexión.</div>';
    return;
  }

  // Una vez cargados los estudiantes, carga el plan existente
  await cargarPlanExistente();
}

// ── CARGAR PLAN EXISTENTE ──
async function cargarPlanExistente() {
  try {
    const url  = SCRIPT_URL + '?accion=plan_semana_docente';
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.plan) {
      data.plan.forEach(item => {
        if (!planSemana[item.correo]) planSemana[item.correo] = {};
        planSemana[item.correo][item.fecha] = { guia: item.guia, estado: item.estado };
      });
    }
  } catch(e) {
    // Silencioso — si falla el plan, igual muestra estudiantes
  }

  renderPlanificacion();
}

// ── CATÁLOGO ──
const SECCIONES_CAT = [
  {id:'U01-A',titulo:'U01 · Números Reales — Subunidad A: Conjuntos Numéricos',unidad:'U01',sub:'A'},
  {id:'U01-B',titulo:'U01 · Números Reales — Subunidad B: Números Enteros',unidad:'U01',sub:'B'},
  {id:'U01-C',titulo:'U01 · Números Reales — Subunidad C: Números Racionales',unidad:'U01',sub:'C'},
  {id:'U02-A',titulo:'U02 · Porcentajes — Subunidad A: Porcentajes e IS/IC',unidad:'U02',sub:'A'},
  {id:'U03-A',titulo:'U03 · Potencias y Raíces — Subunidad A: Potencias',unidad:'U03',sub:'A'},
  {id:'U03-B',titulo:'U03 · Potencias y Raíces — Subunidad B: Raíces Enésimas',unidad:'U03',sub:'B'},
];

let filtroActivo = 'todos';
let busqueda = '';

function urlGuia(cod) { return BASE + 'guia-' + cod + '.html'; }

function copiarLink(cod, btn) {
  const url = urlGuia(cod);
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copiado');
    setTimeout(() => { btn.textContent = '⎘ Copiar link'; btn.classList.remove('copiado'); }, 2000);
    mostrarToast('Link copiado: ' + url);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = '✓ Copiado'; btn.classList.add('copiado');
    setTimeout(() => { btn.textContent = '⎘ Copiar link'; btn.classList.remove('copiado'); }, 2000);
    mostrarToast('Link copiado');
  });
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function filtrar(val, btn) {
  filtroActivo = val;
  document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  renderizarCatalogo();
}

function guiaVisible(g) {
  const q = busqueda.toLowerCase();
  const matchBusq = !q ||
    g.cod.toLowerCase().includes(q) ||
    g.nombre.toLowerCase().includes(q) ||
    g.sub.toLowerCase().includes(q) ||
    g.unidad.toLowerCase().includes(q);
  const matchFiltro =
    filtroActivo === 'todos' ||
    (filtroActivo === 'nivel-a' && g.nivel === 'a') ||
    (filtroActivo === 'nivel-b' && g.nivel === 'b') ||
    (filtroActivo === 'nivel-c' && g.nivel === 'c') ||
    g.unidad === filtroActivo;
  return matchBusq && matchFiltro;
}

function renderizarCatalogo() {
  const contenedor = document.getElementById('contenedor-guias');
  contenedor.innerHTML = '';
  let totalDisp = 0, totalProx = 0;

  SECCIONES_CAT.forEach(sec => {
    const guiasSec = GUIAS.filter(g =>
      g.unidad === sec.unidad && g.subunidad === sec.sub && guiaVisible(g)
    );
    if (guiasSec.length === 0) return;
    const dispSec = guiasSec.filter(g => g.disp).length;
    totalDisp += dispSec;
    totalProx += guiasSec.filter(g => !g.disp).length;

    const secDiv = document.createElement('div');
    secDiv.className = 'seccion';
    secDiv.innerHTML = `
      <div class="seccion-titulo">
        ${sec.titulo}
        <span class="seccion-count">${dispSec}/${guiasSec.length}</span>
      </div>
      <div class="grid" id="grid-${sec.id}"></div>`;
    contenedor.appendChild(secDiv);

    const grid = secDiv.querySelector('.grid');
    guiasSec.forEach(g => {
      const card = document.createElement('div');
      card.className = `guia-card nivel-${g.nivel}`;
      card.innerHTML = `
        <div class="guia-top">
          <div class="guia-codigo">${g.cod}</div>
          <span class="nivel-tag tag-${g.nivel}">Nivel ${g.nivel.toUpperCase()}</span>
        </div>
        <div class="guia-nombre"><strong>${g.nombre}</strong><br>${g.sub}</div>
        <div class="guia-acciones">
          <button class="btn-copiar" id="btn-${g.cod.replace(/\./g,'-')}"
            onclick="copiarLink('${g.cod}',this)">⎘ Copiar link</button>
          <a class="btn-abrir" href="${urlGuia(g.cod)}" target="_blank">↗ Abrir</a>
        </div>`;
      grid.appendChild(card);
    });
  });

  document.getElementById('total-disp').textContent  = totalDisp;
  document.getElementById('total-pronto').textContent = totalProx;
}

// Buscador catálogo
document.getElementById('buscador').addEventListener('input', e => {
  busqueda = e.target.value;
  renderizarCatalogo();
});

// Cerrar modal al hacer clic fuera
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) cerrarModal();
});

// ── INIT ──
cargarEstudiantes();
renderizarCatalogo();
</script>
