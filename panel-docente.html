<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashMate · Panel Docente</title>
<link rel="icon" href="https://emerinoo.github.io/flashmate/logo-erika.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --azul:#38388E;
  --rojo:#ED3B62;
  --celeste:#0187F3;
  --bg:#F0F2F8;
  --card:#fff;
  --texto:#1a1a2e;
  --suave:#6B7280;
  --borde:#E5E7EB;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--texto);
  min-height:100vh;
}

/* ── HEADER ── */
.hdr{
  background:var(--azul);
  padding:16px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 2px 12px rgba(56,56,142,0.25);
}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-logo{height:44px;border-radius:8px;}
.hdr-title{
  font-size:18px;font-weight:700;color:#fff;
  line-height:1.2;
}
.hdr-sub{font-size:11px;color:rgba(255,255,255,0.65);margin-top:2px;}
.hdr-badge{
  background:var(--rojo);color:#fff;
  font-size:11px;font-weight:600;
  padding:4px 14px;border-radius:20px;
  white-space:nowrap;
}

/* ── CONTENIDO ── */
.contenido{max-width:900px;margin:0 auto;padding:24px 16px 60px;}

/* ── FILTRO ── */
.filtros{
  display:flex;gap:8px;flex-wrap:wrap;
  margin-bottom:24px;
}
.btn-filtro{
  background:#fff;border:1.5px solid var(--borde);
  color:var(--suave);font-family:'Poppins',sans-serif;
  font-size:12px;font-weight:500;
  padding:6px 16px;border-radius:20px;
  cursor:pointer;transition:all .15s;
}
.btn-filtro:hover{border-color:var(--azul);color:var(--azul);}
.btn-filtro.activo{background:var(--azul);border-color:var(--azul);color:#fff;}

/* ── SECCIÓN UNIDAD ── */
.seccion{margin-bottom:32px;}
.seccion-titulo{
  font-size:13px;font-weight:700;
  color:var(--azul);
  letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:2px solid var(--azul);
  display:flex;align-items:center;gap:10px;
}
.seccion-count{
  background:var(--azul);color:#fff;
  font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:10px;
  letter-spacing:0;text-transform:none;
}

/* ── GRID GUÍAS ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
}

/* ── TARJETA GUÍA ── */
.guia-card{
  background:var(--card);
  border:1.5px solid var(--borde);
  border-radius:12px;
  padding:14px 16px;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.guia-card:hover{
  border-color:var(--azul);
  box-shadow:0 4px 16px rgba(56,56,142,0.12);
  transform:translateY(-1px);
}
.guia-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:3px;
}
.nivel-a::before{background:var(--celeste);}
.nivel-b::before{background:#10B981;}
.nivel-c::before{background:var(--rojo);}

.guia-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.guia-codigo{
  font-size:13px;font-weight:700;color:var(--azul);
}
.nivel-tag{
  font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:10px;
  white-space:nowrap;flex-shrink:0;
}
.tag-a{background:#EFF6FF;color:#1D4ED8;}
.tag-b{background:#ECFDF5;color:#065F46;}
.tag-c{background:#FEF2F2;color:#991B1B;}

.guia-nombre{font-size:12px;color:var(--suave);margin-bottom:10px;line-height:1.4;}

.guia-acciones{display:flex;gap:8px;}

.btn-copiar{
  flex:1;
  background:var(--azul);color:#fff;
  border:none;border-radius:7px;
  padding:7px 10px;
  font-family:'Poppins',sans-serif;
  font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-copiar:hover{opacity:.88;}
.btn-copiar.copiado{background:#10B981;}

.btn-abrir{
  background:transparent;
  border:1.5px solid var(--borde);
  border-radius:7px;
  padding:7px 10px;
  font-family:'Poppins',sans-serif;
  font-size:11px;font-weight:500;
  color:var(--suave);
  cursor:pointer;transition:all .15s;
  text-decoration:none;
  display:flex;align-items:center;gap:5px;
}
.btn-abrir:hover{border-color:var(--azul);color:var(--azul);}

/* ── NO DISPONIBLE ── */
.guia-card.proximamente{opacity:.55;}
.guia-card.proximamente .btn-copiar{background:var(--borde);color:var(--suave);cursor:not-allowed;}
.pronto-badge{
  position:absolute;top:10px;right:10px;
  background:#FEF9C3;color:#854D0E;
  font-size:9px;font-weight:700;
  padding:2px 8px;border-radius:8px;
  letter-spacing:.3px;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--texto);color:#fff;
  font-size:13px;font-weight:500;
  padding:10px 20px;border-radius:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
  transition:transform .3s;
  z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── STATS ── */
.stats{
  display:flex;gap:12px;flex-wrap:wrap;
  margin-bottom:24px;
}
.stat{
  background:var(--card);border:1.5px solid var(--borde);
  border-radius:10px;padding:12px 18px;
  display:flex;align-items:center;gap:10px;
}
.stat-num{font-size:22px;font-weight:700;color:var(--azul);}
.stat-label{font-size:11px;color:var(--suave);line-height:1.3;}

/* ── BUSCADOR ── */
.buscador-wrap{position:relative;margin-bottom:16px;}
.buscador{
  width:100%;padding:10px 16px 10px 40px;
  border:1.5px solid var(--borde);border-radius:10px;
  font-family:'Poppins',sans-serif;font-size:13px;
  background:#fff;color:var(--texto);
  outline:none;transition:border .15s;
}
.buscador:focus{border-color:var(--azul);}
.buscador-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--suave);font-size:15px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <img class="hdr-logo" src="https://emerinoo.github.io/flashmate/logo-erika.png" alt="Logo" onerror="this.style.display='none'">
    <div>
      <div class="hdr-title">FlashMate</div>
      <div class="hdr-sub">Panel Docente · Erika la Profe de Mate</div>
    </div>
  </div>
  <div class="hdr-badge">Panel privado</div>
</div>

<div class="contenido">

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="total-disp">0</div>
      <div class="stat-label">Guías<br>disponibles</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="total-pronto">0</div>
      <div class="stat-label">Próximas<br>guías</div>
    </div>
    <div class="stat">
      <div class="stat-num">25</div>
      <div class="stat-label">Guías en<br>GitHub</div>
    </div>
  </div>

  <!-- BUSCADOR -->
  <div class="buscador-wrap">
    <span class="buscador-icon">🔍</span>
    <input class="buscador" id="buscador" type="text" placeholder="Buscar guía por código, unidad o tema...">
  </div>

  <!-- FILTROS -->
  <div class="filtros">
    <button class="btn-filtro activo" onclick="filtrar('todos',this)">Todas</button>
    <button class="btn-filtro" onclick="filtrar('U01',this)">U01 · Números Reales</button>
    <button class="btn-filtro" onclick="filtrar('U02',this)">U02 · Porcentajes</button>
    <button class="btn-filtro" onclick="filtrar('U03',this)">U03 · Potencias y Raíces</button>
    <button class="btn-filtro" onclick="filtrar('nivel-a',this)">Nivel a</button>
    <button class="btn-filtro" onclick="filtrar('nivel-b',this)">Nivel b</button>
    <button class="btn-filtro" onclick="filtrar('nivel-c',this)">Nivel c</button>
  </div>

  <!-- GUÍAS -->
  <div id="contenedor-guias"></div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Link copiado al portapapeles</div>

<script>
const BASE = 'https://emerinoo.github.io/flashmate/';

const GUIAS = [
  // U01 SubA — Conjuntos Numéricos
  { cod:'U01.A.1a', nombre:'Conjuntos Numéricos', sub:'Pares/impares · Primos · MCD · mcm', nivel:'a', unidad:'U01', subunidad:'A', disp:true },
  { cod:'U01.A.2b', nombre:'Conjuntos Numéricos', sub:'MCD · mcm · Divisibilidad avanzada', nivel:'b', unidad:'U01', subunidad:'A', disp:true },
  { cod:'U01.A.3c', nombre:'Conjuntos Numéricos', sub:'Argumentación · Propiedades avanzadas', nivel:'c', unidad:'U01', subunidad:'A', disp:true },
  // U01 SubB — Números Enteros
  { cod:'U01.B.4a', nombre:'Números Enteros', sub:'Operaciones · Orden · Valor absoluto', nivel:'a', unidad:'U01', subunidad:'B', disp:true },
  { cod:'U01.B.5b', nombre:'Números Enteros', sub:'Propiedades · Expresiones · Signos', nivel:'b', unidad:'U01', subunidad:'B', disp:true },
  { cod:'U01.B.6c', nombre:'Números Enteros', sub:'Condiciones algebraicas · Contextos', nivel:'c', unidad:'U01', subunidad:'B', disp:true },
  { cod:'U01.B.7c', nombre:'Números Enteros', sub:'Razonamiento algebraico · Recta numérica', nivel:'c', unidad:'U01', subunidad:'B', disp:true },
  // U01 SubC — Números Racionales
  { cod:'U01.C.8a', nombre:'Números Racionales', sub:'Fracciones · Decimales · Operatoria básica', nivel:'a', unidad:'U01', subunidad:'C', disp:true },
  { cod:'U01.C.9b', nombre:'Números Racionales', sub:'Periódicos · Comparación · Conversiones', nivel:'b', unidad:'U01', subunidad:'C', disp:true },
  { cod:'U01.C.10c', nombre:'Números Racionales', sub:'Operatoria avanzada · Racionales algebraicos', nivel:'c', unidad:'U01', subunidad:'C', disp:true },
  { cod:'U01.C.11c', nombre:'Números Racionales', sub:'Semi-periódicos · Truncamiento · Densidad', nivel:'c', unidad:'U01', subunidad:'C', disp:true },
  { cod:'U01.C.12c', nombre:'Números Racionales', sub:'Fracciones complejas · Argumentación', nivel:'c', unidad:'U01', subunidad:'C', disp:true },
  // U02 SubA — Porcentajes
  { cod:'U02.A.1a', nombre:'Porcentajes', sub:'Concepto · Cálculo directo · Contextos básicos', nivel:'a', unidad:'U02', subunidad:'A', disp:true },
  { cod:'U02.A.2b', nombre:'Porcentajes', sub:'Aumentos · Descuentos · % del resto', nivel:'b', unidad:'U02', subunidad:'A', disp:true },
  { cod:'U02.A.3b', nombre:'Porcentajes', sub:'% de % · Variaciones encadenadas', nivel:'b', unidad:'U02', subunidad:'A', disp:true },
  { cod:'U02.A.4c', nombre:'Porcentajes', sub:'Algebraico · Problemas multi-paso', nivel:'c', unidad:'U02', subunidad:'A', disp:true },
  { cod:'U02.A.5c', nombre:'Porcentajes + IS/IC', sub:'Comisión · Interés simple · IS compuesto', nivel:'c', unidad:'U02', subunidad:'A', disp:true },
  { cod:'U02.A.6c', nombre:'Porcentajes + IS/IC', sub:'IS e IC · Comparaciones · Contextos financieros', nivel:'c', unidad:'U02', subunidad:'A', disp:true },
  // U03 SubA — Potencias
  { cod:'U03.A.1a', nombre:'Potencias', sub:'Exponente 0 · Negativos · Propiedades básicas', nivel:'a', unidad:'U03', subunidad:'A', disp:true },
  { cod:'U03.A.2b', nombre:'Potencias', sub:'Suma de potencias · Propiedades combinadas', nivel:'b', unidad:'U03', subunidad:'A', disp:true },
  { cod:'U03.A.3c', nombre:'Potencias', sub:'Simplificación algebraica · Notación científica', nivel:'c', unidad:'U03', subunidad:'A', disp:true },
  // U03 SubB — Raíces
  { cod:'U03.B.4a', nombre:'Raíces Enésimas', sub:'Simplificación básica · Raíces semejantes', nivel:'a', unidad:'U03', subunidad:'B', disp:true },
  { cod:'U03.B.5b', nombre:'Raíces Enésimas', sub:'Raíces de fracciones · Dominio real', nivel:'b', unidad:'U03', subunidad:'B', disp:true },
  { cod:'U03.B.6c', nombre:'Raíces Enésimas', sub:'Racionalización · Conjugados', nivel:'c', unidad:'U03', subunidad:'B', disp:true },
  { cod:'U03.B.7c', nombre:'Raíces Enésimas', sub:'Racionalización algebraica · Argumentación', nivel:'c', unidad:'U03', subunidad:'B', disp:true },
];

// ── Agrupar por unidad+subunidad ─────────────────────
const SECCIONES = [
  { id:'U01-A', titulo:'U01 · Números Reales — Subunidad A: Conjuntos Numéricos', unidad:'U01', sub:'A' },
  { id:'U01-B', titulo:'U01 · Números Reales — Subunidad B: Números Enteros', unidad:'U01', sub:'B' },
  { id:'U01-C', titulo:'U01 · Números Reales — Subunidad C: Números Racionales', unidad:'U01', sub:'C' },
  { id:'U02-A', titulo:'U02 · Porcentajes — Subunidad A: Porcentajes e IS/IC', unidad:'U02', sub:'A' },
  { id:'U03-A', titulo:'U03 · Potencias y Raíces — Subunidad A: Potencias', unidad:'U03', sub:'A' },
  { id:'U03-B', titulo:'U03 · Potencias y Raíces — Subunidad B: Raíces Enésimas', unidad:'U03', sub:'B' },
];

let filtroActivo = 'todos';
let busqueda = '';

function urlGuia(cod) {
  return BASE + 'guia-' + cod + '.html';
}

function copiarLink(cod, btn) {
  const url = urlGuia(cod);
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copiado');
    setTimeout(() => {
      btn.textContent = '⎘ Copiar link';
      btn.classList.remove('copiado');
    }, 2000);
    mostrarToast('Link copiado: ' + url);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copiado';
    btn.classList.add('copiado');
    setTimeout(() => { btn.textContent = '⎘ Copiar link'; btn.classList.remove('copiado'); }, 2000);
    mostrarToast('Link copiado');
  });
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function filtrar(val, btn) {
  filtroActivo = val;
  document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  renderizar();
}

function guiaVisible(g) {
  const q = busqueda.toLowerCase();
  const matchBusq = !q ||
    g.cod.toLowerCase().includes(q) ||
    g.nombre.toLowerCase().includes(q) ||
    g.sub.toLowerCase().includes(q) ||
    g.unidad.toLowerCase().includes(q);

  const matchFiltro =
    filtroActivo === 'todos' ||
    (filtroActivo === 'nivel-a' && g.nivel === 'a') ||
    (filtroActivo === 'nivel-b' && g.nivel === 'b') ||
    (filtroActivo === 'nivel-c' && g.nivel === 'c') ||
    g.unidad === filtroActivo;

  return matchBusq && matchFiltro;
}

function renderizar() {
  const contenedor = document.getElementById('contenedor-guias');
  contenedor.innerHTML = '';
  let totalDisp = 0, totalProx = 0;

  SECCIONES.forEach(sec => {
    const guiasSec = GUIAS.filter(g =>
      g.unidad === sec.unidad && g.subunidad === sec.sub && guiaVisible(g)
    );
    if (guiasSec.length === 0) return;

    const dispSec = guiasSec.filter(g => g.disp).length;
    totalDisp += dispSec;
    totalProx += guiasSec.filter(g => !g.disp).length;

    const secDiv = document.createElement('div');
    secDiv.className = 'seccion';
    secDiv.innerHTML = `
      <div class="seccion-titulo">
        ${sec.titulo}
        <span class="seccion-count">${dispSec}/${guiasSec.length}</span>
      </div>
      <div class="grid" id="grid-${sec.id}"></div>
    `;
    contenedor.appendChild(secDiv);

    const grid = secDiv.querySelector('.grid');
    guiasSec.forEach(g => {
      const card = document.createElement('div');
      card.className = `guia-card nivel-${g.nivel}${g.disp ? '' : ' proximamente'}`;
      card.innerHTML = `
        ${!g.disp ? '<span class="pronto-badge">Próximamente</span>' : ''}
        <div class="guia-top">
          <div class="guia-codigo">${g.cod}</div>
          <span class="nivel-tag tag-${g.nivel}">Nivel ${g.nivel.toUpperCase()}</span>
        </div>
        <div class="guia-nombre"><strong>${g.nombre}</strong><br>${g.sub}</div>
        <div class="guia-acciones">
          <button class="btn-copiar" id="btn-${g.cod.replace(/\./g,'-')}"
            onclick="${g.disp ? `copiarLink('${g.cod}',this)` : 'return false'}">
            ⎘ Copiar link
          </button>
          ${g.disp ? `<a class="btn-abrir" href="${urlGuia(g.cod)}" target="_blank">↗ Abrir</a>` : ''}
        </div>
      `;
      grid.appendChild(card);
    });
  });

  document.getElementById('total-disp').textContent = totalDisp;
  document.getElementById('total-pronto').textContent = totalProx;
}

// Buscador
document.getElementById('buscador').addEventListener('input', e => {
  busqueda = e.target.value;
  renderizar();
});

// Render inicial
renderizar();
</script>
</body>
</html>
