<script>
const NLS=4,LETRAS=['A','B','C','D','E'];
let nombreEstudiante='',EJ=[],actual=0,resp=[],sel=null;
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function hcss(h){if(h==='Resolver problemas')return 'hab-rp';if(h==='Modelar')return 'hab-m';if(h==='Representar')return 'hab-r';return 'hab-a';}

function generarEjercicios(){
  const EJ=[];

  // P1 — Modelar: interés compuesto año a año
  const cap1=rnd([10000,20000,15000,25000]);
  const tasa1=rnd([8,10,12,15]);
  const m1=Math.round(cap1*Math.pow(1+tasa1/100,3));
  const mSimple=cap1*(1+tasa1/100*3);
  const w1=shuffle([Math.round(mSimple),m1+500,m1-300,m1+1000]).filter(x=>x!==m1).slice(0,3);
  const ops1=shuffle([m1,...w1]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Modelar',
    txt:`Se depositan $${cap1.toLocaleString('es-CL')} a interés compuesto del ${tasa1}% anual. ¿Cuánto habrá después de 3 años?`,
    ops:ops1, ok:ops1.indexOf('$'+m1.toLocaleString('es-CL')),
    fb_ok:`Correcto. Año 1: ${Math.round(cap1*1.1).toLocaleString('es-CL')}... Año 3: ${cap1.toLocaleString('es-CL')} × (1,${tasa1<10?'0'+tasa1:tasa1})³ = $${m1.toLocaleString('es-CL')}. El interés compuesto supera al simple ($${Math.round(mSimple).toLocaleString('es-CL')}).`,
    fb_mal:`M = ${cap1.toLocaleString('es-CL')} × (1+${tasa1}/100)³ = $${m1.toLocaleString('es-CL')}. A diferencia del simple (que daría $${Math.round(mSimple).toLocaleString('es-CL')}), el compuesto capitaliza los intereses.`
  });

  // P2 — Resolver problemas: interés simple, calcular interés total
  const cap2=rnd([100000,150000,200000,250000]);
  const tasa2=rnd([5,6,7,8,10]);
  const años2=rnd([3,4,5,6]);
  const interes2=cap2*tasa2/100*años2;
  const w2=shuffle([interes2+5000,interes2-3000,cap2*tasa2/100,interes2*2]).filter(x=>x!==interes2).slice(0,3);
  const ops2=shuffle([interes2,...w2]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Resolver problemas',
    txt:`Inviertes $${cap2.toLocaleString('es-CL')} a interés simple del ${tasa2}% anual. ¿Cuánto interés habrás ganado después de ${años2} años?`,
    ops:ops2, ok:ops2.indexOf('$'+interes2.toLocaleString('es-CL')),
    fb_ok:`Correcto. I = C×i×t = ${cap2.toLocaleString('es-CL')} × ${tasa2/100} × ${años2} = $${interes2.toLocaleString('es-CL')}. En interés simple el interés es siempre el mismo cada año.`,
    fb_mal:`I = ${cap2.toLocaleString('es-CL')} × ${tasa2/100} × ${años2} = $${interes2.toLocaleString('es-CL')}.`
  });

  // P3 — Argumentar: simple vs compuesto comparación
  EJ.push({hab:'Argumentar',
    txt:'Misma inversión al 10% anual: interés simple da $130.000 a 3 años, compuesto da $133.100. ¿Qué afirmación es SIEMPRE verdadera?',
    ops:['El simple siempre genera más en cualquier plazo','El compuesto genera más a partir del segundo año','Ambos generan lo mismo siempre','El compuesto genera más a medida que aumenta el tiempo'], ok:3,
    fb_ok:'Correcto. La diferencia entre compuesto y simple crece con el tiempo porque en el compuesto los intereses se reinvierten. En el primer período son iguales.',
    fb_mal:'El compuesto supera al simple desde el segundo período y la brecha crece exponencialmente. A largo plazo la diferencia es muy significativa.'
  });

  // P4 — Modelar: despejar capital en interés simple
  const interes4=rnd([80000,100000,120000,150000]);
  const tasa4=rnd([4,5,8,10]);
  const años4=rnd([4,5,6]);
  const capital4=Math.round(interes4/(tasa4/100*años4));
  const w4=shuffle([capital4+50000,capital4-30000,interes4*años4,capital4*2]).filter(x=>x!==capital4).slice(0,3);
  const ops4=shuffle([capital4,...w4]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Modelar',
    txt:`¿Cuánto necesitas invertir a interés simple del ${tasa4}% anual para obtener $${interes4.toLocaleString('es-CL')} de interés en ${años4} años?`,
    ops:ops4, ok:ops4.indexOf('$'+capital4.toLocaleString('es-CL')),
    fb_ok:`Correcto. C = I/(i×t) = ${interes4.toLocaleString('es-CL')}/(${tasa4/100}×${años4}) = $${capital4.toLocaleString('es-CL')}.`,
    fb_mal:`Despeja C: I = C×i×t → C = I/(i×t) = ${interes4.toLocaleString('es-CL')}/(${tasa4/100}×${años4}) = $${capital4.toLocaleString('es-CL')}.`
  });

  // P5 — Resolver problemas: interés compuesto mensual (3 meses)
  const cap5=rnd([200000,500000,300000,400000]);
  const tasaMes=rnd([1,2]);
  const m1m=Math.round(cap5*(1+tasaMes/100));
  const m2m=Math.round(m1m*(1+tasaMes/100));
  const m3m=Math.round(m2m*(1+tasaMes/100));
  const w5=shuffle([cap5*(1+tasaMes/100*3),m3m+500,m3m-300,m3m+1000]).map(Math.round).filter(x=>x!==m3m).slice(0,3);
  const ops5=shuffle([m3m,...w5]).map(x=>'$'+x.toLocaleString('es-CL'));
  EJ.push({hab:'Resolver problemas',
    txt:`Se depositan $${cap5.toLocaleString('es-CL')} a interés compuesto mensual del ${tasaMes}%. ¿Cuál será el capital al tercer mes?`,
    ops:ops5, ok:ops5.indexOf('$'+m3m.toLocaleString('es-CL')),
    fb_ok:`Correcto. Mes 1: $${m1m.toLocaleString('es-CL')}. Mes 2: $${m2m.toLocaleString('es-CL')}. Mes 3: $${m3m.toLocaleString('es-CL')}. Cada mes se aplica el ${tasaMes}% sobre el monto acumulado.`,
    fb_mal:`Mes 1: ${cap5.toLocaleString('es-CL')}×1,0${tasaMes}=$${m1m.toLocaleString('es-CL')}. Mes 2: ×1,0${tasaMes}=$${m2m.toLocaleString('es-CL')}. Mes 3: ×1,0${tasaMes}=$${m3m.toLocaleString('es-CL')}.`
  });

  // P6 — Modelar: dos empleados con estructura mixta de sueldo
  const ventas6=rnd([10000000,12000000,15000000]);
  const pctGan=rnd([25,30,35]);
  const ganancias=ventas6*pctGan/100;
  const pctM=rnd([6,8,10]);
  const base6=rnd([80000,100000,120000]);
  const pctP=rnd([2,3]);
  const sueldoM=Math.round(ganancias*pctM/100);
  const sueldoP=base6+Math.round(ganancias*pctP/100);
  const ops6=[`M: $${sueldoM.toLocaleString('es-CL')} y P: $${sueldoP.toLocaleString('es-CL')}`,
    `M: $${Math.round(ganancias*pctM/100+base6).toLocaleString('es-CL')} y P: $${Math.round(ganancias*pctP/100).toLocaleString('es-CL')}`,
    `M: $${Math.round(ventas6*pctM/100).toLocaleString('es-CL')} y P: $${Math.round(ventas6*pctP/100+base6).toLocaleString('es-CL')}`,
    `M: $${sueldoP.toLocaleString('es-CL')} y P: $${sueldoM.toLocaleString('es-CL')}`];
  EJ.push({hab:'Modelar',
    txt:`Una tienda vendió $${ventas6.toLocaleString('es-CL')} y el ${pctGan}% son ganancias. M recibe ${pctM}% de las ganancias. P recibe $${base6.toLocaleString('es-CL')} fijos más ${pctP}% de las ganancias. ¿Cuánto recibe cada uno?`,
    ops:ops6, ok:0,
    fb_ok:`Correcto. Ganancias = $${ganancias.toLocaleString('es-CL')}. M = ${pctM}% de ${ganancias.toLocaleString('es-CL')} = $${sueldoM.toLocaleString('es-CL')}. P = ${base6.toLocaleString('es-CL')} + ${pctP}% de ${ganancias.toLocaleString('es-CL')} = $${sueldoP.toLocaleString('es-CL')}.`,
    fb_mal:`Ganancias = ${ventas6.toLocaleString('es-CL')} × ${pctGan/100} = $${ganancias.toLocaleString('es-CL')}. M: ${pctM}% de ganancias. P: fijo + ${pctP}% de ganancias.`
  });

  // P7 — Argumentar: triángulo con variaciones % en base y altura
  EJ.push({hab:'Argumentar',
    txt:'Un triángulo: altura baja 20%, base sube 25%. ¿Qué pasa con el área?',
    ops:['Aumenta un 5%','Queda igual','Disminuye un 5%','Aumenta un 25%'], ok:1,
    fb_ok:'Correcto. Nueva base = 2a×1,25. Nueva altura = h×0,80. Área nueva = (1/2)×2,5a×0,8h = ah = área original. Queda igual.',
    fb_mal:'Área = (1/2)×base×altura. Nueva = (1/2)×(2a×1,25)×(h×0,80) = (1/2)×2,5a×0,8h = ah. Igual que la original. Los factores 1,25 y 0,80 se compensan: 1,25×0,80=1,00.'
  });

  // P8 — Resolver problemas: tiempo para triplicar capital al X% compuesto
  const tasa8=rnd([6,8,10,12]);
  let años8=1;while(Math.pow(1+tasa8/100,años8)<3)años8++;
  const w8=shuffle([años8+2,años8-2,años8+4,Math.round(72/(tasa8)*1.5)]).filter(x=>x>0&&x!==años8).slice(0,3);
  const ops8=shuffle([años8,...w8]).map(x=>x+' años');
  EJ.push({hab:'Resolver problemas',
    txt:`¿Aproximadamente cuántos años se necesitan para TRIPLICAR un capital a interés compuesto del ${tasa8}% anual?`,
    ops:ops8, ok:ops8.indexOf(años8+' años'),
    fb_ok:`Correcto. Se busca (1,${tasa8<10?'0'+tasa8:tasa8})^n = 3. Probando valores: el resultado es ≈ ${años8} años. La regla del 72 estima el tiempo para DUPLICAR: 72/${tasa8}≈${Math.round(72/tasa8)} años; para triplicar se necesita más.`,
    fb_mal:`Busca n tal que (1+${tasa8}/100)^n = 3. Prueba valores: n=${años8} da ${Math.round(Math.pow(1+tasa8/100,años8)*100)/100}, que supera 3.`
  });

  return EJ;
}

function validarCorreo(c){if(c.indexOf('@')===-1)return false;var p=c.split('@');if(p.length!==2||!p[0].length)return false;if(p[1].indexOf('.')===-1)return false;var d=p[1].split('.');return d[0].length>0&&d[d.length-1].length>=2;}
function iniciar(){
  const nom=document.getElementById('inp-nombre').value.trim(),cor=document.getElementById('inp-correo').value.trim();
  if(!nom||!cor){document.getElementById('error-ident').style.display='block';return;}
  if(!validarCorreo(cor)){document.getElementById('error-ident').textContent='Correo inválido.';document.getElementById('error-ident').style.display='block';return;}
  nombreEstudiante=nom;document.getElementById('zona-ident').style.display='none';document.getElementById('zona-q').style.display='block';
  EJ=generarEjercicios();resp=new Array(8).fill(null);actual=0;sel=null;render();
}
function render(){
  const e=EJ[actual];
  document.getElementById('qnum').textContent=`Pregunta ${actual+1} de 8`;
  document.getElementById('barra').style.width=((actual+1)/8*100)+'%';
  document.getElementById('htag').innerHTML=`<span class="hab-tag ${hcss(e.hab)}">${e.hab}</span>`;
  document.getElementById('qtxt').textContent=e.txt;sel=null;
  const od=document.getElementById('opts');od.innerHTML='';
  e.ops.forEach((o,i)=>{const d=document.createElement('div');d.className='opt';d.id='op'+i;d.innerHTML=`<div class="letra">${LETRAS[i]}</div><span class="otxt">${o}</span>`;d.onclick=()=>elegir(i);od.appendChild(d);});
  const nls=document.createElement('div');nls.className='opt nls';nls.id='op4';nls.innerHTML=`<div class="letra" style="border-style:dashed">E</div><span class="otxt">No lo sé</span>`;nls.onclick=()=>elegir(4);od.appendChild(nls);
  document.getElementById('fb').style.display='none';document.getElementById('btnc').style.display='inline-block';document.getElementById('btnc').disabled=true;document.getElementById('btns').style.display='none';
}
function elegir(i){if(document.getElementById('btnc').style.display==='none')return;document.querySelectorAll('.opt').forEach(d=>d.classList.remove('sel'));document.getElementById('op'+i).classList.add('sel');sel=i;document.getElementById('btnc').disabled=false;}
function confirmar(){
  if(sel===null)return;const e=EJ[actual];resp[actual]=sel;const esNls=sel===NLS,esOk=!esNls&&sel===e.ok;
  document.querySelectorAll('.opt').forEach((d,i)=>{d.onclick=null;if(i===NLS){d.className='opt nls dis';return;}if(i===e.ok)d.className='opt '+(esOk?'ok':'show');else if(i===sel&&!esOk&&!esNls)d.className='opt mal';else d.className='opt dis';});
  const fb=document.getElementById('fb');
  if(esNls){fb.className='fb nls';fb.textContent=`La respuesta correcta es ${LETRAS[e.ok]}: ${e.ops[e.ok]}. ${e.fb_mal}`;}
  else{fb.className='fb '+(esOk?'ok':'mal');fb.textContent=esOk?e.fb_ok:e.fb_mal;}
  fb.style.display='block';document.getElementById('btnc').style.display='none';
  const bs=document.getElementById('btns');bs.style.display='inline-block';bs.textContent=actual<7?'Siguiente →':'Ver resultados →';
}
function siguiente(){if(actual<7){actual++;render();}else mostrarFinal();}
function mostrarFinal(){
  document.getElementById('zona-q').style.display='none';document.getElementById('zona-final').style.display='block';document.getElementById('barra').style.width='100%';
  const corr=resp.filter((r,i)=>r===EJ[i].ok).length,nlsC=resp.filter(r=>r===NLS).length,incorrectas=8-corr-nlsC,pct=Math.round(corr/8*100);
  document.getElementById('pje').textContent=corr+' / 8 correctas';registrar(corr,incorrectas,nlsC,pct);
  document.getElementById('pmsg').textContent=pct+'% de logro'+(nlsC>0?` · ${nlsC} sin responder`:'');
  const al=document.getElementById('alerta');
  if(incorrectas>3){al.className='alerta rep';al.innerHTML=`<strong>Se sugiere repetir esta guía.</strong><br>Tuviste ${incorrectas} respuestas incorrectas. Repasa y vuelve a intentarlo.`;document.getElementById('btn-rep').textContent='Repetir con valores nuevos';}
  else{al.className='alerta bien';al.innerHTML=`<strong>¡Muy bien, ${nombreEstudiante}!</strong> Obtuviste ${corr}/8 (${pct}%). Puedes avanzar a la siguiente guía.`;document.getElementById('btn-rep').textContent='Te invito a repetir de todas formas';}
  const dots=document.getElementById('dots');dots.innerHTML='';
  resp.forEach((r,i)=>{const d=document.createElement('div');d.className='dot '+(r===EJ[i].ok?'ok':r===NLS?'nls':'mal');dots.appendChild(d);});
  document.getElementById('reslista').innerHTML=resp.map((r,i)=>{const ok=r===EJ[i].ok,nls=r===NLS;const color=ok?'#085041':nls?'#5F5E5A':'#791F1F';const icono=ok?'✓':nls?'?':'✗';const txt=ok?'Correcta':nls?`No lo sé — correcta: ${LETRAS[EJ[i].ok]}`:`Incorrecta — correcta: ${LETRAS[EJ[i].ok]}`;return `<div style="color:${color}">${icono} P${i+1} (${EJ[i].hab}): ${txt}</div>`;}).join('');
}
function registrar(corr,incorr,nls,pct){
  var fecha=new Date().toLocaleDateString('es-CL',{timeZone:'America/Santiago'});
  var correo=document.getElementById('inp-correo').value.trim();
  var ejercicios=resp.map(function(r,i){return r===4?2:(r===EJ[i].ok?1:0);});
  var falladas=[];resp.forEach(function(r,i){if(r!==EJ[i].ok&&falladas.indexOf(EJ[i].hab)===-1)falladas.push(EJ[i].hab);});
  var params=['fecha='+encodeURIComponent(fecha),'nombre='+encodeURIComponent(nombreEstudiante),'correo='+encodeURIComponent(correo),'tipo=individual','grupo=NA','guia=guia-U02.A.6c','eje=E1','unidad=U02','subunidad=A','nivel=c','correctas='+corr,'incorrectas='+incorr,'nls='+nls,'logro='+(pct/100),'e1='+ejercicios[0],'e2='+ejercicios[1],'e3='+ejercicios[2],'e4='+ejercicios[3],'e5='+ejercicios[4],'e6='+ejercicios[5],'e7='+ejercicios[6],'e8='+ejercicios[7],'habilidades='+encodeURIComponent(falladas.join('|'))].join('&');
  var img=new Image();img.src='https://script.google.com/macros/s/AKfycbzsGCpwyNNFC03rbCLUwnPLTHBAn5FZxEJrqq1JX0LrDAY7jmJRQ58bcdaQ8XtS6MM3/exec?'+params;
}
function reiniciar(){EJ=generarEjercicios();actual=0;resp=new Array(8).fill(null);sel=null;document.getElementById('zona-final').style.display='none';document.getElementById('zona-q').style.display='block';render();}
</script>
</body></html>
