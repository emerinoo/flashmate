<script>
const NLS=4;
const LETRAS=['A','B','C','D','E'];
let nombreEstudiante='';
let EJ=[],actual=0,resp=[],sel=null;

function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function hcss(h){
  if(h==='Resolver problemas')return 'hab-rp';
  if(h==='Modelar')return 'hab-m';
  if(h==='Representar')return 'hab-r';
  return 'hab-a';
}

function generarEjercicios(){
  const EJ=[];

  // P1 â€” Representar: simplificar raÃ­ces cuadradas y comparar
  const raices1=[
    {n:20,s:'2âˆš5',v:4.47},{n:45,s:'3âˆš5',v:6.71},{n:80,s:'4âˆš5',v:8.94},
    {n:50,s:'5âˆš2',v:7.07},{n:72,s:'6âˆš2',v:8.49},{n:75,s:'5âˆš3',v:8.66}
  ];
  const r1=rnd(raices1);
  const w1=shuffle([r1.s.replace('âˆš','Â·âˆš'),String(r1.v.toFixed(1)),r1.s+'Â²',r1.s+'0']).filter(x=>x!==r1.s).slice(0,3);
  const ops1=shuffle([r1.s,...w1]);
  EJ.push({hab:'Representar',
    txt:`Simplifica âˆš${r1.n} completamente:`,
    ops:ops1, ok:ops1.indexOf(r1.s),
    fb_ok:`Correcto. âˆš${r1.n}=âˆš(${r1.n/r1.v**2*25|0}Â·${r1.n/(r1.n/r1.v**2*25|0)})... La clave es encontrar el mayor factor cuadrado perfecto. Resultado: ${r1.s}.`,
    fb_mal:`Busca el mayor factor cuadrado perfecto de ${r1.n}. âˆš${r1.n}=${r1.s}.`
  });

  // P2 â€” Resolver problemas: ordenar raÃ­ces en recta numÃ©rica
  EJ.push({hab:'Resolver problemas',
    txt:'Sean a = âˆš2 â‰ˆ 1,41; b = âˆš(1/2) â‰ˆ 0,71; c = 1,4. Orden de MENOR a MAYOR:',
    ops:['c âˆ’ b âˆ’ a','a âˆ’ b âˆ’ c','a âˆ’ c âˆ’ b','b âˆ’ c âˆ’ a'], ok:3,
    fb_ok:'Correcto. bâ‰ˆ0,71 < c=1,4 < aâ‰ˆ1,414. Para comparar raÃ­ces: convierte a decimal y ubica en la recta.',
    fb_mal:'En decimal: bâ‰ˆ0,71; c=1,4; aâ‰ˆ1,414. Orden: b < c < a.'
  });

  // P3 â€” Modelar: sumar raÃ­ces semejantes
  const grupos3=[
    {expr:'âˆš8 + âˆš18 + âˆš2',res:'6âˆš2',pasos:'2âˆš2+3âˆš2+âˆš2=6âˆš2'},
    {expr:'âˆš12 + âˆš27 + âˆš3',res:'6âˆš3',pasos:'2âˆš3+3âˆš3+âˆš3=6âˆš3'},
    {expr:'âˆš20 + âˆš45 + âˆš5',res:'6âˆš5',pasos:'2âˆš5+3âˆš5+âˆš5=6âˆš5'},
    {expr:'âˆš50 + âˆš72 + âˆš8',res:'12âˆš2',pasos:'5âˆš2+6âˆš2+2âˆš2=13... revisar'}
  ];
  const g3=rnd(grupos3.slice(0,3));
  const w3=shuffle(['8âˆš2','4âˆš2','3âˆš2','5âˆš2']).filter(x=>x!==g3.res).slice(0,3);
  const ops3=shuffle([g3.res,...w3]);
  EJ.push({hab:'Modelar',
    txt:`El resultado de ${g3.expr} es:`,
    ops:ops3, ok:ops3.indexOf(g3.res),
    fb_ok:`Correcto. ${g3.pasos}. Simplifica cada raÃ­z buscando su factor cuadrado perfecto, luego suma los coeficientes de raÃ­ces semejantes.`,
    fb_mal:`${g3.pasos}. Solo se pueden sumar raÃ­ces con el mismo radicando.`
  });

  // P4 â€” Representar: multiplicar raÃ­ces y simplificar
  const mults4=[
    {a:2,b:8,res:4},{a:3,b:12,res:6},{a:5,b:20,res:10},{a:2,b:18,res:6}
  ];
  const m4=rnd(mults4);
  const w4=shuffle([m4.res+2,m4.res-1,m4.res*2,m4.res+5]).filter(x=>x!==m4.res).slice(0,3);
  const ops4=shuffle([m4.res,...w4]).map(String);
  EJ.push({hab:'Representar',
    txt:`El resultado de âˆš${m4.a} Â· âˆš${m4.b} es:`,
    ops:ops4, ok:ops4.indexOf(String(m4.res)),
    fb_ok:`Correcto. âˆš${m4.a}Â·âˆš${m4.b}=âˆš(${m4.a*m4.b})=âˆš(${m4.res*m4.res})=${m4.res}. Propiedad: âˆšaÂ·âˆšb=âˆš(aÂ·b).`,
    fb_mal:`âˆš${m4.a}Â·âˆš${m4.b}=âˆš(${m4.a*m4.b})=${m4.res}.`
  });

  // P5 â€” Resolver problemas: simplificar âˆšnÂ² = |n|
  const vals5=[4,9,16,25,36];
  const v5=rnd(vals5);
  EJ.push({hab:'Resolver problemas',
    txt:`El resultado de âˆš${v5*v5} es:`,
    ops:[String(v5*v5),String(v5/2),String(v5),String(-v5)], ok:2,
    fb_ok:`Correcto. âˆš${v5*v5}=${v5}. La raÃ­z cuadrada de un nÃºmero positivo es siempre positiva.`,
    fb_mal:`âˆš${v5*v5}=${v5}. âˆš(nÂ²)=|n|=n para n>0.`
  });

  // P6 â€” Argumentar: condiciÃ³n de existencia de raÃ­z cuadrada
  const n6=rnd([3,5,7,11]);
  EJ.push({hab:'Argumentar',
    txt:`Â¿Para quÃ© valores de x tiene sentido real la expresiÃ³n âˆš(${n6}x âˆ’ 1)?`,
    ops:[`x â‰¥ 1/${n6}`,`x > 1/${n6}`,`x â‰¤ 1/${n6}`,'x â‰¥ 0'], ok:0,
    fb_ok:`Correcto. Para que sea real: ${n6}xâˆ’1 â‰¥ 0 â†’ x â‰¥ 1/${n6}. La raÃ­z cuadrada solo existe en reales cuando el radicando es â‰¥ 0.`,
    fb_mal:`Se necesita ${n6}xâˆ’1 â‰¥ 0 â†’ ${n6}x â‰¥ 1 â†’ x â‰¥ 1/${n6}.`
  });

  // P7 â€” Modelar: cxÂ² donde x tiene raÃ­z
  const c7=rnd([2,3,4]);
  const r7=rnd([2,3,5]);
  const res7=c7*r7;
  EJ.push({hab:'Modelar',
    txt:`El valor de ${c7}Â·(âˆš${r7})Â² es:`,
    ops:[String(res7),String(c7*r7*r7),String(Math.sqrt(c7*r7).toFixed(2)),String(c7+r7)], ok:0,
    fb_ok:`Correcto. (âˆš${r7})Â²=${r7}. Entonces ${c7}Â·${r7}=${res7}. La potencia y la raÃ­z se cancelan: (âˆša)Â²=a para aâ‰¥0.`,
    fb_mal:`(âˆš${r7})Â²=${r7}. ${c7}Â·${r7}=${res7}.`
  });

  // P8 â€” Argumentar: âˆšaÂ·âˆšb = âˆš(aÂ·b), reconocer propiedad
  EJ.push({hab:'Argumentar',
    txt:'Â¿CuÃ¡l de las siguientes igualdades es SIEMPRE verdadera para a,b â‰¥ 0?',
    ops:['âˆš(a+b) = âˆša + âˆšb','âˆša Â· âˆšb = âˆš(aÂ·b)','âˆš(aâˆ’b) = âˆša âˆ’ âˆšb','(âˆša)Â³ = âˆš(aÂ³)'], ok:1,
    fb_ok:'Correcto. âˆšaÂ·âˆšb=âˆš(aÂ·b) es la propiedad fundamental de la raÃ­z. Las demÃ¡s son falsas: âˆš(a+b)â‰ âˆša+âˆšb en general.',
    fb_mal:'Solo âˆšaÂ·âˆšb=âˆš(aÂ·b) es siempre verdadera. Contraejemplo de A: âˆš(9+16)=5 â‰  âˆš9+âˆš16=7.'
  });

  return EJ;
}

function validarCorreo(c){
  if(c.indexOf('@')===-1)return false;
  var p=c.split('@');if(p.length!==2)return false;
  if(p[0].length===0)return false;
  if(p[1].indexOf('.')===-1)return false;
  var d=p[1].split('.');
  if(d[0].length===0)return false;
  if(d[d.length-1].length<2)return false;
  return true;
}

function iniciar(){
  const nom=document.getElementById('inp-nombre').value.trim();
  const cor=document.getElementById('inp-correo').value.trim();
  if(!nom||!cor){document.getElementById('error-ident').style.display='block';return;}
  if(!validarCorreo(cor)){document.getElementById('error-ident').textContent='Por favor ingresa un correo vÃ¡lido.';document.getElementById('error-ident').style.display='block';return;}
  document.getElementById('error-ident').textContent='Por favor completa tu nombre y correo.';
  nombreEstudiante=nom;
  document.getElementById('zona-ident').style.display='none';
  document.getElementById('zona-q').style.display='block';
  EJ=generarEjercicios();resp=new Array(8).fill(null);actual=0;sel=null;render();
}

function render(){
  const e=EJ[actual];
  document.getElementById('qnum').textContent=`Pregunta ${actual+1} de 8`;
  document.getElementById('barra').style.width=((actual+1)/8*100)+'%';
  document.getElementById('htag').innerHTML=`<span class="hab-tag ${hcss(e.hab)}">${e.hab}</span>`;
  document.getElementById('qtxt').textContent=e.txt;
  sel=null;
  const od=document.getElementById('opts');od.innerHTML='';

    d.innerHTML=`<div class="letra">${LETRAS[i]}</div><span class="otxt">${o}</span>`;
    d.onclick=()=>elegir(i);od.appendChild(d);
  });
  const nls=document.createElement('div');nls.className='opt nls';nls.id='op4';
  nls.innerHTML=`<div class="letra" style="border-style:dashed">E</div><span class="otxt">No lo sÃ©</span>`;
  nls.onclick=()=>elegir(4);od.appendChild(nls);

}

function elegir(i){
  if(document.getElementById('btnc').style.display==='none')return;
  document.querySelectorAll('.opt').forEach(d=>d.classList.remove('sel'));
  document.getElementById('op'+i).classList.add('sel');
  sel=i;document.getElementById('btnc').disabled=false;
}

function confirmar(){
  if(sel===null)return;
  const e=EJ[actual];resp[actual]=sel;
  const esNls=sel===NLS,esOk=!esNls&&sel===e.ok;
  document.querySelectorAll('.opt').forEach((d,i)=>{
    d.onclick=null;
    if(i===NLS){d.className='opt nls dis';return;}
    if(i===e.ok)d.className='opt '+(esOk?'ok':'show');
    else if(i===sel&&!esOk&&!esNls)d.className='opt mal';
    else d.className='opt dis';
  });
  const fb=document.getElementById('fb');
  if(esNls){fb.className='fb nls';fb.textContent=`La respuesta correcta es ${LETRAS[e.ok]}: ${e.ops[e.ok]}. ${e.fb_mal}`;}
  else{fb.className='fb '+(esOk?'ok':'mal');fb.textContent=esOk?e.fb_ok:e.fb_mal;}
  fb.style.display='block';
  document.getElementById('btnc').style.display='none';
  const bs=document.getElementById('btns');bs.style.display='inline-block';
  bs.textContent=actual<7?'Siguiente â†’':'Ver resultados â†’';
}

function siguiente(){if(actual<7){actual++;render();}else mostrarFinal();}

  else if(nivel_msg==='medio'){al.className='alerta bien';al.innerHTML=`<strong>${msg.titulo}, ${nombreEstudiante}!</strong><br>${msg.txt}`;document.getElementById('btn-rep').textContent='Repetir con valores nuevos';}

function registrar(corr,incorr,nls,pct){
  var fecha=new Date().toLocaleDateString('es-CL',{timeZone:'America/Santiago'});
  var correo=document.getElementById('inp-correo').value.trim();
  var ejercicios=resp.map(function(r,i){return r===4?2:(r===EJ[i].ok?1:0);});
  var falladas=[];
  resp.forEach(function(r,i){if(r!==EJ[i].ok&&falladas.indexOf(EJ[i].hab)===-1)falladas.push(EJ[i].hab);});
  var params=[
    'fecha='+encodeURIComponent(fecha),
    'nombre='+encodeURIComponent(nombreEstudiante),
    'correo='+encodeURIComponent(correo),
    'tipo=individual','grupo=NA',
    'guia=guia-U03.B.4a','eje=E1','unidad=U03','subunidad=B','nivel=a',
    'correctas='+corr,'incorrectas='+incorr,'nls='+nls,'logro='+(pct/100),
    'e1='+ejercicios[0],'e2='+ejercicios[1],'e3='+ejercicios[2],'e4='+ejercicios[3],
    'e5='+ejercicios[4],'e6='+ejercicios[5],'e7='+ejercicios[6],'e8='+ejercicios[7],
    'habilidades='+encodeURIComponent(falladas.join('|'))
  ].join('&');
  var img=new Image();
  img.src='https://script.google.com/macros/s/AKfycbzsGCpwyNNFC03rbCLUwnPLTHBAn5FZxEJrqq1JX0LrDAY7jmJRQ58bcdaQ8XtS6MM3/exec?'+params;
}

function reiniciar(){
  EJ=generarEjercicios();actual=0;resp=new Array(8).fill(null);sel=null;
  document.getElementById('zona-final').style.display='none';
  document.getElementById('zona-q').style.display='block';
  render();
}

// â”€â”€ AUTO-IDENTIFICACIÃ“N DESDE PORTAL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// Si el estudiante llega desde el portal, nombre y correo
// vienen en la URL y se saltan el formulario
function autoIdentificar() {
  const params = new URLSearchParams(window.location.search);
  const nombre = params.get('nombre');
  const correo = params.get('correo');
  if (nombre && correo) {
    document.getElementById('inp-nombre').value = nombre;
    document.getElementById('inp-correo').value = correo;
    // Ocultar formulario y arrancar directo
    document.getElementById('zona-ident').style.display = 'none';
    document.getElementById('zona-q').style.display = 'block';
    nombreEstudiante = nombre;
    EJ = generarEjercicios();
    resp = new Array(8).fill(null);
    actual = 0; sel = null;
    render();
  }
}
// Ejecutar al cargar la pÃ¡gina
window.addEventListener('load', autoIdentificar);
